<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2332">
<title>หน้าช่างแต่ง — ไคลุง</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
* { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
body { background: #f0f2f5; margin: 0; min-height: 100vh; }

/* ── Header ── */
#header {
  background: #1a2332; color: #fff;
  padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  padding-top: max(16px, env(safe-area-inset-top, 16px));
}
#header h1 { font-size: 17px; font-weight: 700; margin: 0; }
#header .sub { font-size: 12px; color: #8fa3bf; margin-top: 3px; display: flex; align-items: center; gap: 5px; }

/* ── Live dot ── */
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block;
  animation: livepulse 2s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

/* ── Select craftsman bar ── */
#craft-select-bar {
  background: #fff; border-bottom: 2px solid #e5e7eb;
  padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#craft-select-bar label { font-size: 14px; font-weight: 600; color: #374151; white-space: nowrap; }
#craft-select-bar select {
  flex: 1; min-width: 180px; font-size: 15px; font-weight: 600;
  border: 2px solid #2563eb; border-radius: 10px; padding: 8px 12px;
  background: #fff; color: #1a2332; cursor: pointer; font-family: 'Sarabun', sans-serif;
}
#craft-select-bar select:focus { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

/* ── Content ── */
#craft-content { padding: 16px; padding-bottom: 48px; }

/* ── Customer card ── */
.order-card {
  background: #fff; border-radius: 14px; margin-bottom: 14px;
  border: 1.5px solid #e8ecf0; overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,.04);
}
.order-card-head {
  padding: 12px 16px; background: #f8fafc; border-bottom: 1.5px solid #e8ecf0;
  display: flex; align-items: center; justify-content: space-between;
}
.order-card-head .cust-name { font-size: 16px; font-weight: 700; color: #1a2332; }
.order-card-head .cust-count { font-size: 12px; color: #9ca3af; }
.order-card-body { padding: 6px 16px; }

/* ── Item row ── */
.craft-item-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid #f1f3f5; gap: 12px;
}
.craft-item-row:last-child { border-bottom: none; }
.craft-item-info { flex: 1; min-width: 0; }
.craft-item-name { font-size: 15px; font-weight: 600; color: #1a2332; line-height: 1.3; }
.craft-item-qty  { font-size: 13px; color: #6b7280; margin-top: 2px; }
.craft-item-status { flex-shrink: 0; }

/* ── Progress bar (thin) ── */
.craft-progress {
  height: 4px; background: #e5e7eb; border-radius: 99px; margin-top: 7px; overflow: hidden;
}
.craft-progress-bar {
  height: 100%; background: #2563eb; border-radius: 99px; transition: width .35s ease;
}

/* ── Stepper ── */
.stepper { display: flex; align-items: center; gap: 6px; }
.step-count {
  font-size: 14px; font-weight: 700; color: #1a2332; white-space: nowrap;
  min-width: 54px; text-align: center;
}
.btn-step {
  border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: 700;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  font-family: 'Sarabun', sans-serif; transition: all .15s; flex-shrink: 0;
}
.btn-step-minus { background: #f3f4f6; color: #374151; }
.btn-step-minus:hover { background: #e5e7eb; }
.btn-step-plus {
  background: #2563eb; color: #fff; width: auto; padding: 0 13px; font-size: 13px;
}
.btn-step-plus:hover { background: #1d4ed8; }
.btn-step-plus.last-unit { background: #16a34a; }
.btn-step-plus.last-unit:hover { background: #15803d; }

/* ── Primary action button (not started) ── */
.btn-craft-done {
  background: #2563eb; color: #fff; border: none;
  border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-craft-done:hover { background: #1d4ed8; }
.btn-craft-done:active { transform: scale(.97); }

/* ── Undo button ── */
.btn-craft-undo {
  background: #f3f4f6; color: #374151; border: 1.5px solid #d1d5db;
  border-radius: 10px; padding: 7px 13px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.btn-craft-undo:hover { background: #e5e7eb; }

/* ── Done badge ── */
.badge-crafted {
  background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px; margin-top: 5px;
  display: inline-flex; align-items: center; gap: 5px;
}

/* ── Done row — faded style ── */
.craft-item-done .craft-item-name { color: #6b7280; font-weight: 500; }

/* ── Divider between pending/done inside card ── */
.done-divider {
  font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .8px;
  padding: 8px 0 4px; border-top: 1px dashed #e5e7eb; margin-top: 4px; font-weight: 600;
}

/* ── Confirm overlay ── */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.confirm-box {
  background: #fff; border-radius: 16px; padding: 28px 24px;
  max-width: 360px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform:translateY(20px);opacity:0; } to { transform:translateY(0);opacity:1; } }
.confirm-box .conf-icon { font-size: 40px; text-align: center; margin-bottom: 14px; }
.confirm-box h3 { font-size: 18px; font-weight: 700; color: #1a2332; margin: 0 0 8px; text-align: center; }
.confirm-box p  { font-size: 14px; color: #6b7280; margin: 0 0 20px; text-align: center; line-height: 1.6; }
.item-preview {
  background: #eff6ff; border-radius: 10px; padding: 10px 14px;
  font-size: 14px; font-weight: 600; color: #1e40af; text-align: center; margin-bottom: 20px;
}
.confirm-actions { display: flex; flex-direction: column; gap: 8px; }
.confirm-actions button {
  width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700;
  border: none; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s;
}
.btn-conf-cancel { background: #f3f4f6; color: #374151; border: 1.5px solid #d1d5db !important; }
.btn-conf-cancel:hover { background: #e5e7eb; }

/* ── Empty / Loading ── */
.empty-craft { text-align: center; padding: 60px 20px; color: #9ca3af; }
.empty-craft i { font-size: 48px; margin-bottom: 16px; display: block; }
.empty-craft p { font-size: 15px; margin: 0; }
.spinner-wrap { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }

/* ── Refresh btn ── */
#refreshBtn {
  background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.3);
  border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; color: #fff; font-size: 15px; transition: all .15s;
}
#refreshBtn:hover { background: rgba(255,255,255,.22); }

/* ── Toast ── */
.craft-toast {
  position: fixed; bottom: 24px; right: 16px; z-index: 9999;
  background: #1e293b; color: #fff; border-radius: 12px; padding: 12px 18px;
  font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2);
  animation: toastIn .2s ease;
}
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── All done banner ── */
.all-done-banner {
  background: linear-gradient(135deg,#14532d,#16a34a); color: #fff;
  border-radius: 14px; padding: 24px 20px; text-align: center; margin-bottom: 16px;
}
.all-done-banner i  { font-size: 36px; margin-bottom: 10px; display: block; }
.all-done-banner h3 { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
.all-done-banner p  { font-size: 14px; opacity: .85; margin: 0; }
</style>
</head>
<body>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAC85V_FLtSDR0BR3tJEvDDpv1hSIx2Zug",
  authDomain: "kailoong-e63ed.firebaseapp.com",
  projectId: "kailoong-e63ed",
  storageBucket: "kailoong-e63ed.firebasestorage.app",
  messagingSenderId: "388629310479",
  appId: "1:388629310479:web:9eb9565ac22ad5914b477a"
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ── State ──
let _craftsman   = null;   // { id, name, productTypes }
let _orders      = [];     // pending orders (kept fresh by onSnapshot)
let _craftsmen   = [];     // all craftsmen (loaded once)
let _groups      = [];     // built by buildGroupedData(), used by stepItem()
let _unsubOrders = null;   // Firestore realtime unsubscribe fn
let _stepping    = false;  // double-tap guard

// ── Utilities ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  document.querySelectorAll('.craft-toast').forEach(e=>e.remove());
  const el = document.createElement('div');
  el.className = 'craft-toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
// encodeURIComponent shorthand for onclick attrs
function encC(s) { return encodeURIComponent(String(s||'')); }

// ── itemKey — MUST match index.html ──
function itemKey(i) {
  return `${i.productName}|${i.color||''}|${i.trimColor||''}`;
}

// ── Build display label from item ──
function buildLabel(item) {
  const lineIcons = {ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};
  const trimLabel = item.trimColor ? (lineIcons[item.trimColor] ? lineIcons[item.trimColor] + ' ' + item.trimColor : item.trimColor) : '';
  const parts = [
    item.productName,
    item.color && item.color !== '-' ? item.color : '',
    trimLabel
  ].filter(Boolean);
  return parts.join(' ') + (item.extra ? ' ' + item.extra : '');
}

// ── getCraftedQty: backward-compatible with old isCrafted-only schema ──
function getCraftedQty(csEntry, orderQty) {
  if (!csEntry) return 0;
  if (csEntry.craftedQty !== undefined) return Math.min(csEntry.craftedQty, orderQty);
  if (csEntry.isCrafted) return orderQty; // legacy: fully done
  return 0;
}

// ── Check if this craftsman can work on this item ──
function craftsmanCanDo(item) {
  if (!_craftsman) return false;
  const types = _craftsman.productTypes || [];
  if (types.length === 0) return true; // ไม่กำหนด = ทำได้ทุกประเภท
  return types.includes(item.productName);
}

// ══════════════════════════════════════
//  INIT & DATA
// ══════════════════════════════════════

let _unsubCraftsmen = null; // real-time craftsmen unsubscribe

async function init() {
  document.getElementById('craft-content').innerHTML =
    `<div class="spinner-wrap"><i class="fa-solid fa-spinner fa-spin" style="font-size:28px;margin-bottom:10px;display:block;"></i>กำลังโหลด...</div>`;

  // Start real-time listener for orders immediately
  startOrdersListener();

  // Load craftsmen once (for initial render & restore)
  const snap = await db.collection('craftsmen').get();
  _craftsmen = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Populate dropdown
  const sel = document.getElementById('craftsmanSel');
  sel.innerHTML = '<option value="">— เลือกชื่อช่าง —</option>' +
    _craftsmen.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');

  // Empty craftsmen state
  if (!_craftsmen.length) {
    document.getElementById('craft-content').innerHTML =
      `<div class="empty-craft"><i class="fa-solid fa-users-slash"></i><p>ยังไม่มีช่างแต่ง</p><p style="font-size:13px;color:#9ca3af;">ให้ผู้ดูแลเพิ่มข้อมูลช่างในระบบก่อน</p></div>`;
  }

  // Restore saved craftsman
  const saved = localStorage.getItem('craft_craftsman_id');
  if (saved && _craftsmen.find(c => c.id === saved)) {
    sel.value = saved;
    onCraftsmanChange();
  } else if (_craftsmen.length) {
    document.getElementById('craft-content').innerHTML =
      `<div class="empty-craft"><i class="fa-solid fa-hard-hat"></i><p>เลือกชื่อช่างด้านบนเพื่อดูรายการงาน</p></div>`;
  }

  // Real-time craftsmen listener — keeps dropdown fresh when craftsmen are added/removed
  if (_unsubCraftsmen) _unsubCraftsmen();
  _unsubCraftsmen = db.collection('craftsmen').onSnapshot(snap => {
    _craftsmen = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const s = document.getElementById('craftsmanSel');
    if (!s) return;
    const currentVal = s.value;
    s.innerHTML = '<option value="">— เลือกชื่อช่าง —</option>' +
      _craftsmen.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    if (currentVal && _craftsmen.find(c => c.id === currentVal)) {
      s.value = currentVal; // keep selection
    } else if (currentVal) {
      // craftsman was deleted — reset
      _craftsman = null;
      localStorage.removeItem('craft_craftsman_id');
      document.getElementById('craft-content').innerHTML =
        `<div class="empty-craft"><i class="fa-solid fa-hard-hat"></i><p>เลือกชื่อช่างด้านบนเพื่อดูรายการงาน</p></div>`;
    }
  }, err => console.error('craftsmen snapshot error:', err));
}

// ── Real-time orders listener ──
function startOrdersListener() {
  if (_unsubOrders) _unsubOrders(); // cleanup previous
  _unsubOrders = db.collection('orders').onSnapshot(snap => {
    _orders = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(o => !o.isDelivered)
      .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    if (_craftsman) renderCraftOrders();
  }, err => {
    console.error('onSnapshot error:', err);
    toast('⚠️ เชื่อมต่อ Firestore ไม่ได้ กรุณารีเฟรช');
  });
}

function onCraftsmanChange() {
  const sel = document.getElementById('craftsmanSel');
  const id = sel.value;
  if (!id) {
    localStorage.removeItem('craft_craftsman_id');
    _craftsman = null;
    document.getElementById('craft-content').innerHTML =
      `<div class="empty-craft"><i class="fa-solid fa-hard-hat"></i><p>เลือกชื่อช่างด้านบนเพื่อดูรายการงาน</p></div>`;
    return;
  }
  _craftsman = _craftsmen.find(c => c.id === id) || null;
  localStorage.setItem('craft_craftsman_id', id);
  renderCraftOrders();
}

// ══════════════════════════════════════
//  BUILD GROUPED DATA
// ══════════════════════════════════════

/*
  ผล: array ของลูกค้า แต่ละคนมี items[]
  แต่ละ item รวม qty และ craftedQty จากทุกออเดอร์ของลูกค้านั้น
  sources[] เก็บ ref ไปยัง order จริงเพื่อใช้ตอน save Firestore
*/
function buildGroupedData() {
  const custMap   = {};
  const custOrder = [];

  for (const o of _orders) {
    const myItems = (o.items || []).filter(i => craftsmanCanDo(i));
    if (!myItems.length) continue;

    const cust = o.customerName || '?';
    if (!custMap[cust]) { custMap[cust] = { customerName: cust, items: {} }; custOrder.push(cust); }

    const cs = o.craftStatus || {};
    for (const item of myItems) {
      const k         = itemKey(item);
      const craftedQty = getCraftedQty(cs[k], item.qty);

      if (!custMap[cust].items[k]) {
        custMap[cust].items[k] = { key: k, label: buildLabel(item), totalQty: 0, craftedQty: 0, sources: [] };
      }
      custMap[cust].items[k].totalQty   += item.qty;
      custMap[cust].items[k].craftedQty += craftedQty;
      custMap[cust].items[k].sources.push({ orderId: o.id, orderQty: item.qty, craftedQty, item });
    }
  }

  return custOrder.map(name => ({
    customerName: name,
    items: Object.values(custMap[name].items)
  }));
}

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════

function renderCraftOrders() {
  if (!_craftsman) return;
  _groups = buildGroupedData(); // update global lookup for stepItem()

  const el = document.getElementById('craft-content');

  if (!_groups.length) {
    el.innerHTML = `<div class="empty-craft">
      <i class="fa-solid fa-circle-check" style="color:#16a34a;"></i>
      <p>ไม่มีรายการงานสำหรับ <strong>${esc(_craftsman.name)}</strong></p>
      <p style="font-size:13px;margin-top:6px;color:#9ca3af;">ยังไม่มีออเดอร์หรือทุกงานเสร็จหมดแล้ว</p>
    </div>`;
    return;
  }

  const hasRemaining = _groups.some(g => g.items.some(it => it.craftedQty < it.totalQty));
  let html = '';

  if (!hasRemaining) {
    html += `<div class="all-done-banner">
      <i class="fa-solid fa-party-horn"></i>
      <h3>เสร็จงานทั้งหมดแล้ว! 🎉</h3>
      <p>ทุกรายการที่รับผิดชอบแต่งเสร็จเรียบร้อย</p>
    </div>`;
  }

  html += _groups.map(g => renderCustomerCard(g)).join('');
  el.innerHTML = html;
}

function renderCustomerCard(group) {
  const pendingItems = group.items.filter(it => it.craftedQty < it.totalQty);
  const doneItems    = group.items.filter(it => it.craftedQty >= it.totalQty);

  const pendingHtml = pendingItems.map(it => renderItemActive(group.customerName, it)).join('');
  const doneHtml    = doneItems.length
    ? `<div class="done-divider">✅ เสร็จแล้ว</div>` +
      doneItems.map(it => renderItemDone(group.customerName, it)).join('')
    : '';

  const totalRemaining = pendingItems.reduce((s, it) => s + (it.totalQty - it.craftedQty), 0);
  const countLabel = pendingItems.length
    ? `<span class="cust-count">ค้างแต่ง ${totalRemaining} ใบ</span>`
    : `<span class="cust-count" style="color:#16a34a;">✅ ครบหมดแล้ว</span>`;

  return `<div class="order-card">
    <div class="order-card-head">
      <div class="cust-name">${esc(group.customerName)}</div>
      ${countLabel}
    </div>
    <div class="order-card-body">
      ${pendingHtml}
      ${doneHtml}
    </div>
  </div>`;
}

// ── Active item row (remaining > 0) ──
function renderItemActive(custName, it) {
  const ec = encC(custName), ek = encC(it.key);

  // Not started (craftedQty === 0)
  if (it.craftedQty === 0) {
    const isSingle = it.totalQty === 1;
    return `<div class="craft-item-row">
      <div class="craft-item-info">
        <div class="craft-item-name">${esc(it.label)}</div>
        <div class="craft-item-qty">จำนวน ${it.totalQty} ใบ</div>
      </div>
      <div class="craft-item-status">
        <button class="btn-craft-done" onclick="stepItem('${ec}','${ek}',1)">
          <i class="fa-solid fa-check"></i>${isSingle ? 'เสร็จแล้ว' : '+1 เสร็จ'}
        </button>
      </div>
    </div>`;
  }

  // In progress (0 < craftedQty < totalQty)
  const pct        = Math.round((it.craftedQty / it.totalQty) * 100);
  const isNextLast = (it.craftedQty + 1) >= it.totalQty;
  return `<div class="craft-item-row">
    <div class="craft-item-info">
      <div class="craft-item-name">${esc(it.label)}</div>
      <div class="craft-progress">
        <div class="craft-progress-bar" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="craft-item-status">
      <div class="stepper">
        <button class="btn-step btn-step-minus"
          onclick="stepItem('${ec}','${ek}',-1)" title="ยกเลิก 1 ใบ">−</button>
        <span class="step-count">${it.craftedQty}/${it.totalQty} ใบ</span>
        <button class="btn-step btn-step-plus ${isNextLast ? 'last-unit' : ''}"
          onclick="stepItem('${ec}','${ek}',1)">
          ${isNextLast ? '✅ ครบ!' : '+1 เสร็จ'}
        </button>
      </div>
    </div>
  </div>`;
}

// ── Done item row (craftedQty >= totalQty) ──
function renderItemDone(custName, it) {
  const ec = encC(custName), ek = encC(it.key);
  return `<div class="craft-item-row craft-item-done">
    <div class="craft-item-info">
      <div class="craft-item-name">${esc(it.label)}</div>
      <div class="badge-crafted"><i class="fa-solid fa-circle-check"></i>ครบ ${it.totalQty} ใบ</div>
    </div>
    <div class="craft-item-status">
      <button class="btn-craft-undo" onclick="stepItem('${ec}','${ek}',-1)">
        <i class="fa-solid fa-rotate-left"></i>ยกเลิก 1
      </button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
//  STEP LOGIC
// ══════════════════════════════════════

function stepItem(encodedCust, encodedKey, delta) {
  const custName = decodeURIComponent(encodedCust);
  const key      = decodeURIComponent(encodedKey);

  const group = _groups.find(g => g.customerName === custName);
  if (!group) return;
  const it = group.items.find(i => i.key === key);
  if (!it) return;

  if (delta === 1) {
    if (it.craftedQty >= it.totalQty) return; // already full
    const wouldComplete = (it.craftedQty + 1) >= it.totalQty;
    if (wouldComplete) {
      // Confirm popup for the last unit
      showConfirm({
        icon: it.totalQty === 1 ? '🎨' : '🎉',
        title: it.totalQty === 1 ? 'แต่งเสร็จแล้วใช่ไหม?' : 'แต่งครบทุกใบแล้วใช่ไหม?',
        desc: `ยืนยันว่าแต่ง "${it.label}" ครบ ${it.totalQty} ใบ`,
        itemLabel: `${it.label} × ${it.totalQty} ใบ`,
        yesLabel: it.totalQty === 1 ? '✅ ยืนยัน เสร็จแล้ว' : '🎉 ยืนยัน ครบแล้ว!',
        yesColor: '#16a34a',
        onYes: () => doStep(it, 1)
      });
    } else {
      // Intermediate step — no confirm, direct update
      doStep(it, 1);
    }
  } else {
    // delta === -1: undo, no confirm needed
    if (it.craftedQty <= 0) return;
    doStep(it, -1);
  }
}

async function doStep(groupItem, delta) {
  if (_stepping) return;
  _stepping = true;
  // Disable all step buttons while saving
  document.querySelectorAll('.btn-craft-done,.btn-step,.btn-craft-undo').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
  try {
    let src;
    if (delta === 1) {
      // First source that still has remaining capacity
      src = groupItem.sources.find(s => s.craftedQty < s.orderQty);
    } else {
      // Last source that has craftedQty > 0 (reverse so we undo most recent first)
      src = [...groupItem.sources].reverse().find(s => s.craftedQty > 0);
    }
    if (!src) return;

    const newQty = src.craftedQty + delta;
    await saveSourceCraftedQty(src, newQty);
    // onSnapshot will re-render automatically — no manual re-render needed
    toast(delta === 1 ? '✅ บันทึกแล้ว' : '↩️ ยกเลิก 1 ใบแล้ว');
  } catch (e) {
    console.error('doStep error:', e);
    toast('⚠️ บันทึกไม่สำเร็จ: ' + e.message);
    // Re-enable buttons on error (onSnapshot won't fire to re-render)
    document.querySelectorAll('.btn-craft-done,.btn-step,.btn-craft-undo').forEach(b => { b.disabled = false; b.style.opacity = ''; });
  } finally {
    _stepping = false;
  }
}

async function saveSourceCraftedQty(src, newCraftedQty) {
  const k = itemKey(src.item);
  if (newCraftedQty <= 0) {
    // Dot-notation delete — safe for concurrent multi-craftsman writes
    await db.collection('orders').doc(src.orderId).update({
      [`craftStatus.${k}`]: firebase.firestore.FieldValue.delete()
    });
  } else {
    await db.collection('orders').doc(src.orderId).update({
      [`craftStatus.${k}`]: {
        craftedQty:    newCraftedQty,
        isCrafted:     newCraftedQty >= src.orderQty,
        craftedBy:     _craftsman.id,
        craftedByName: _craftsman.name,
        craftedAt:     Date.now()
      }
    });
  }
}

// ══════════════════════════════════════
//  CONFIRM POPUP
// ══════════════════════════════════════

let _confirmCb = null;
function showConfirm({ icon, title, desc, itemLabel, yesLabel, yesColor, onYes }) {
  _confirmCb = onYes;
  const div = document.createElement('div');
  div.className = 'confirm-overlay'; div.id = 'craft-confirm';
  div.innerHTML = `<div class="confirm-box">
    <div class="conf-icon">${icon}</div>
    <h3>${esc(title)}</h3>
    <p>${esc(desc)}</p>
    <div class="item-preview">${esc(itemLabel)}</div>
    <div class="confirm-actions">
      <button style="background:${yesColor};color:#fff;" onclick="doConfirm()">
        ${esc(yesLabel)}
      </button>
      <button class="btn-conf-cancel" onclick="closeConfirm()">ยกเลิก</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  // Allow closing by tapping outside
  div.addEventListener('click', e => { if (e.target === div) closeConfirm(); });
}
function doConfirm()  { closeConfirm(); if (_confirmCb) { _confirmCb(); _confirmCb = null; } }
function closeConfirm() { document.getElementById('craft-confirm')?.remove(); }

// ── Manual refresh (onSnapshot already keeps data fresh; this just re-renders) ──
function refreshData() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }
  renderCraftOrders();
  setTimeout(() => { if (btn) btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; }, 400);
  toast('รีเฟรชแล้ว');
}

window.addEventListener('DOMContentLoaded', init);
</script>
