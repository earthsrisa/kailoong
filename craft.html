<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2332">
<title>หน้าช่างแต่ง — ไคลุง</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
* { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
body { background: #f0f2f5; margin: 0; min-height: 100vh; }

/* ── Header ── */
#header {
  background: #1a2332; color: #fff;
  padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  padding-top: max(16px, env(safe-area-inset-top, 16px));
}
#header h1 { font-size: 17px; font-weight: 700; margin: 0; }
#header .sub { font-size: 12px; color: #8fa3bf; margin-top: 2px; }

/* ── Select craftsman bar ── */
#craft-select-bar {
  background: #fff; border-bottom: 2px solid #e5e7eb;
  padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#craft-select-bar label { font-size: 14px; font-weight: 600; color: #374151; white-space: nowrap; }
#craft-select-bar select {
  flex: 1; min-width: 180px; font-size: 15px; font-weight: 600;
  border: 2px solid #2563eb; border-radius: 10px; padding: 8px 12px;
  background: #fff; color: #1a2332; cursor: pointer;
  font-family: 'Sarabun', sans-serif;
}
#craft-select-bar select:focus { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

/* ── Content ── */
#craft-content { padding: 16px; padding-bottom: 40px; }

/* ── Order card ── */
.order-card {
  background: #fff; border-radius: 14px; margin-bottom: 14px;
  border: 1.5px solid #e8ecf0; overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,.04);
}
.order-card-head {
  padding: 12px 16px; background: #f8fafc; border-bottom: 1.5px solid #e8ecf0;
  display: flex; align-items: center; justify-content: space-between;
}
.order-card-head .cust-name { font-size: 16px; font-weight: 700; color: #1a2332; }
.order-card-head .order-meta { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.order-card-body { padding: 10px 16px; }

/* ── Item row ── */
.craft-item-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid #f1f3f5; gap: 10px;
}
.craft-item-row:last-child { border-bottom: none; }
.craft-item-info { flex: 1; }
.craft-item-name { font-size: 15px; font-weight: 600; color: #1a2332; }
.craft-item-qty { font-size: 13px; color: #6b7280; margin-top: 2px; }
.craft-item-status { flex-shrink: 0; }

/* ── Buttons ── */
.btn-craft-done {
  background: #2563eb; color: #fff; border: none;
  border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-craft-done:hover { background: #1d4ed8; }
.btn-craft-done:active { transform: scale(.97); }

.btn-craft-undo {
  background: #f3f4f6; color: #374151; border: 1.5px solid #d1d5db;
  border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.btn-craft-undo:hover { background: #e5e7eb; }

.badge-crafted {
  background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}

/* ── Confirm Modal ── */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.confirm-box {
  background: #fff; border-radius: 16px; padding: 28px 24px;
  max-width: 360px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.confirm-box .icon { font-size: 40px; text-align: center; margin-bottom: 14px; }
.confirm-box h3 { font-size: 18px; font-weight: 700; color: #1a2332; margin: 0 0 8px; text-align: center; }
.confirm-box p { font-size: 14px; color: #6b7280; margin: 0 0 20px; text-align: center; line-height: 1.6; }
.confirm-box .item-preview {
  background: #eff6ff; border-radius: 10px; padding: 10px 14px;
  font-size: 14px; font-weight: 600; color: #1e40af; text-align: center;
  margin-bottom: 20px;
}
.confirm-actions { display: flex; flex-direction: column; gap: 8px; }
.confirm-actions button { width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all .15s; }
.btn-confirm-yes { background: #16a34a; color: #fff; }
.btn-confirm-yes:hover { background: #15803d; }
.btn-confirm-cancel { background: #f3f4f6; color: #374151; border: 1.5px solid #d1d5db !important; }
.btn-confirm-cancel:hover { background: #e5e7eb; }

/* ── Empty / Loading ── */
.empty-craft { text-align: center; padding: 60px 20px; color: #9ca3af; }
.empty-craft i { font-size: 48px; margin-bottom: 16px; display: block; }
.empty-craft p { font-size: 15px; margin: 0; }
.spinner-wrap { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }

/* ── Refresh btn ── */
#refreshBtn {
  background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.3);
  border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; color: #fff; font-size: 15px;
  transition: all .15s;
}
#refreshBtn:hover { background: rgba(255,255,255,.22); }

/* ── Toast ── */
.craft-toast {
  position: fixed; bottom: 24px; right: 16px; z-index: 9999;
  background: #1e293b; color: #fff; border-radius: 12px; padding: 12px 18px;
  font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2);
  animation: toastIn .2s ease;
}
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── All done banner ── */
.all-done-banner {
  background: linear-gradient(135deg, #14532d, #16a34a);
  color: #fff; border-radius: 14px; padding: 24px 20px; text-align: center;
  margin-bottom: 16px;
}
.all-done-banner i { font-size: 36px; margin-bottom: 10px; display: block; }
.all-done-banner h3 { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
.all-done-banner p { font-size: 14px; opacity: .85; margin: 0; }
</style>
</head>
<body>

<!-- Firebase config — same as main app -->
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAC85V_FLtSDR0BR3tJEvDDpv1hSIx2Zug",
  authDomain: "kailoong-e63ed.firebaseapp.com",
  projectId: "kailoong-e63ed",
  storageBucket: "kailoong-e63ed.firebasestorage.app",
  messagingSenderId: "388629310479",
  appId: "1:388629310479:web:9eb9565ac22ad5914b477a"
};
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ── State ──
let _craftsman = null;    // { id, name, productTypes }
let _orders    = [];      // pending orders
let _craftsmen = [];      // all craftsmen

// ── Toast ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'craft-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ── Firestore helpers ──
async function getAllDocs(col) {
  const snap = await db.collection(col).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function updateDoc(col, id, data) {
  await db.collection(col).doc(id).set(data, { merge: true });
}

// ── Load data ──
async function loadData() {
  const [craftsmen, orders] = await Promise.all([
    getAllDocs('craftsmen'),
    getAllDocs('orders')
  ]);
  _craftsmen = craftsmen;
  // เฉพาะออเดอร์ที่ยังไม่ส่ง หรือส่งแล้วแต่วันนี้
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  _orders = orders.filter(o => !o.isDelivered || (o.deliveredAt && o.deliveredAt >= todayStart.getTime()))
                  .sort((a,b) => a.createdAt - b.createdAt);
}

// ── Init ──
async function init() {
  document.getElementById('craft-content').innerHTML = `<div class="spinner-wrap"><i class="fa-solid fa-spinner fa-spin" style="font-size:28px;margin-bottom:10px;display:block;"></i>กำลังโหลด...</div>`;
  await loadData();

  // สร้าง dropdown ช่าง
  const sel = document.getElementById('craftsmanSel');
  sel.innerHTML = '<option value="">— เลือกชื่อช่าง —</option>' +
    _craftsmen.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  // ถ้าเคยเลือกไว้ใน localStorage
  const saved = localStorage.getItem('craft_craftsman_id');
  if (saved && _craftsmen.find(c => c.id === saved)) {
    sel.value = saved;
    onCraftsmanChange();
  } else {
    document.getElementById('craft-content').innerHTML =
      `<div class="empty-craft"><i class="fa-solid fa-hard-hat"></i><p>เลือกชื่อช่างด้านบนเพื่อดูรายการงาน</p></div>`;
  }
}

function onCraftsmanChange() {
  const sel = document.getElementById('craftsmanSel');
  const id = sel.value;
  if (!id) {
    localStorage.removeItem('craft_craftsman_id');
    _craftsman = null;
    document.getElementById('craft-content').innerHTML =
      `<div class="empty-craft"><i class="fa-solid fa-hard-hat"></i><p>เลือกชื่อช่างด้านบนเพื่อดูรายการงาน</p></div>`;
    return;
  }
  _craftsman = _craftsmen.find(c => c.id === id) || null;
  localStorage.setItem('craft_craftsman_id', id);
  renderCraftOrders();
}

// ── itemKey (ต้องตรงกับ index.html) ──
function itemKey(i) {
  return `${i.productName}|${i.color||''}|${i.trimColor||''}`;
}

// ── กรองว่า item นี้ช่างคนนี้ทำได้ไหม ──
function craftsmanCanDo(item) {
  if (!_craftsman) return false;
  const types = _craftsman.productTypes || [];
  if (types.length === 0) return true; // ไม่กำหนด = ทำได้ทุกประเภท
  return types.includes(item.productName);
}

// ── แสดงรายการงาน ──
function renderCraftOrders() {
  if (!_craftsman) return;

  // กรองเฉพาะออเดอร์ที่มีอย่างน้อย 1 item ที่ช่างนี้ทำได้
  const relevant = _orders.filter(o =>
    (o.items || []).some(i => craftsmanCanDo(i))
  );

  const el = document.getElementById('craft-content');

  if (!relevant.length) {
    el.innerHTML = `<div class="empty-craft">
      <i class="fa-solid fa-circle-check" style="color:#16a34a;"></i>
      <p>ไม่มีรายการงานสำหรับ <strong>${_craftsman.name}</strong></p>
      <p style="font-size:13px;margin-top:6px;color:#9ca3af;">ทุกงานเสร็จหรือยังไม่มีออเดอร์ที่ตรงกับประเภทที่รับผิดชอบ</p>
    </div>`;
    return;
  }

  // เช็คว่าทุก item ที่ช่างทำได้ เสร็จหมดแล้วไหม
  const allItems = relevant.flatMap(o =>
    (o.items||[]).filter(i => craftsmanCanDo(i)).map(i => ({
      orderId: o.id,
      item: i,
      crafted: (o.craftStatus||{})[itemKey(i)]?.isCrafted || false
    }))
  );
  const allDone = allItems.length > 0 && allItems.every(x => x.crafted);

  let html = '';

  if (allDone) {
    html += `<div class="all-done-banner">
      <i class="fa-solid fa-party-horn"></i>
      <h3>เสร็จงานทั้งหมดแล้ว! 🎉</h3>
      <p>ทุกรายการที่รับผิดชอบแต่งเสร็จเรียบร้อย</p>
    </div>`;
  }

  html += relevant.map(o => {
    const myItems = (o.items||[]).filter(i => craftsmanCanDo(i));
    const cs = o.craftStatus || {};
    const dateStr = new Date(o.createdAt).toLocaleDateString('th-TH-u-ca-buddhist', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
    const itemRows = myItems.map(i => {
      const k = itemKey(i);
      const crafted = cs[k]?.isCrafted || false;
      const parts = [i.productName, i.color&&i.color!=='-'?i.color:'', i.trimColor].filter(Boolean);
      const label = parts.join(' ') + (i.extra ? ' '+i.extra : '');
      return `<div class="craft-item-row">
        <div class="craft-item-info">
          <div class="craft-item-name">${esc(label)}</div>
          <div class="craft-item-qty">จำนวน ${i.qty} ใบ</div>
        </div>
        <div class="craft-item-status">
          ${crafted
            ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <div class="badge-crafted"><i class="fa-solid fa-circle-check"></i>แต่งเสร็จแล้ว</div>
                <button class="btn-craft-undo" onclick="confirmUndo('${o.id}','${encodeURIComponent(JSON.stringify(i))}')">
                  <i class="fa-solid fa-rotate-left"></i>ยกเลิก
                </button>
               </div>`
            : `<button class="btn-craft-done" onclick="confirmDone('${o.id}','${encodeURIComponent(JSON.stringify(i))}')">
                <i class="fa-solid fa-check"></i>เสร็จแล้ว
               </button>`
          }
        </div>
      </div>`;
    }).join('');

    return `<div class="order-card">
      <div class="order-card-head">
        <div>
          <div class="cust-name">${esc(o.customerName||'-')}</div>
          <div class="order-meta">${esc(o.orderNo||'')} · ${dateStr}</div>
        </div>
      </div>
      <div class="order-card-body">${itemRows}</div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

// ── Confirm modal — กดเสร็จแล้ว ──
function confirmDone(orderId, encodedItem) {
  const item = JSON.parse(decodeURIComponent(encodedItem));
  const parts = [item.productName, item.color&&item.color!=='-'?item.color:'', item.trimColor].filter(Boolean);
  const label = parts.join(' ') + (item.extra ? ' '+item.extra : '');

  showConfirm({
    icon: '🎨',
    title: 'แต่งเสร็จแล้วใช่ไหม?',
    desc: 'ยืนยันว่าแต่งรายการนี้เสร็จเรียบร้อยแล้ว',
    itemLabel: label + ` × ${item.qty} ใบ`,
    yesLabel: 'ยืนยัน เสร็จแล้ว',
    yesColor: '#16a34a',
    onYes: () => markCrafted(orderId, item, true)
  });
}

// ── Confirm modal — ยกเลิก ──
function confirmUndo(orderId, encodedItem) {
  const item = JSON.parse(decodeURIComponent(encodedItem));
  const parts = [item.productName, item.color&&item.color!=='-'?item.color:'', item.trimColor].filter(Boolean);
  const label = parts.join(' ') + (item.extra ? ' '+item.extra : '');

  showConfirm({
    icon: '↩️',
    title: 'ยกเลิกสถานะใช่ไหม?',
    desc: 'ยืนยันว่าต้องการยกเลิก "แต่งเสร็จแล้ว" รายการนี้',
    itemLabel: label + ` × ${item.qty} ใบ`,
    yesLabel: 'ยืนยัน ยกเลิก',
    yesColor: '#dc2626',
    onYes: () => markCrafted(orderId, item, false)
  });
}

// ── Show confirm popup ──
let _confirmCb = null;
function showConfirm({ icon, title, desc, itemLabel, yesLabel, yesColor, onYes }) {
  _confirmCb = onYes;
  const div = document.createElement('div');
  div.className = 'confirm-overlay';
  div.id = 'craft-confirm';
  div.innerHTML = `<div class="confirm-box">
    <div class="icon">${icon}</div>
    <h3>${title}</h3>
    <p>${desc}</p>
    <div class="item-preview">${esc(itemLabel)}</div>
    <div class="confirm-actions">
      <button class="btn-confirm-yes" style="background:${yesColor};" onclick="doConfirm()">
        <i class="fa-solid fa-check me-1"></i>${yesLabel}
      </button>
      <button class="btn-confirm-cancel" onclick="closeConfirm()">ยกเลิก</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}
function doConfirm() {
  closeConfirm();
  if (_confirmCb) { _confirmCb(); _confirmCb = null; }
}
function closeConfirm() {
  document.getElementById('craft-confirm')?.remove();
}

// ── Mark crafted in Firestore ──
async function markCrafted(orderId, item, done) {
  const order = _orders.find(o => o.id === orderId);
  if (!order) return;
  const k = itemKey(item);
  const cs = { ...(order.craftStatus || {}) };
  if (done) {
    cs[k] = { isCrafted: true, craftedBy: _craftsman.id, craftedByName: _craftsman.name, craftedAt: Date.now() };
  } else {
    delete cs[k];
  }
  // อัปเดต Firestore
  await db.collection('orders').doc(orderId).update({ craftStatus: cs });
  // อัปเดต local cache
  order.craftStatus = cs;
  toast(done ? '✅ บันทึก "แต่งเสร็จแล้ว" แล้ว' : '↩️ ยกเลิกสถานะแล้ว');
  renderCraftOrders();
}

// ── Refresh ──
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  await loadData();
  renderCraftOrders();
  if (btn) btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>';
  toast('รีเฟรชแล้ว');
}

// ── XSS escape ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ──
window.addEventListener('DOMContentLoaded', init);
</script>

<!-- Header -->
<div id="header">
  <div>
    <h1>🔨 หน้าช่างแต่ง</h1>
    <div class="sub" id="craft-sub">เลือกชื่อช่างเพื่อดูงาน</div>
  </div>
  <button id="refreshBtn" onclick="refreshData()" title="รีเฟรช">
    <i class="fa-solid fa-rotate-right"></i>
  </button>
</div>

<!-- Select craftsman -->
<div id="craft-select-bar">
  <label for="craftsmanSel"><i class="fa-solid fa-hard-hat me-1"></i>ช่าง:</label>
  <select id="craftsmanSel" onchange="onCraftsmanChange()"></select>
</div>

<!-- Main content -->
<div id="craft-content">
  <div class="spinner-wrap">
    <i class="fa-solid fa-spinner fa-spin" style="font-size:28px;margin-bottom:10px;display:block;"></i>
    กำลังโหลด...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
