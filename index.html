<style>
* { font-family: 'Sarabun', sans-serif; }
body { background: #f0f2f5; margin: 0; }

/* ── Sidebar ── */
#sidebar {
  width: 240px; min-height: 100vh; background: #1a2332;
  position: fixed; top: 0; left: 0; z-index: 100;
  display: flex; flex-direction: column; transition: width .25s;
}
#sidebar .brand { padding: 22px 20px 18px; border-bottom: 1px solid #2d3f57; color: #fff; }
#sidebar .brand .biz-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
#sidebar .brand .biz-sub  { font-size: 11px; color: #8fa3bf; margin-top: 2px; }
#sidebar nav { padding: 12px 0; flex: 1; }
#sidebar .nav-link {
  color: #8fa3bf; padding: 11px 20px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  border: none; background: none; text-decoration: none; width: 100%; transition: all .18s;
}
#sidebar .nav-link i { width: 18px; text-align: center; font-size: 15px; }
#sidebar .nav-link:hover { color: #fff; background: #243040; }
#sidebar .nav-link.active { color: #fff; background: #2563eb; }
#sidebar .nav-section { font-size: 10px; color: #506070; padding: 14px 20px 4px; text-transform: uppercase; letter-spacing: 1px; }

/* ── Main ── */
#main { margin-left: 240px; min-height: 100vh; max-width: calc(100vw - 240px); overflow-x: hidden; }
#topbar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
#topbar h1 { font-size: 20px; font-weight: 700; margin: 0; color: #1a2332; }
#page-content { padding: 28px; box-sizing: border-box; }

/* ── Cards ── */
.stat-card {
  background: #fff; border-radius: 12px; padding: 22px 24px;
  border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.stat-card .label { font-size: 13px; color: #6b7280; font-weight: 500; }
.stat-card .value { font-size: 28px; font-weight: 700; color: #1a2332; margin: 4px 0 0; line-height: 1.2; }
.stat-card .sub   { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.stat-card .icon-wrap {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.card-box { background: #fff; border-radius: 12px; border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.card-box .card-head {
  padding: 16px 20px; border-bottom: 1px solid #f1f3f5;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.card-box .card-head h2 { font-size: 16px; font-weight: 700; margin: 0; color: #1a2332; }

/* ── Table ── */
.table-clean { width: 100%; border-collapse: collapse; }
.table-clean th {
  font-size: 12px; color: #6b7280; font-weight: 600; padding: 10px 16px;
  background: #f8f9fa; text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid #e8ecf0; white-space: nowrap;
}
.table-clean td { padding: 13px 16px; font-size: 14px; color: #374151; border-bottom: 1px solid #f1f3f5; vertical-align: middle; }
.table-clean tr:last-child td { border-bottom: none; }
.table-clean tr:hover td { background: #fafbfc; }

/* ── Forms ── */
.form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
.form-control, .form-select {
  font-size: 14px; border-radius: 8px; border-color: #d1d5db;
  font-family: 'Sarabun', sans-serif;
}
.form-control:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

/* ── Modal ── */
.modal-header { border-bottom: 1px solid #f1f3f5; padding: 18px 24px; }
.modal-footer { border-top: 1px solid #f1f3f5; padding: 14px 24px; }
.modal-title  { font-size: 17px; font-weight: 700; }
.modal-body   { padding: 24px; overflow-x: hidden; }
.modal-content { border-radius: 14px; border: none; }

/* ── Buttons ── */
.btn-primary  { background: #2563eb; border-color: #2563eb; font-weight: 600; }
.btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
.btn-sm { font-size: 13px; padding: 5px 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }

/* ── Misc ── */
.empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
.empty-state i { font-size: 42px; margin-bottom: 12px; display: block; }
.empty-state p { margin: 0; font-size: 15px; }
.search-box { position: relative; }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 13px; }
.search-box input { padding-left: 34px; }

/* ── Order item rows ── */
.items-table { width: 100%; border-collapse: collapse; }
.items-table th { font-size: 12px; color: #6b7280; font-weight: 600; padding: 8px 10px; background: #f8f9fa; border: 1px solid #e8ecf0; }
.items-table td { padding: 7px 8px; border: 1px solid #e8ecf0; font-size: 14px; vertical-align: middle; }
.items-table td input, .items-table td select {
  border: none; background: transparent; font-family: 'Sarabun',sans-serif;
  font-size: 14px; width: 100%; padding: 2px 4px;
}
.items-table td input:focus, .items-table td select:focus { outline: 1px solid #2563eb; border-radius: 4px; background: #f0f7ff; }

/* ── Total box ── */
.total-box { background: #f8f9fa; border-radius: 10px; padding: 14px 18px; }
.total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; color: #374151; }
.total-row.grand { font-size: 18px; font-weight: 700; color: #1a2332; border-top: 1px solid #e8ecf0; margin-top: 8px; padding-top: 10px; }

/* ── Customer price badge ── */
.price-custom { background: #dbeafe; color: #1e40af; font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }

/* ── Today highlight ── */
.today-card { background: linear-gradient(135deg,#1e3a5f,#2563eb); color: #fff; border-radius: 14px; padding: 20px 24px; }
.cust-today-card { background: linear-gradient(135deg,#134e4a,#0d9488); color: #fff; border-radius: 14px; padding: 20px 24px; overflow-y:auto;max-height:420px; }
.btn-card-outline { background:transparent;border:1px solid rgba(255,255,255,.55);color:#fff;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer; }
.btn-card-outline:hover { background:rgba(255,255,255,.15); }
.btn-card-solid { background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:600; }
.btn-card-solid:hover { background:rgba(255,255,255,.35); }
.today-card h3 { font-size: 15px; font-weight: 700; margin: 0 0 14px; opacity: .85; }
.today-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.12); font-size: 14px; }
.today-item:last-child { border-bottom: none; }

/* ── Scrollable ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; display: block; width: 100%; }

/* ── Print ── */
@media print {
  #sidebar, #main, #topbar, #modal-container { display: none !important; }
  #print-area { display: block !important; }
  body { background: #fff; }
  @page { size: A5 portrait; margin: 8mm 10mm; }

  /* บังคับให้สีและ background พิมพ์ออกมาครบ ไม่ซีด */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* ซ่อน toast และ modal backdrop ตอนปริ้น */
  .toast-notif, .modal-backdrop, .modal { display: none !important; }
}
#print-area { display: none; }

/* ── Receipt design — clean black & white ── */
.inv-page { font-family: 'Sarabun', sans-serif; color: #000; background: #fff; max-width: 680px; margin: 0 auto; }
.inv-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 10px; border-bottom: 2px solid #000; margin-bottom: 12px; }
.inv-company h1 { font-size: 18px; font-weight: 800; color: #000; margin: 0 0 3px; }
.inv-company p  { font-size: 11px; color: #333; margin: 2px 0; }
.inv-doc-info { text-align: right; }
.inv-doc-info .doc-type { font-size: 20px; font-weight: 800; color: #000; margin-bottom: 4px; }
.inv-doc-info table { margin-left: auto; font-size: 11px; }
.inv-doc-info td { padding: 1px 4px; color: #000; }
.inv-doc-info td:first-child { color: #555; padding-right: 8px; }
.inv-doc-info td:last-child { font-weight: 700; }
.inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.inv-party { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 8px 12px; }
.inv-party h3 { font-size: 9px; text-transform: uppercase; color: #555; margin: 0 0 4px; letter-spacing: 1px; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
.inv-party p  { font-size: 12px; margin: 1px 0; color: #000; }
.inv-items table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.inv-items th { background: #fff; color: #000; font-size: 11px; font-weight: 700; padding: 6px 10px; border-top: 2px solid #000; border-bottom: 1px solid #000; }
.inv-items td { padding: 6px 10px; border-bottom: 1px solid #ddd; font-size: 12px; color: #000; background: #fff; }
.inv-totals { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.inv-totals table { font-size: 12px; min-width: 220px; border-top: 1px solid #ccc; }
.inv-totals td { padding: 3px 8px; color: #000; }
.inv-totals .grand-row td { font-size: 15px; font-weight: 800; border-top: 2px solid #000; padding-top: 6px; }
.inv-notes { font-size: 11px; color: #333; border: 1px solid #ccc; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; background: #fff; }
.inv-sig { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 24px; }
.inv-sig-box { text-align: center; }
.inv-sig-box .sig-line { border-top: 1px solid #000; margin-top: 36px; padding-top: 5px; font-size: 11px; color: #333; }

/* ── Mobile ── */
@media (max-width: 768px) {
  #sidebar { width: 54px; }
  #sidebar .brand { padding: 14px 0; display: flex; justify-content: center; }
  #sidebar .brand .biz-name, #sidebar .brand .biz-sub, #sidebar .nav-link span, #sidebar .nav-section { display: none; }
  #sidebar .nav-link { padding: 12px 0; justify-content: center; border-radius: 0; }
  #sidebar .nav-link i { width: auto; font-size: 18px; }
  #main { margin-left: 54px; max-width: calc(100vw - 54px); }
  #topbar { padding: 12px 14px; }
  #topbar h1 { font-size: 16px; }
  #page-content { padding: 10px 10px; }
  .card-box { padding: 14px 12px; }
  .card-head { flex-wrap: wrap; gap: 8px; }
  .card-head h2 { font-size: 14px; }
  .table-clean th { padding: 9px 10px; font-size: 12px; }
  .table-clean td { padding: 10px 10px; font-size: 13px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .btn { font-size: 13px; padding: 6px 10px; }
  .btn-sm { font-size: 12px; padding: 4px 8px; }
  .modal-dialog { margin: 0.4rem; max-width: calc(100vw - 0.8rem) !important; }
  .modal-body { padding: 14px 16px; overflow-x: hidden; }
  .modal-header, .modal-footer { padding: 12px 16px; }
  .today-card, .cust-today-card { padding: 16px 14px; }
  .stat-card { padding: 12px 14px; }
  .stat-card .value { font-size: 22px; }
  .topbar-actions-btn { font-size: 12px !important; padding: 5px 10px !important; }

  /* order form table บนมือถือ — ซ่อน col ราคา+รวม ดูยอดจากด้านล่างแทน */
  .order-items-table th:nth-child(3),

  .order-items-table th:nth-child(4),
  .order-items-table td:nth-child(4) { display: none; }
  .order-items-table th, .order-items-table td { font-size: 12px; padding: 4px 4px; }
  .order-items-table th:nth-child(1), .order-items-table td:nth-child(1) { width: 75%; }
  .order-items-table th:nth-child(2), .order-items-table td:nth-child(2) { width: 15%; }
  .order-items-table th:nth-child(5), .order-items-table td:nth-child(5) { width: 10%; }
}

/* ── PWA Standalone (iPhone) safe-area ── */
@media (display-mode: standalone) {
  /* sidebar: position:fixed — padding-top ดัน content ลงมา bg ยังเต็มหน้าจอ */
  #sidebar {
    top: 0;
    padding-top: env(safe-area-inset-top, 44px);
    height: 100vh;
  }
  /* topbar: position:sticky — padding-top ดัน content ลงมา bg ยังคลุม status bar */
  #topbar {
    padding-top: calc(env(safe-area-inset-top, 44px) + 10px) !important;
  }
  /* modal เปิดมาใต้ status bar */
  .modal { padding-top: env(safe-area-inset-top, 44px) !important; }
  /* home bar ด้านล่าง */
  #page-content { padding-bottom: max(14px, env(safe-area-inset-bottom, 20px)); }
}
</style>

<script>
'use strict';
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const CFG = {
  businessName: 'ร้านขายส่งโลงศพ',
  businessAddress: '', businessPhone: '', businessTaxId: '',
};

// ═══════════════════════════════════════
//  DATABASE (Firebase Firestore)
// ═══════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAC85V_FLtSDR0BR3tJEvDDpv1hSIx2Zug",
  authDomain: "kailoong-e63ed.firebaseapp.com",
  projectId: "kailoong-e63ed",
  storageBucket: "kailoong-e63ed.firebasestorage.app",
  messagingSenderId: "388629310479",
  appId: "1:388629310479:web:9eb9565ac22ad5914b477a",
  measurementId: "G-FZ92CYLVT2"
};

const COFFIN_SPEC = {
  'ธรรมดา':           {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']},
  'บ่าง':             {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']},
  'ย้อย':             {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']},
  'กลาง':             {colors:['ขาว','แดง'], lines:['ทอง','เงิน','คริสต์'], extra:['หน้า 24 นิ้ว','หน้า 26 นิ้ว','หน้า 28 นิ้ว']},
  'มุกน้อย':          {colors:[],            lines:['เงิน','ทอง','ผ้าจีบ']},
  'มุกใหญ่':          {colors:['ขาว','แดง'], lines:['เงิน','ทอง','ผ้าจีบ']},
  'สิงห์น้อย':        {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']},
  'สิงห์น้อย 3 ชั้น': {colors:['ขาว','แดง'], lines:['ทอง','เงิน']},
  'สิงห์ใหญ่':        {colors:['ขาว','แดง'], lines:['ทอง','เงิน']},
  'พิกุล':            {colors:[],            lines:['ทอง','เงิน']},
};
function todayLocal(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const DB = {
  _fs: null,
  _cache: {},         // { col: { ts, data } }
  _CACHE_TTL: 90000,  // 90 วินาที

  async init() {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    this._fs = firebase.firestore();
  },

  // ── Generic CRUD ──
  async _all(col) {
    const now = Date.now();
    const c = this._cache[col];
    if (c && now - c.ts < this._CACHE_TTL) return c.data;
    const snap = await this._fs.collection(col).get();
    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    this._cache[col] = { ts: now, data };
    return data;
  },
  _bust(col) { delete this._cache[col]; },
  async _get(col, id) {
    // ดึงจาก cache ก่อน ไม่ต้องยิง Firestore แยก
    const c = this._cache[col];
    if (c) { const found = c.data.find(r => String(r.id) === String(id)); if (found) return found; }
    const snap = await this._fs.collection(col).doc(String(id)).get();
    return snap.exists ? { id: snap.id, ...snap.data() } : null;
  },
  async _add(col, d) {
    const { id: _id, ...rest } = d;
    const data = { ...rest, createdAt: rest.createdAt || Date.now() };
    let newId;
    if (_id) {
      // restore: preserve original ID
      await this._fs.collection(col).doc(String(_id)).set(data);
      newId = String(_id);
    } else {
      const ref = await this._fs.collection(col).add(data);
      newId = ref.id;
    }
    // อัพเดท cache ทันที แทนที่จะล้างทิ้ง
    const c = this._cache[col];
    if (c) c.data.push({ id: newId, ...data });
    return newId;
  },
  async _put(col, d) {
    const { id, ...rest } = d;
    await this._fs.collection(col).doc(String(id)).set(rest, { merge: true });
    // อัพเดท cache record ตรง ๆ
    const c = this._cache[col];
    if (c) { const i = c.data.findIndex(r => String(r.id) === String(id)); if (i >= 0) c.data[i] = { id, ...rest }; }
    return id;
  },
  async _del(col, id) {
    await this._fs.collection(col).doc(String(id)).delete();
    const c = this._cache[col];
    if (c) c.data = c.data.filter(r => String(r.id) !== String(id));
  },

  // ── Settings ──
  async getSetting(key) {
    const snap = await this._fs.collection('settings').doc(key).get();
    return snap.exists ? snap.data().value : null;
  },
  async setSetting(key, value) {
    await this._fs.collection('settings').doc(key).set({ value });
  },
  async loadSettings() {
    // ดึงทั้ง collection ครั้งเดียว แทน 4 queries แยก
    const snap = await this._fs.collection('settings').get();
    const map = {}; snap.docs.forEach(d => { map[d.id] = d.data().value; });
    for (const k of ['businessName','businessAddress','businessPhone','businessTaxId']) {
      if (map[k] !== undefined) CFG[k] = map[k];
    }
  },

  // ── Sequence helpers ──
  async nextOrderNo() {
    const all = await this.getOrders();
    const yr  = new Date().getFullYear()+543;
    const prefix = `ORD-${yr}-`;
    const nums = all.filter(o=>o.orderNo?.startsWith(prefix)).map(o=>parseInt(o.orderNo.slice(prefix.length))||0);
    return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(4,'0')}`;
  },
  async nextReceiptNo() {
    const all = await this.getInvoices();
    const yr  = new Date().getFullYear()+543;
    const prefix = `RC-${yr}-`;
    const nums = all.filter(i=>i.invoiceNo?.startsWith(prefix)).map(i=>parseInt(i.invoiceNo.slice(prefix.length))||0);
    return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(4,'0')}`;
  },
  async getEffectivePrice(customerId, productId, defaultPrice, trimColor='') {
    const c = await this.getCustomer(customerId);
    if (c?.customPrices?.[productId] !== undefined) return c.customPrices[productId];
    if (trimColor) {
      const p = await this.getProduct(productId);
      if (p?.priceMap?.[trimColor] != null) return p.priceMap[trimColor];
    }
    return defaultPrice;
  },

  // ── Per-store shortcuts ──
  getCustomers()   { return this._all('customers'); },
  getCustomer(id)  { return this._get('customers',id); },
  addCustomer(d)   { return this._add('customers',d); },
  putCustomer(d)   { return this._put('customers',d); },
  delCustomer(id)  { return this._del('customers',id); },

  getProducts()    { return this._all('products'); },
  getProduct(id)   { return this._get('products',id); },
  addProduct(d)    { return this._add('products',d); },
  putProduct(d)    { return this._put('products',d); },
  delProduct(id)   { return this._del('products',id); },

  getOrders()      { return this._all('orders'); },
  getOrder(id)     { return this._get('orders',id); },
  addOrder(d)      { return this._add('orders',d); },
  putOrder(d)      { return this._put('orders',d); },
  delOrder(id)     { return this._del('orders',id); },

  getInvoices()    { return this._all('invoices'); },
  getInvoice(id)   { return this._get('invoices',id); },
  addInvoice(d)    { return this._add('invoices',d); },
  putInvoice(d)    { return this._put('invoices',d); },
  delInvoice(id)   { return this._del('invoices',id); },

  getExpenses()    { return this._all('expenses'); },
  getExpense(id)   { return this._get('expenses',id); },
  addExpense(d)    { return this._add('expenses',d); },
  putExpense(d)    { return this._put('expenses',d); },
  delExpense(id)   { return this._del('expenses',id); },
};

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const U = {
  money(n)  { return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); },
  date(ts)  { if(!ts)return'-'; return new Date(ts).toLocaleDateString('th-TH-u-ca-buddhist',{year:'numeric',month:'short',day:'numeric'}); },
  datetime(ts) { if(!ts)return'-'; return new Date(ts).toLocaleDateString('th-TH-u-ca-buddhist',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); },
  dateInput(ts) { if(!ts)return''; return new Date(ts).toISOString().split('T')[0]; },
  esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
  orderTotal(o) {
    const sub=(o.items||[]).reduce((a,i)=>a+(i.qty*i.price),0);
    return sub-(o.discount||0);
  },
  invTotal(inv) {
    const sub=(inv.items||[]).reduce((a,i)=>a+(i.qty*i.price),0);
    const disc=inv.discount||0;
    const base=sub-disc;
    const tax=inv.taxRate?base*inv.taxRate/100:0;
    return {sub,disc,base,tax,total:base+tax};
  },
  isToday(ts) {
    const d=new Date(ts), n=new Date();
    return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
  },
  toast(msg,type='success') {
    const el=document.createElement('div');
    el.className='toast-notif';
    el.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;min-width:240px;';
    el.innerHTML=`<div class="alert alert-${type==='success'?'success':'danger'} shadow-sm d-flex align-items-center gap-2" style="border-radius:10px;font-size:14px;">
      <i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-xmark'}"></i>${msg}</div>`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  },
};

function showModal(id,title,body,footer,size='') {
  const old=document.getElementById(id); if(old)old.remove();

  div.className='modal fade'; div.id=id; div.tabIndex=-1;
  div.innerHTML=`<div class="modal-dialog ${size} modal-dialog-scrollable"><div class="modal-content">

    <td><strong>${U.esc(o.customerName||'-')}</strong></td>

        return `<span style="display:inline-block;background:#f1f5f9;border-radius:4px;padding:2px 8px;font-size:12px;margin:2px 2px 2px 0;">${label} ×${i.qty}</span>`;

    </td>
  </tr>`).join('');
}

function applyOrderFilter() {
  const custId  = document.getElementById('filterCust')?.value||'';
  const date    = document.getElementById('filterDate')?.value||'';
  const search  = (document.getElementById('filterSearch')?.value||'').toLowerCase();
  let list = window._allOrders||[];
  if (custId)  list = list.filter(o=>String(o.customerId)===custId);
  if (date)    list = list.filter(o=>new Date(o.createdAt).toISOString().startsWith(date));
  if (search)  list = list.filter(o=>o.orderNo?.toLowerCase().includes(search)||o.customerName?.toLowerCase().includes(search)||(o.items||[]).some(i=>i.productName?.toLowerCase().includes(search)));
  document.getElementById('ordersTbody').innerHTML = renderOrderRows(list);
}

function addItemRow(i, custId, products) {
  const opts=(products||window._addItemsProducts||[]).map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${U.esc(p.name)}">${U.esc(p.name)}</option>`).join('');
  return `<tr id="airow_${i}">
    <td><select class="form-select form-select-sm" onchange="onAddItemProdChange(this,${i},${custId})" id="aiprod_${i}">
      <option value="">-- เลือกสินค้า --</option>${opts}</select></td>
    <td><input type="number" class="form-control form-control-sm" id="aiqty_${i}" value="1" min="1" oninput="updateAddItemTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="aiprice_${i}" value="0" min="0" oninput="updateAddItemTotal()"></td>
    <td><span id="aitotal_${i}" style="font-size:13px;font-weight:600;">฿0.00</span></td>
    <td><button type="button" class="btn btn-sm btn-outline-danger btn-icon" onclick="document.getElementById('airow_${i}').remove();updateAddItemTotal()"><i class="fa-solid fa-trash"></i></button></td>
  </tr>`;

function appendAddItemRow() {
  const i=window._addItemsIdx++;
  document.getElementById('addItemsBody').insertAdjacentHTML('beforeend',addItemRow(i,window._addItemsCustId,window._addItemsProducts));
}

async function onAddItemProdChange(sel,i,custId) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value;
  if (!prodId) return;
  const defaultPrice=parseFloat(opt.dataset.price||0);
  const price=await DB.getEffectivePrice(custId,prodId,defaultPrice);
  const priceEl=document.getElementById(`aiprice_${i}`);
  if (priceEl) priceEl.value=price;
  updateAddItemTotal();
}

function updateAddItemTotal() {
  let sum=0;
  document.querySelectorAll('#addItemsBody tr').forEach(row=>{
    const m=row.id?.match(/airow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`aiqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`aiprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`aitotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sum+=t;
  });
  const el=document.getElementById('addItemTotal'); if(el)el.textContent='฿'+U.money(sum);
}

async function saveAddItems(orderId) {
  const order=await DB.getOrder(orderId); if(!order)return;
  const newItems=[];
  document.querySelectorAll('#addItemsBody tr').forEach(row=>{
    const m=row.id?.match(/airow_(\d+)/); if(!m)return;
    const i=m[1];
    const sel=document.getElementById(`aiprod_${i}`);
    const prodId=sel?.value; if(!prodId)return;
    const opt=sel.options[sel.selectedIndex];
    const qty=parseFloat(document.getElementById(`aiqty_${i}`)?.value||1);
    const price=parseFloat(document.getElementById(`aiprice_${i}`)?.value||0);
    const productName=opt.dataset.name||opt.text||'';
    // Merge with existing item of same product if exists
    const existingIdx=(order.items||[]).findIndex(x=>x.productId===prodId);
    if (existingIdx>=0) {
      order.items[existingIdx].qty+=qty;
    } else {
      newItems.push({productId:prodId,productName,qty,price});
    }
  });
  if (!newItems.length && !document.querySelectorAll('#addItemsBody tr').length) {
    U.toast('กรุณาเพิ่มรายการสินค้า','error'); return;
  }
  const extraNotes=document.getElementById('addItemNotes')?.value.trim();
  order.items=[...(order.items||[]),...newItems];
  if (extraNotes) order.notes=(order.notes?order.notes+' | ':'')+extraNotes;
  await DB.putOrder(order);
  U.toast('เพิ่มรายการเข้าออเดอร์แล้ว ✓');
  closeModal('addItemsModal');
  navigate('orders');
}

function updateItemSpec(i, prodName) {
  const spec = COFFIN_SPEC[prodName] || {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']};
  const hasColor = spec.colors.length > 0;
  const SS='font-size:15px;font-weight:600;border:2px solid #d1d5db;border-radius:8px;padding:7px 10px;width:100%;background:#fff;cursor:pointer;';
  const lineIcons = {ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷'};
  const lineOpts = spec.lines.map(l=>`<option value="${l}">${lineIcons[l]||''} ${l}</option>`).join('');
  const colorOpts = hasColor
    ? spec.colors.map(c=>`<option value="${c}">${c==='ขาว'?'⬜':'🟥'} ${c}</option>`).join('')
    : '<option value="-">-</option>';
  const extraHtml = spec.extra ? `<div style="margin-top:6px;">
      <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">📐 ขนาด</div>
      <select id="oiextra_${i}" style="${SS}font-size:14px;">
        <option value="">-- ไม่ระบุ --</option>
        ${spec.extra.map(e=>`<option value="${e}">${e}</option>`).join('')}
      </select></div>` : '';
  const wrap = document.getElementById(`oispec_${i}`);
  if (!wrap) return;
  wrap.innerHTML = `<div style="display:grid;grid-template-columns:${hasColor?'1fr 1fr':'1fr'};gap:6px;margin-top:7px;">
    ${hasColor?`<div><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">🎨 สีโลง</div><select id="oicolor_${i}" style="${SS}font-size:14px;">${colorOpts}</select></div>`:''}
    <div><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">✨ สีเส้น</div><select id="oitrim_${i}" style="${SS}font-size:14px;" onchange="updateItemPrice(${i})">${lineOpts}</select></div>
  </div>${extraHtml}`;
}

function onOrderCustChange(sel) {
  window._orderCustId=sel.value||null;
  // re-apply prices for all selected products
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const prodSel=document.getElementById(`oiprod_${m[1]}`);
    if (prodSel?.value) onOrderProdChange(prodSel,m[1]);
  });
}

async function onOrderProdChange(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const prodName=opt.dataset.name||opt.text||'';
  updateItemSpec(i, prodName);
  await updateItemPrice(i);
}

function calcOrderTotal() {
  let sub=0;
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`oitotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('of_discount')?.value||0);
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('os_sub',sub); s('os_disc',disc); s('os_total',sub-disc);
}

async function updateItemPrice(i) {
  const prodSel=document.getElementById(`oiprod_${i}`);
  if (!prodSel?.value) return;
  const prodId=prodSel.value;
  const trimColor=document.getElementById(`oitrim_${i}`)?.value||'';
  const prod=(window._orderProds||[]).find(p=>p.id===prodId);
  if (!prod) return;
  let price=(trimColor && prod.priceMap?.[trimColor]!=null) ? prod.priceMap[trimColor] : prod.price;
  if (window._orderCustId) price=await DB.getEffectivePrice(window._orderCustId,prodId,price,trimColor);
  const priceEl=document.getElementById(`oiprice_${i}`);
  if (priceEl) { priceEl.value=price; calcOrderTotal(); }
}

async function saveOrder() {
  const custId=document.getElementById('of_cust')?.value||'';
  if (!custId){U.toast('กรุณาเลือกลูกค้า','error');return;}
  const cust=await DB.getCustomer(custId);

  const items=[]; let anyItem=false;
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const i=m[1];
    const sel=document.getElementById(`oiprod_${i}`);
    const prodId=sel?.value; if(!prodId)return;
    const opt=sel.options[sel.selectedIndex];
    const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||1);
    const price=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
    const color      = document.getElementById(`oicolor_${i}`)?.value||'';
    const trimColor  = document.getElementById(`oitrim_${i}`)?.value||'';
    const extra      = document.getElementById(`oiextra_${i}`)?.value||'';
    const specialNote= document.getElementById(`oisp_${i}`)?.value.trim()||'';
    items.push({productId:prodId,productName:opt.dataset.name||opt.text,qty,price,color,trimColor,extra,specialNote});
    anyItem=true;
  });
  if (!anyItem){U.toast('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ','error');return;}

  const editId=document.getElementById('of_editId')?.value||'';
  const dateStr=document.getElementById('of_date')?.value;
  const createdAt=dateStr?new Date(dateStr).setHours(new Date().getHours(),new Date().getMinutes(),0,0):Date.now();

  const data={
    customerId:custId, customerName:cust?.name||'',
    items,
    discount:parseFloat(document.getElementById('of_discount')?.value||0),
    notes:document.getElementById('of_notes')?.value.trim()||'',
    createdAt,
  };
  if (editId) {
    const old=await DB.getOrder(editId);
    await DB.putOrder({...old,...data,id:editId});
    U.toast('แก้ไขออเดอร์แล้ว ✓');
  } else {
    data.orderNo=await DB.nextOrderNo();
    await DB.addOrder(data);
    U.toast('บันทึกออเดอร์แล้ว ✓');
  }
  closeModal('orderModal');
  navigate('orders');
}

  await DB.delOrder(id); U.toast('ลบออเดอร์แล้ว');

}

    <td><input type="number" class="form-control form-control-sm" id="rcprice_${i}" value="${item.price||0}" min="0" oninput="calcRcTotal()"></td>

// เปิด receipt modal ใหม่โดยข้ามการตรวจสอบใบซ้ำ (กรณีผู้ใช้ยืนยันสร้างใหม่)
function _forceNewInvoice(encodedName) {

function pullOrdersToReceipt() {
  const custId=window._rcCustId;
  if (!custId){U.toast('กรุณาเลือกลูกค้าก่อน','error');return;}
  const dateStr=document.getElementById('rc_pullDate')?.value;
  if (!dateStr){U.toast('กรุณาเลือกวันที่','error');return;}
  const date=new Date(dateStr);

  const orders=(window._rcAllOrders||[]).filter(o=>{
    const d=new Date(o.createdAt);
    return o.customerId===custId &&
      d.getFullYear()===date.getFullYear() &&
      d.getMonth()===date.getMonth() &&
      d.getDate()===date.getDate();
  });

  if (!orders.length){
    U.toast(`ไม่พบออเดอร์ของลูกค้านี้ในวันที่ ${date.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}`, 'error');
    return;
  }

  // รวมรายการทั้งหมดจากทุกออเดอร์
  const merged = {};
  orders.forEach(o=>(o.items||[]).forEach(i=>{
    const key = i.productName+'|'+i.price+'|'+(i.color||'')+'|'+(i.trimColor||'')+'|'+(i.style||'')+'|'+(i.specialNote||'');
    if (merged[key]) { merged[key].qty+=i.qty; }
    else { merged[key]={name:itemLabel(i),qty:i.qty,price:i.price}; }
  }));

  const items=Object.values(merged);
  window._rcItemIdx=items.length;
  document.getElementById('rcItemsBody').innerHTML=items.map((item,i)=>rcItemRow(i,item)).join('');
  calcRcTotal();
  U.toast(`✓ ดึง ${items.length} รายการ จาก ${orders.length} ออเดอร์ของวันนี้`);
}

function itemLabel(i) {
  let label=i.productName||'';
  if (i.color && i.color!=='-') label+=' '+i.color;
  const isChrist = i.trimColor==='คริสต์' || i.style==='คริสต์';
  if (isChrist) label+=' ✝คริสต์';
  else if (i.trimColor) label+=' เส้น'+i.trimColor;
  if (i.extra)       label+=' '+i.extra;
  if (i.specialNote) label+=' ('+i.specialNote+')';
  return label;
}

async function onRcProdSelect(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const defaultPrice=parseFloat(opt.dataset.price||0);
  let price=defaultPrice;
  if (window._rcCustId) price=await DB.getEffectivePrice(window._rcCustId,prodId,defaultPrice);
  const nameEl=document.getElementById(`rcname_${i}`);
  const priceEl=document.getElementById(`rcprice_${i}`);
  if (nameEl) nameEl.value=opt.dataset.name||opt.text;
  if (priceEl) priceEl.value=price;
  sel.value=''; calcRcTotal();
}

function calcRcTotal() {
  let sub=0;
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`rctotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('rc_disc')?.value||0);
  const taxRate=parseFloat(document.getElementById('rc_tax')?.value||0);
  const base=sub-disc; const tax=base*taxRate/100;
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('rcs_sub',sub);s('rcs_disc',disc);s('rcs_tax',tax);s('rcs_total',base+tax);
}

async function saveReceipt(andPrint=false) {
  const custId=document.getElementById('rc_cust')?.value||'';
  if (!custId){U.toast('กรุณาเลือกลูกค้า','error');return;}
  const cust=(window._rcCustList||[]).find(c=>c.id===custId)||{};

  const items=[];
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const name=document.getElementById(`rcname_${i}`)?.value.trim();
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const price=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    if (name) items.push({name,qty,price});
  });
  if (!items.length){U.toast('กรุณาเพิ่มรายการสินค้า','error');return;}

  const editId=document.getElementById('rc_editId')?.value||'';
  const data={
    type:'receipt',
    customerId:custId, customerName:cust.name||'',
    customerAddress:document.getElementById('rc_addr')?.value.trim()||'',
    customerPhone:cust.phone||'', customerTaxId:cust.taxId||'',
    items,
    discount:parseFloat(document.getElementById('rc_disc')?.value||0),
    taxRate:parseFloat(document.getElementById('rc_tax')?.value||0),
    notes:document.getElementById('rc_notes')?.value.trim()||'',
  };

  let savedId;
  if (editId){const old=await DB.getInvoice(editId);await DB.putInvoice({...old,...data});savedId=editId;U.toast('แก้ไขใบเสร็จแล้ว ✓');}
  else{data.invoiceNo=await DB.nextReceiptNo();savedId=await DB.addInvoice(data);U.toast('ออกใบเสร็จแล้ว ✓');}
  closeModal('rcModal');
  if (andPrint){
    const inv=await DB.getInvoice(savedId);
    // รอ Bootstrap modal animation ปิดสนิท (~350ms) ก่อนสั่งปริ้น
    // เพื่อให้ backdrop หายออกไปก่อน จะได้ไม่มืด
    setTimeout(()=>printReceiptData(inv), 400);
  }
  navigate('invoices');
}

async function renderReports(el) {
  const [orders,invoices,customers,expenses]=await Promise.all([DB.getOrders(),DB.getInvoices(),DB.getCustomers(),DB.getExpenses()]);
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();

  // ── วันนี้ ──
  const todayOrders=orders.filter(o=>U.isToday(o.createdAt));
  const todayItemsMap={};
  todayOrders.forEach(o=>(o.items||[]).forEach(i=>{
    if(!todayItemsMap[i.productName])todayItemsMap[i.productName]={qty:0,total:0};
    todayItemsMap[i.productName].qty+=i.qty;
    todayItemsMap[i.productName].total+=i.qty*i.price;
  }));
  const todayTotal=todayOrders.reduce((a,o)=>a+U.orderTotal(o),0);

  // ── เดือน ──
  const monthIncome=invoices.filter(i=>i.createdAt>=monthStart).reduce((a,i)=>a+U.invTotal(i).total,0);

  // ── 6 เดือน ──
  const months=Array.from({length:6},(_,k)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+k,1);
    return {year:d.getFullYear(),month:d.getMonth(),label:d.toLocaleDateString('th-TH-u-ca-buddhist',{month:'short',year:'2-digit'})};

// ── BACKUP ──
async function backupData() {
  try {
    const [customers, products, orders, invoices, expenses] = await Promise.all([
      DB.getCustomers(), DB.getProducts(), DB.getOrders(), DB.getInvoices(), DB.getExpenses()
    ]);
    const backup = {
      version: 2,
      exportedAt: Date.now(),
      exportedBy: CFG.businessName,
      data: { customers, products, orders, invoices, expenses }
    };
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const now  = new Date();
    const pad  = n => String(n).padStart(2,'0');
    const fname= `backup_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.json`;
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    await DB.setSetting('lastBackup', Date.now());
    U.toast(`✅ สำรองข้อมูลแล้ว — ${fname}`);
    setTimeout(() => navigate('settings'), 800);
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: ' + e.message, 'error');
  }
}

      if (!backup?.data) { U.toast('ไฟล์ไม่ถูกต้อง ไม่พบข้อมูล', 'error'); return; }

      const { customers=[], products=[], orders=[], invoices=[], expenses=[] } = backup.data;
      const exportDate = backup.exportedAt ? U.datetime(backup.exportedAt) : 'ไม่ทราบ';

      const body = `
        <div style="background:#fef3c7;border-radius:10px;padding:14px 18px;margin-bottom:16px;border-left:4px solid #f59e0b;">
          <strong style="color:#92400e;">⚠️ คำเตือน:</strong>

          โดย: <strong style="color:#374151;">${U.esc(backup.exportedBy||'-')}</strong>
        </div>
        <div style="background:#f8f9fa;border-radius:10px;padding:14px 18px;">
          <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:10px;">ข้อมูลในไฟล์ที่จะนำเข้า</div>

            <div class="col"><div style="font-size:20px;font-weight:700;color:#dc2626;">${expenses.length}</div><div style="font-size:11px;color:#6b7280;">รายจ่าย</div></div>
          </div>
        </div>`;

      showModal('restoreConfirmModal', 'ยืนยันการกู้คืนข้อมูล', body,
        `<button class="btn btn-danger" onclick="confirmRestore()">
           <i class="fa-solid fa-rotate-left me-1"></i>ยืนยัน กู้คืนข้อมูล
         </button>
         <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);

      window._pendingRestore = backup.data;

    } catch(err) {
      U.toast('อ่านไฟล์ไม่ได้: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';

async function confirmRestore() {
  const data = window._pendingRestore;
  if (!data) { U.toast('ไม่พบข้อมูลสำหรับกู้คืน', 'error'); return; }

  try {
    closeModal('restoreConfirmModal');
    U.toast('กำลังกู้คืนข้อมูล...');

    const stores = ['customers','products','orders','invoices','expenses'];
    for (const store of stores) {
      const all = await DB._all(store);
      for (const item of all) await DB._del(store, item.id);
    }

    for (const cust of (data.customers||[])) {
      const { id, ...rest } = cust;
      await DB._add('customers', { ...rest, id });
    }
    for (const prod of (data.products||[])) { await DB._put('products', prod); }
    for (const order of (data.orders||[])) { await DB._put('orders', order); }
    for (const inv of (data.invoices||[])) { await DB._put('invoices', inv); }
    for (const exp of (data.expenses||[])) { await DB._put('expenses', exp); }

    await DB.setSetting('lastBackup', Date.now());
    window._pendingRestore = null;
    U.toast('✅ กู้คืนข้อมูลสำเร็จแล้ว!');
    setTimeout(() => navigate('dashboard'), 800);
  } catch(err) {
    U.toast('เกิดข้อผิดพลาดระหว่างกู้คืน: ' + err.message, 'error');
  }
}

// ═══════════════════════════════════════
//  EXPENSES PAGE
// ═══════════════════════════════════════
async function renderExpenses(el) {
  const expenses = await DB.getExpenses();
  expenses.sort((a,b) => b.date - a.date);

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const thisMonthExp = expenses.filter(e => e.date >= monthStart).reduce((s,e) => s+(e.amount||0), 0);
  const totalAll     = expenses.reduce((s,e) => s+(e.amount||0), 0);

  const byCat = {};
  expenses.forEach(e => { const c=e.category||'อื่นๆ'; byCat[c]=(byCat[c]||0)+(e.amount||0); });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  el.innerHTML = `
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card d-flex align-items-center gap-3">
        <div class="icon-wrap" style="background:#fee2e2;color:#dc2626;"><i class="fa-solid fa-money-bill-wave"></i></div>
        <div><div class="label">รายจ่ายเดือนนี้</div><div class="value" style="color:#dc2626;">฿${U.money(thisMonthExp)}</div></div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card d-flex align-items-center gap-3">
        <div class="icon-wrap" style="background:#fef3c7;color:#d97706;"><i class="fa-solid fa-list"></i></div>
        <div><div class="label">รายการทั้งหมด</div><div class="value">${expenses.length} รายการ</div></div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card d-flex align-items-center gap-3">
        <div class="icon-wrap" style="background:#fce7f3;color:#be185d;"><i class="fa-solid fa-sigma"></i></div>
        <div><div class="label">รายจ่ายรวมทั้งหมด</div><div class="value" style="color:#be185d;">฿${U.money(totalAll)}</div></div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-xl-8">
      <div class="card-box">
        <div class="card-head">
          <h2><i class="fa-solid fa-receipt me-2 text-danger"></i>รายจ่ายโรงงาน</h2>
          <button class="btn btn-danger btn-sm" onclick="showExpenseModal()">
            <i class="fa-solid fa-plus me-1"></i>เพิ่มรายจ่าย
          </button>
        </div>
        <div class="table-scroll">
          <table class="table-clean">
            <thead>
              <tr>
                <th>วันที่</th>
                <th>หมวดหมู่</th>
                <th>รายละเอียด</th>
                <th style="text-align:right;">จำนวนเงิน</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${expenses.length ? expenses.map(exp => `
              <tr>
                <td style="white-space:nowrap;font-size:13px;">${new Date(exp.date).toLocaleDateString('th-TH-u-ca-buddhist',{year:'numeric',month:'short',day:'numeric'})}</td>
                <td><span style="display:inline-block;padding:2px 8px;border-radius:20px;background:#fee2e2;color:#dc2626;font-size:11px;font-weight:600;">${U.esc(exp.category||'อื่นๆ')}</span></td>
                <td style="font-size:13px;">${U.esc(exp.note||'-')}</td>
                <td style="text-align:right;font-weight:600;color:#dc2626;">฿${U.money(exp.amount||0)}</td>
                <td style="text-align:right;white-space:nowrap;">
                  <button class="btn btn-sm" style="background:#f3f4f6;color:#374151;border:none;margin-right:4px;" onclick="showExpenseModal('${exp.id}')">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;" onclick="deleteExpense('${exp.id}')">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </td>
              </tr>`).join('') : emptyRow(5,'ยังไม่มีรายจ่าย','fa-receipt')}
            </tbody>
            ${expenses.length ? `
            <tfoot>
              <tr style="background:#fff5f5;">
                <td colspan="3" style="font-weight:700;color:#dc2626;">รวมทั้งหมด</td>
                <td style="text-align:right;font-weight:700;color:#dc2626;font-size:16px;">฿${U.money(totalAll)}</td>
                <td></td>
              </tr>
            </tfoot>` : ''}
          </table>
        </div>
      </div>
    </div>

    <div class="col-xl-4">
      <div class="card-box">
        <div class="card-head"><h2><i class="fa-solid fa-chart-pie me-2 text-danger"></i>แยกตามหมวดหมู่</h2></div>
        <div class="p-3">
          ${catEntries.length ? catEntries.map(([cat,amt])=>`
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
              <span style="font-weight:600;">${U.esc(cat)}</span>
              <span style="color:#dc2626;font-weight:600;">฿${U.money(amt)}</span>
            </div>
            <div style="height:6px;background:#f3f4f6;border-radius:3px;">
              <div style="height:6px;background:#dc2626;border-radius:3px;width:${totalAll?Math.round(amt/totalAll*100):0}%;"></div>
            </div>
            <div style="font-size:11px;color:#9ca3af;text-align:right;">${totalAll?Math.round(amt/totalAll*100):0}%</div>
          </div>`).join('') : '<div class="empty-state" style="padding:20px"><i class="fa-solid fa-chart-pie"></i><p>ยังไม่มีข้อมูล</p></div>'}
        </div>
      </div>
    </div>
  </div>`;
}

async function showExpenseModal(id) {
  const CATS = ['วัตถุดิบ','ค่าแรง','ค่าไฟ/น้ำ','ค่าเช่า','ขนส่ง','ซ่อมแซม','อื่นๆ'];
  const exp = id ? await DB.getExpense(id) : null;
  const today = new Date().toISOString().slice(0,10);

  const body = `
    <div class="row g-3">
      <div class="col-sm-6">
        <label class="form-label">วันที่ <span class="text-danger">*</span></label>
        <input type="date" class="form-control" id="exp_date" value="${exp ? new Date(exp.date).toISOString().slice(0,10) : today}">
      </div>
      <div class="col-sm-6">
        <label class="form-label">หมวดหมู่</label>
        <select class="form-select" id="exp_cat">
          ${CATS.map(c=>`<option value="${c}" ${exp?.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">รายละเอียด</label>
        <input type="text" class="form-control" id="exp_note" placeholder="เช่น ซื้อไม้สัก 100 แผ่น" value="${U.esc(exp?.note||'')}">
      </div>
      <div class="col-12">
        <label class="form-label">จำนวนเงิน (บาท) <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="exp_amount" placeholder="0" min="0" step="1" value="${exp?.amount||''}">
      </div>
    </div>`;

  window._editExpenseId = id || null;
  showModal('expenseModal', id ? 'แก้ไขรายจ่าย' : 'เพิ่มรายจ่าย', body,
    `<button class="btn btn-danger" onclick="saveExpense()"><i class="fa-solid fa-save me-1"></i>บันทึก</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
  setTimeout(()=>document.getElementById('exp_amount')?.focus(),300);
}

async function saveExpense() {
  const dateVal   = document.getElementById('exp_date')?.value;
  const amountStr = document.getElementById('exp_amount')?.value;
  const amount    = parseFloat(amountStr);
  if (!dateVal)                              { U.toast('กรุณาเลือกวันที่','error'); return; }
  if (!amountStr||amount<=0||isNaN(amount))  { U.toast('กรุณากรอกจำนวนเงินที่ถูกต้อง','error'); return; }

  const data = {
    date:     new Date(dateVal).getTime(),
    category: document.getElementById('exp_cat')?.value  || 'อื่นๆ',
    note:     document.getElementById('exp_note')?.value.trim() || '',
    amount
  };

  if (window._editExpenseId) {
    await DB.putExpense({ ...data, id: window._editExpenseId });
    U.toast('แก้ไขรายจ่ายแล้ว ✓');
  } else {
    await DB.addExpense(data);
    U.toast('เพิ่มรายจ่ายแล้ว ✓');
  }
  closeModal('expenseModal');
  navigate('expenses');
}

async function deleteExpense(id) {
  if (!confirm('ลบรายจ่ายนี้?')) return;
  await DB.delExpense(id);
  U.toast('ลบรายจ่ายแล้ว');
  navigate('expenses');
}

function emptyRow(cols,msg,icon='fa-inbox') {
  return `<tr><td colspan="${cols}"><div class="empty-state" style="padding:30px"><i class="fa-solid ${icon}"></i><p>${msg}</p></div></td></tr>`;
}
