function onOrderCustChange(sel) {
  window._orderCustId=sel.value||null;
  // re-apply prices for all selected products
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const prodSel=document.getElementById(`oiprod_${m[1]}`);
    if (prodSel?.value) onOrderProdChange(prodSel,m[1]);
  });
}

async function onOrderProdChange(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const prodName=opt.dataset.name||opt.text||'';
  updateItemSpec(i, prodName);
  await updateItemPrice(i);
}

function calcOrderTotal() {
  let sub=0;
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`oitotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('of_discount')?.value||0);
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('os_sub',sub); s('os_disc',disc); s('os_total',sub-disc);
}

async function updateItemPrice(i) {
  const prodSel=document.getElementById(`oiprod_${i}`);
  if (!prodSel?.value) return;
  const prodId=prodSel.value;
  const trimColor=document.getElementById(`oitrim_${i}`)?.value||'';
  const prod=(window._orderProds||[]).find(p=>p.id===prodId);
  if (!prod) return;
  let price=(trimColor && prod.priceMap?.[trimColor]!=null) ? prod.priceMap[trimColor] : prod.price;
  if (window._orderCustId) price=await DB.getEffectivePrice(window._orderCustId,prodId,price,trimColor);
  const priceEl=document.getElementById(`oiprice_${i}`);
  if (priceEl) { priceEl.value=price; calcOrderTotal(); }
}

async function saveOrder() {
  const custId=document.getElementById('of_cust')?.value||'';
  if (!custId){U.toast('กรุณาเลือกลูกค้า','error');return;}
  const cust=await DB.getCustomer(custId);

  const items=[]; let anyItem=false;
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const i=m[1];
    const sel=document.getElementById(`oiprod_${i}`);
    const prodId=sel?.value; if(!prodId)return;
    const opt=sel.options[sel.selectedIndex];
    const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||1);
    const price=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
    const color      = document.getElementById(`oicolor_${i}`)?.value||'';
    const trimColor  = document.getElementById(`oitrim_${i}`)?.value||'';
    const extra      = document.getElementById(`oiextra_${i}`)?.value||'';
    const specialNote= document.getElementById(`oisp_${i}`)?.value.trim()||'';
    items.push({productId:prodId,productName:opt.dataset.name||opt.text,qty,price,color,trimColor,extra,specialNote});
    anyItem=true;
  });
  if (!anyItem){U.toast('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ','error');return;}

  const editId=document.getElementById('of_editId')?.value||'';
  const dateStr=document.getElementById('of_date')?.value;
  const createdAt=dateStr?new Date(dateStr).setHours(new Date().getHours(),new Date().getMinutes(),0,0):Date.now();

  const data={
    customerId:custId, customerName:cust?.name||'',
    items,
    discount:parseFloat(document.getElementById('of_discount')?.value||0),
    notes:document.getElementById('of_notes')?.value.trim()||'',
    createdAt,
  };
  if (editId) {
    const old=await DB.getOrder(editId);
    await DB.putOrder({...old,...data,id:editId});
    U.toast('แก้ไขออเดอร์แล้ว ✓');
  } else {
    data.orderNo=await DB.nextOrderNo();
    await DB.addOrder(data);
    U.toast('บันทึกออเดอร์แล้ว ✓');
  }
  closeModal('orderModal');
  navigate('orders');
}

async function deleteOrder(id) {
  if (!confirm('ลบออเดอร์นี้?'))return;
  await DB.delOrder(id); U.toast('ลบออเดอร์แล้ว');
  navigate('orders');
}

async function renderCustomers(el) {
  document.getElementById('topbarActions').innerHTML=
    `<button class="btn btn-primary" onclick="showCustomerModal()"><i class="fa-solid fa-plus me-1"></i>เพิ่มลูกค้า</button>`;
  const [customers, invoices] = await Promise.all([
    DB.getCustomers(), DB.getInvoices()
  ]);
  customers.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  // คำนวณยอดค้างชำระต่อลูกค้า
  const outstanding = {};
  invoices.filter(i=>!i.isPaid).forEach(i=>{
    if (i.customerId) {
      outstanding[i.customerId] = (outstanding[i.customerId]||0) + U.invTotal(i).total;
    }
  });
  window._custOutstanding = outstanding;
  el.innerHTML=`
  <div class="card-box">
    <div class="card-head">
      <h2><i class="fa-solid fa-users me-2 text-primary"></i>รายชื่อลูกค้า (${customers.length} ราย)</h2>
      <div class="search-box"><i class="fa-solid fa-search"></i>
        <input type="text" class="form-control form-control-sm" placeholder="ค้นหาชื่อ / เบอร์..." style="min-width:200px;"
          oninput="filterCustTable(this.value)">
      </div>
    </div>
    <div class="table-scroll">
      <table class="table-clean">
        <thead><tr><th>#</th><th>ชื่อลูกค้า / ร้านค้า</th><th>เบอร์โทร</th><th>ที่อยู่</th><th>ค้างชำระ</th><th>ราคาพิเศษ</th><th></th></tr></thead>
        <tbody id="custTbody">${customers.map((c,i)=>custRow(c,i)).join('')||emptyRow(7,'ยังไม่มีลูกค้า','fa-users-slash')}</tbody>
      </table>
    </div>
  </div>`;
  window._custData=customers;
}

function custRow(c,i) {
  const customCount=Object.keys(c.customPrices||{}).length;
  const owed = (window._custOutstanding||{})[c.id]||0;
  const owedCell = owed > 0
    ? `<span class="badge-outstanding"><i class="fa-solid fa-triangle-exclamation me-1"></i>฿${U.money(owed)}</span>`
    : `<span style="color:#9ca3af;font-size:12px;">-</span>`;
  return `<tr>
    <td style="color:#9ca3af;font-size:12px;">${i+1}</td>
    <td><strong>${U.esc(c.name)}</strong></td>
    <td>${U.esc(c.phone||'-')}</td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:#6b7280;">${U.esc(c.address||'-')}</td>
    <td>${owedCell}</td>
    <td>${customCount?`<span class="price-custom"><i class="fa-solid fa-tag me-1"></i>${customCount} สินค้า</span>`:
         `<span style="color:#9ca3af;font-size:12px;">ราคาปกติ</span>`}</td>
    <td class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-warning btn-icon" onclick="showCustomerPriceModal('${c.id}')" title="จัดการราคา"><i class="fa-solid fa-tag"></i></button>
      <button class="btn btn-sm btn-outline-primary btn-icon" onclick="showCustomerModal('${c.id}')" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-sm btn-outline-danger btn-icon" onclick="deleteCustomer('${c.id}')" title="ลบ"><i class="fa-solid fa-trash"></i></button>
    </td>
  </tr>`;
}

function filterCustTable(val) {
  const q=val.toLowerCase();
  const data=(window._custData||[]).filter(c=>!q||c.name.toLowerCase().includes(q)||(c.phone||'').includes(q));
  document.getElementById('custTbody').innerHTML=data.map((c,i)=>custRow(c,i)).join('')||emptyRow(7,'ไม่พบลูกค้า');
}

  const body=`<form class="row g-3" id="custForm">
    <div class="col-12"><label class="form-label">ชื่อลูกค้า / ร้านค้า <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="cf_name" required value="${U.esc(c?.name||'')}" placeholder="ชื่อร้านหรือชื่อลูกค้า"></div>
    <div class="col-sm-6"><label class="form-label">เบอร์โทรศัพท์</label>
      <input type="tel" class="form-control" id="cf_phone" value="${U.esc(c?.phone||'')}" placeholder="08x-xxx-xxxx"></div>
    <div class="col-sm-6"><label class="form-label">เลขผู้เสียภาษี</label>
      <input type="text" class="form-control" id="cf_taxId" value="${U.esc(c?.taxId||'')}" placeholder="(ถ้ามี)"></div>
    <div class="col-12"><label class="form-label">ที่อยู่</label>
      <textarea class="form-control" id="cf_address" rows="2">${U.esc(c?.address||'')}</textarea></div>
    <div class="col-12"><label class="form-label">หมายเหตุ</label>
      <input type="text" class="form-control" id="cf_notes" value="${U.esc(c?.notes||'')}" placeholder="บันทึกเพิ่มเติม"></div>
    <input type="hidden" id="cf_id" value="${c?.id||''}">
  </form>`;
  showModal('custModal',c?'แก้ไขลูกค้า':'เพิ่มลูกค้าใหม่',body,

async function saveCustomer() {
  const name=document.getElementById('cf_name')?.value.trim();
  if (!name){U.toast('กรุณากรอกชื่อ','error');return;}
  const id=document.getElementById('cf_id')?.value||'';
  const data={name,phone:document.getElementById('cf_phone')?.value.trim()||'',taxId:document.getElementById('cf_taxId')?.value.trim()||'',address:document.getElementById('cf_address')?.value.trim()||'',notes:document.getElementById('cf_notes')?.value.trim()||''};
  if (id){const old=await DB.getCustomer(id);await DB.putCustomer({...old,...data});U.toast('แก้ไขข้อมูลลูกค้าแล้ว ✓');}
  else{await DB.addCustomer(data);U.toast('เพิ่มลูกค้าแล้ว ✓');}
  closeModal('custModal');navigate('customers');
}

async function deleteCustomer(id) {
  if (!confirm('ลบลูกค้านี้?'))return;
  await DB.delCustomer(id);U.toast('ลบลูกค้าแล้ว');navigate('customers');
}

// ── ราคาพิเศษต่อลูกค้า ──
async function showCustomerPriceModal(custId) {
  const [cust, products] = await Promise.all([DB.getCustomer(custId), DB.getProducts()]);
  if (!cust||!products.length){U.toast('กรุณาเพิ่มสินค้าก่อน','error');return;}

  const lineIcons = {ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷'};

  const rows = products.map(p => {
    const spec = COFFIN_SPEC[p.name];
    const lines = spec?.lines || Object.keys(p.priceMap||{});
    const cpObj = cust.customPrices?.[p.id];

    if (!lines.length) {
      // no trim lines — single price input
      const val = (typeof cpObj === 'number') ? cpObj : '';
      return `<tr style="background:#f8fafc;">
        <td colspan="2"><strong>${U.esc(p.name)}</strong></td>
        <td><input type="number" class="form-control form-control-sm" id="cp_${p.id}__"
          min="0" value="${val}" placeholder="ราคาปกติ ${U.money(p.price)}"></td>
      </tr>`;
    }

    const subRows = lines.map(l => {
      const defPrice = p.priceMap?.[l] ?? p.price;
      const val = (typeof cpObj === 'object' && cpObj?.[l] !== undefined) ? cpObj[l] : '';
      return `<tr>
        <td style="padding-left:28px;color:#374151;font-size:13px;">${lineIcons[l]||''} เส้น${l}</td>
        <td style="text-align:center;color:#6b7280;font-size:13px;">฿${U.money(defPrice)}</td>
        <td><input type="number" class="form-control form-control-sm" id="cp_${p.id}_${l}"
          min="0" value="${val}" placeholder="ราคาปกติ ${U.money(defPrice)}"></td>
      </tr>`;
    }).join('');

    return `<tr style="background:#eff6ff;">
        <td colspan="3" style="padding:8px 12px;font-weight:700;color:#1e3a8a;font-size:14px;">
          📦 ${U.esc(p.name)}
        </td>
      </tr>${subRows}`;
  }).join('');

  const body=`
    <p style="font-size:13px;color:#6b7280;margin-bottom:12px;">
      ตั้งราคาพิเศษสำหรับ <strong>${U.esc(cust.name)}</strong><br>
      ปล่อยว่างไว้ = ใช้ราคาปกติของสินค้า
    </p>
    <table class="table-clean">
      <thead><tr><th>สีเส้น</th><th style="text-align:center;">ราคาปกติ</th><th>ราคาของร้านนี้</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  showModal('custPriceModal',`ราคาพิเศษ — ${U.esc(cust.name)}`,body,
    `<button class="btn btn-primary" onclick="saveCustomerPrices('${custId}')"><i class="fa-solid fa-floppy-disk me-1"></i>บันทึกราคา</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`,'modal-lg');
  window._custPriceProducts=products;
}

async function saveCustomerPrices(custId) {
  const cust=await DB.getCustomer(custId);
  const customPrices={};
  (window._custPriceProducts||[]).forEach(p=>{
    const spec = COFFIN_SPEC[p.name];
    const lines = spec?.lines || Object.keys(p.priceMap||{});
    if (!lines.length) {
      // single price
      const el = document.getElementById(`cp_${p.id}__`);
      const val = el?.value.trim();
      if (val!=='') customPrices[p.id]=parseFloat(val);
    } else {
      const pricePerLine={};
      lines.forEach(l=>{
        const el=document.getElementById(`cp_${p.id}_${l}`);
        const val=el?.value.trim();
        if (val!=='') pricePerLine[l]=parseFloat(val);
      });
      if (Object.keys(pricePerLine).length) customPrices[p.id]=pricePerLine;
    }
  });
  await DB.putCustomer({...cust,customPrices});
  U.toast('บันทึกราคาพิเศษแล้ว ✓');
  closeModal('custPriceModal');
  navigate('customers');
}

async function renderProducts(el) {
  document.getElementById('topbarActions').innerHTML=
    `<button class="btn btn-primary" onclick="showProductModal()"><i class="fa-solid fa-plus me-1"></i>เพิ่มสินค้า</button>`;
  const products=(await DB.getProducts()).sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  el.innerHTML=`
  <div class="card-box">
    <div class="card-head">
      <h2><i class="fa-solid fa-box me-2 text-primary"></i>รายการสินค้า (${products.length} รายการ)</h2>
      <div class="search-box"><i class="fa-solid fa-search"></i>
        <input type="text" class="form-control form-control-sm" placeholder="ค้นหารหัส / ชื่อ..." style="min-width:200px;"
          oninput="filterProdTable(this.value)">
      </div>
    </div>
    <div class="table-scroll">
      <table class="table-clean">
        <thead><tr><th>รหัส</th><th>ชื่อสินค้า</th><th>ประเภท</th><th>หน่วย</th><th style="text-align:right;">ราคาปกติ (บาท)</th><th></th></tr></thead>
        <tbody id="prodTbody">${products.map((p,i)=>prodRow(p,i)).join('')||emptyRow(6,'ยังไม่มีสินค้า','fa-box-open')}</tbody>
      </table>
    </div>
  </div>`;
  window._prodData=products;
}

function prodRow(p,i) {
  return `<tr>
    <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px;">${U.esc(p.code||'-')}</code></td>
    <td><strong>${U.esc(p.name)}</strong></td>
    <td style="font-size:13px;color:#6b7280;">${U.esc(p.category||'-')}</td>
    <td style="font-size:13px;">${U.esc(p.unit||'โลง')}</td>
    <td style="text-align:right;">
      ${p.priceMap&&Object.keys(p.priceMap).length
        ? Object.entries(p.priceMap).map(([k,v])=>`<span style="display:inline-block;background:#f1f5f9;border-radius:4px;padding:1px 6px;font-size:12px;margin:1px;"><strong style="color:#2563eb;">฿${U.money(v)}</strong> <span style="color:#6b7280;">${k}</span></span>`).join('')
        : `<strong style="color:#2563eb;">฿${U.money(p.price)}</strong>`}
    </td>
    <td class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-primary btn-icon" onclick="showProductModal('${p.id}')" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-sm btn-outline-danger btn-icon" onclick="deleteProduct('${p.id}')" title="ลบ"><i class="fa-solid fa-trash"></i></button>
    </td>
  </tr>`;
}

function filterProdTable(val) {
  const q=val.toLowerCase();
  const data=(window._prodData||[]).filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  document.getElementById('prodTbody').innerHTML=data.map((p,i)=>prodRow(p,i)).join('')||emptyRow(6,'ไม่พบสินค้า');
}

async function showProductModal(id) {
  const p=id?await DB.getProduct(id):null;
  const PM_LINES=[{k:'ทอง',icon:'🟡'},{k:'เงิน',icon:'🔘'},{k:'ซีด',icon:'🥉'},{k:'ขาว',icon:'⬜'},{k:'คริสต์',icon:'✝'},{k:'ผ้าจีบ',icon:'🪷'}];
  const body=`<form class="row g-3">
    <div class="col-sm-4"><label class="form-label">รหัสสินค้า</label>
      <input type="text" class="form-control" id="pf_code" placeholder="เช่น L001" value="${U.esc(p?.code||'')}"></div>
    <div class="col-sm-8"><label class="form-label">ชื่อสินค้า <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="pf_name" required value="${U.esc(p?.name||'')}" placeholder="ชื่อโลง / รุ่น"></div>
    <div class="col-sm-6"><label class="form-label">ประเภท</label>
      <input type="text" class="form-control" id="pf_cat" value="${U.esc(p?.category||'')}" placeholder="เช่น ไม้สัก, MDF, อัดลาย"></div>
    <div class="col-sm-3"><label class="form-label">หน่วย</label>
      <input type="text" class="form-control" id="pf_unit" value="${U.esc(p?.unit||'โลง')}"></div>
    <div class="col-sm-3"><label class="form-label">ราคาสำรอง (฿)</label>
      <input type="number" class="form-control" id="pf_price" min="0" value="${p?.price||''}" placeholder="ถ้าไม่ระบุตามเส้น"></div>
    <div class="col-12">
      <label class="form-label fw-bold">💰 ราคาตามสีเส้น <span style="font-size:12px;color:#9ca3af;font-weight:400;">(กรอกเฉพาะที่ใช้ — ถ้าว่างจะใช้ราคาสำรอง)</span></label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        ${PM_LINES.map(l=>`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
          <label style="font-size:12px;font-weight:600;margin-bottom:4px;display:block;">${l.icon} เส้น${l.k}</label>
          <input type="number" class="form-control form-control-sm" id="pm_${l.k}" min="0" placeholder="ราคา (฿)" value="${p?.priceMap?.[l.k]||''}">
        </div>`).join('')}
      </div>
    </div>
    <input type="hidden" id="pf_id" value="${p?.id||''}">
  </form>`;
  showModal('prodModal',p?'แก้ไขสินค้า':'เพิ่มสินค้าใหม่',body,
    `<button class="btn btn-primary" onclick="saveProduct()"><i class="fa-solid fa-floppy-disk me-1"></i>บันทึก</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
}

async function saveProduct() {
  const name=document.getElementById('pf_name')?.value.trim();
  if (!name){U.toast('กรุณากรอกชื่อสินค้า','error');return;}
  const id=document.getElementById('pf_id')?.value||'';
  const pm={};
  ['ทอง','เงิน','ซีด','ขาว','คริสต์','ผ้าจีบ'].forEach(k=>{
    const v=parseFloat(document.getElementById(`pm_${k}`)?.value||'');
    if (!isNaN(v)&&v>0) pm[k]=v;
  });
  const data={code:document.getElementById('pf_code')?.value.trim()||'',name,category:document.getElementById('pf_cat')?.value.trim()||'',unit:document.getElementById('pf_unit')?.value.trim()||'โลง',price:parseFloat(document.getElementById('pf_price')?.value||0),priceMap:pm};
  if (id){const old=await DB.getProduct(id);await DB.putProduct({...old,...data});U.toast('แก้ไขสินค้าแล้ว ✓');}
  else{await DB.addProduct(data);U.toast('เพิ่มสินค้าแล้ว ✓');}
  closeModal('prodModal');navigate('products');
}

async function deleteProduct(id) {
  if (!confirm('ลบสินค้านี้?'))return;
  await DB.delProduct(id);U.toast('ลบสินค้าแล้ว');navigate('products');
}

async function renderInvoices(el) {
  document.getElementById('topbarActions').innerHTML=
    `<button class="btn btn-primary" onclick="showCreateReceiptModal()"><i class="fa-solid fa-plus me-1"></i>ออกใบเสร็จรับเงิน</button>
     <button class="btn btn-outline-success" onclick="exportExcel()"><i class="fa-solid fa-file-excel me-1"></i>Export Excel</button>`;
  const invoices=(await DB.getInvoices()).sort((a,b)=>b.createdAt-a.createdAt);
  const unpaidInvs = invoices.filter(i=>!i.isPaid);
  const unpaidTotal = unpaidInvs.reduce((a,i)=>a+U.invTotal(i).total,0);
  const unpaidBar = unpaidInvs.length ? `
    <div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <i class="fa-solid fa-triangle-exclamation" style="color:#ea580c;font-size:18px;"></i>
        <div>
          <div style="font-weight:700;color:#9a3412;font-size:14px;">ยอดค้างชำระทั้งหมด</div>
          <div style="font-size:12px;color:#c2410c;">${unpaidInvs.length} ใบ ยังไม่ได้รับเงิน</div>
        </div>
      </div>
      <div style="font-size:22px;font-weight:800;color:#dc2626;">฿${U.money(unpaidTotal)}</div>
    </div>` : '';
  el.innerHTML=`
  <div class="card-box">
    <div class="card-head">
      <h2><i class="fa-solid fa-file-invoice me-2 text-primary"></i>ใบเสร็จรับเงิน</h2>
      <div class="search-box"><i class="fa-solid fa-search"></i>
        <input type="text" class="form-control form-control-sm" placeholder="ค้นหาเลขบิล / ชื่อลูกค้า..." style="min-width:220px;" oninput="filterInvTable(this.value)">
      </div>
    </div>
    <div style="padding:0 4px;">${unpaidBar}</div>
    <div class="table-scroll">
      <table class="table-clean">
        <thead><tr><th>เลขที่ใบเสร็จ</th><th>ลูกค้า</th><th>วันที่</th><th>รายการ</th><th style="text-align:right;">ยอดรวม</th><th style="text-align:center;">สถานะ</th><th></th></tr></thead>
        <tbody id="invTbody">${invoices.map(inv=>invRow(inv)).join('')||emptyRow(7,'ยังไม่มีใบเสร็จ','fa-file-circle-xmark')}</tbody>
      </table>
    </div>
  </div>`;
  window._invData=invoices;
}

function invRow(inv) {
  const t=U.invTotal(inv);
  const paid = inv.isPaid;
  const statusBadge = paid
    ? `<span class="badge-paid"><i class="fa-solid fa-check me-1"></i>ชำระแล้ว</span>`
    : `<span class="badge-unpaid"><i class="fa-solid fa-clock me-1"></i>ค้างชำระ</span>`;
  const payBtn = paid ? '' :
    `<button class="btn btn-sm btn-outline-success btn-icon" onclick="markInvoicePaid('${inv.id}')" title="บันทึกชำระเงิน"><i class="fa-solid fa-money-bill-wave"></i></button>`;
  return `<tr>
    <td><strong>${U.esc(inv.invoiceNo)}</strong></td>
    <td>${U.esc(inv.customerName||'-')}</td>
    <td style="white-space:nowrap;font-size:13px;">${U.date(inv.createdAt)}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#6b7280;">
      ${(inv.items||[]).map(i=>U.esc(i.name)+' ×'+i.qty).join(', ')||'-'}
    </td>
    <td style="text-align:right;font-weight:700;">฿${U.money(t.total)}</td>
    <td style="text-align:center;">${statusBadge}</td>
    <td class="d-flex gap-1">
      ${payBtn}
      <button class="btn btn-sm btn-outline-primary btn-icon" onclick="printReceiptById('${inv.id}')" title="พิมพ์"><i class="fa-solid fa-print"></i></button>
      <button class="btn btn-sm btn-outline-secondary btn-icon" onclick="showCreateReceiptModal('${inv.id}')" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-sm btn-outline-danger btn-icon" onclick="deleteInvoice('${inv.id}')" title="ลบ"><i class="fa-solid fa-trash"></i></button>
    </td>
  </tr>`;
}

function filterInvTable(val) {
  const q=val.toLowerCase();
  const data=(window._invData||[]).filter(i=>!q||i.invoiceNo?.toLowerCase().includes(q)||i.customerName?.toLowerCase().includes(q));
  document.getElementById('invTbody').innerHTML=data.map(invRow).join('')||emptyRow(7,'ไม่พบใบเสร็จ');
}

async function showCreateReceiptModal(editId, prefillCustName) {
  const [customers,products,allOrders]=await Promise.all([DB.getCustomers(),DB.getProducts(),DB.getOrders()]);
  const edit=editId?await DB.getInvoice(editId):null;
  window._rcCustList=customers; window._rcProdList=products; window._rcAllOrders=allOrders;
  window._rcCustId=edit?.customerId||null; window._rcItemIdx=edit?(edit.items||[]).length:1;

  // Pre-select customer from dashboard button + ตรวจใบซ้ำวันนี้
  let prefillCustId = null;
  const skipDup = !!window._skipDupCheck; window._skipDupCheck = false;
  if (prefillCustName && !editId) {
    const decoded = decodeURIComponent(prefillCustName);
    const found   = customers.find(c => c.name === decoded);
    if (found) {
      prefillCustId = found.id;
      window._rcCustId = found.id;

      if (!skipDup) {
        const allInvoices = await DB.getInvoices();
        const todayStart  = new Date(); todayStart.setHours(0,0,0,0);
        const existing    = allInvoices.find(inv =>
          inv.customerId === found.id && inv.createdAt >= todayStart.getTime()
        );
        if (existing) {
          const enc = encodeURIComponent(decoded);
          showModal('dupInvModal', 'พบใบเสร็จซ้ำ',
            `<div style="background:#fef3c7;border-radius:10px;padding:14px 18px;border-left:4px solid #f59e0b;margin-bottom:12px;">
               <strong style="color:#92400e;">⚠️ พบใบเสร็จวันนี้แล้ว</strong><br>
               <span style="font-size:13px;color:#78350f;">ลูกค้า <strong>${U.esc(found.name)}</strong>
               มีใบเสร็จวันนี้แล้ว เลขที่ <strong>${U.esc(existing.invoiceNo)}</strong></span>
             </div>
             <p style="font-size:13px;color:#374151;margin:0;">ต้องการทำอะไร?</p>`,
            `<button class="btn btn-warning" onclick="closeModal('dupInvModal');showCreateReceiptModal('${existing.id}');">
               <i class="fa-solid fa-pen-to-square me-1"></i>แก้ไขใบเดิม (${U.esc(existing.invoiceNo)})
             </button>
             <button class="btn btn-primary" onclick="closeModal('dupInvModal');_forceNewInvoice('${enc}');">
               <i class="fa-solid fa-plus me-1"></i>สร้างใบใหม่
             </button>
             <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
          return;
        }
      }
    }
  }

  const custOpts=customers.map(c=>`<option value="${c.id}" ${(edit?.customerId===c.id||c.id===prefillCustId)?'selected':''}>${U.esc(c.name)}</option>`).join('');
  const initItems=edit?.items||[{name:'',qty:1,price:0}];

  const body=`<form class="row g-3">
    <div class="col-sm-5">
      <label class="form-label">ลูกค้า <span class="text-danger">*</span></label>
      <select class="form-select" id="rc_cust" onchange="onRcCustChange(this)">
        <option value="">-- เลือกลูกค้า --</option>${custOpts}
      </select>
    </div>
    <div class="col-sm-4">
      <label class="form-label">ดึงออเดอร์ของวันที่</label>
      <input type="date" class="form-control" id="rc_pullDate" value="${new Date().toISOString().split('T')[0]}">
    </div>
    <div class="col-sm-3 d-flex align-items-end">
      <button type="button" class="btn btn-success w-100" onclick="pullOrdersToReceipt()">
        <i class="fa-solid fa-wand-magic-sparkles me-1"></i>ดึงออเดอร์
      </button>
    </div>
    <div class="col-12">
      <label class="form-label">ที่อยู่ (สำหรับบิล)</label>
      <input type="text" class="form-control" id="rc_addr" value="${U.esc(edit?.customerAddress||'')}" placeholder="ที่อยู่ลูกค้า">
    </div>
    <div class="col-12">
      <label class="form-label">รายการสินค้า</label>
      <table class="items-table w-100">
        <thead><tr>
          <th style="width:40%">ชื่อสินค้า</th>
          <th style="width:8%">จำนวน</th>
          <th style="width:20%">ราคา/ชิ้น</th>
          <th style="width:16%">รวม</th>
          <th style="width:16%">นำเข้าจากสินค้า</th>
        </tr></thead>
        <tbody id="rcItemsBody">
          ${initItems.map((item,i)=>rcItemRow(i,item)).join('')}
        </tbody>
      </table>
      <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addRcItemRow()"><i class="fa-solid fa-plus me-1"></i>เพิ่มรายการ</button>
    </div>
    <div class="col-sm-4"><label class="form-label">ส่วนลด (บาท)</label>
      <input type="number" class="form-control" id="rc_disc" min="0" value="${edit?.discount||0}" oninput="calcRcTotal()"></div>
    <div class="col-sm-4"><label class="form-label">ภาษีมูลค่าเพิ่ม</label>
      <select class="form-select" id="rc_tax" onchange="calcRcTotal()">
        <option value="0" ${!edit?.taxRate?'selected':''}>ไม่มี VAT</option>
        <option value="7" ${edit?.taxRate===7?'selected':''}>VAT 7%</option>
      </select></div>
    <div class="col-sm-4"><label class="form-label">หมายเหตุ</label>
      <input type="text" class="form-control" id="rc_notes" value="${U.esc(edit?.notes||'')}" placeholder="หมายเหตุ"></div>
    <div class="col-12">
      <div class="total-box d-flex justify-content-end">
        <table style="min-width:260px;font-size:14px;">
          <tr><td style="padding:3px 8px;color:#6b7280;">ยอดก่อนส่วนลด</td><td id="rcs_sub" style="text-align:right;">฿0.00</td></tr>
          <tr><td style="padding:3px 8px;color:#6b7280;">ส่วนลด</td><td id="rcs_disc" style="text-align:right;">฿0.00</td></tr>
          <tr><td style="padding:3px 8px;color:#6b7280;">ภาษีมูลค่าเพิ่ม</td><td id="rcs_tax" style="text-align:right;">฿0.00</td></tr>
          <tr style="border-top:2px solid #1a2332;"><td style="padding:8px;font-weight:700;font-size:16px;">รวมทั้งสิ้น</td>
            <td id="rcs_total" style="text-align:right;font-weight:700;font-size:16px;">฿0.00</td></tr>
        </table>
      </div>
    </div>
    <input type="hidden" id="rc_editId" value="${edit?.id||''}">
  </form>`;

  showModal('rcModal',edit?`แก้ไข ${U.esc(edit.invoiceNo)}`:'ออกใบเสร็จรับเงิน',body,
    `<button class="btn btn-primary" onclick="saveReceipt(false)"><i class="fa-solid fa-floppy-disk me-1"></i>บันทึก</button>
     <button class="btn btn-outline-primary" onclick="saveReceipt(true)"><i class="fa-solid fa-print me-1"></i>บันทึก & พิมพ์</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`,
    'modal-xl');

  if (edit?.customerId) onRcCustChange(document.getElementById('rc_cust'));
  calcRcTotal();
}

function rcItemRow(i, item={}) {
  const opts=(window._rcProdList||[]).map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${U.esc(p.name)}">${U.esc(p.name)}</option>`).join('');
  return `<tr id="rcrow_${i}">
    <td><input type="text" class="form-control form-control-sm" id="rcname_${i}" value="${U.esc(item.name||'')}" placeholder="ชื่อสินค้า" oninput="calcRcTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="rcqty_${i}" value="${item.qty||1}" min="1" oninput="calcRcTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="rcprice_${i}" value="${item.price||0}" min="0" oninput="calcRcTotal()"></td>
    <td><span id="rctotal_${i}" style="font-size:13px;font-weight:600;">฿${U.money((item.qty||1)*(item.price||0))}</span></td>
    <td>
      <select class="form-select form-select-sm" onchange="onRcProdSelect(this,${i})" style="font-size:12px;">
        <option value="">เลือกสินค้า...</option>${opts}
      </select>
    </td>
  </tr>`;
}

function addRcItemRow() {
  const i=window._rcItemIdx++;
  document.getElementById('rcItemsBody').insertAdjacentHTML('beforeend',rcItemRow(i));
}

function onRcCustChange(sel) {
  window._rcCustId=sel.value||null;
  const cust=(window._rcCustList||[]).find(c=>c.id===window._rcCustId);
  const addrEl=document.getElementById('rc_addr');
  if (addrEl&&cust?.address) addrEl.value=cust.address;
}

// ดึงออเดอร์ของลูกค้าในวันที่เลือกมาใส่บิลอัตโนมัติ
// เปิด receipt modal ใหม่โดยข้ามการตรวจสอบใบซ้ำ (กรณีผู้ใช้ยืนยันสร้างใหม่)
function _forceNewInvoice(encodedName) {
  window._skipDupCheck = true;
  showCreateReceiptModal(null, encodedName);
}

function pullOrdersToReceipt() {
  const custId=window._rcCustId;
  if (!custId){U.toast('กรุณาเลือกลูกค้าก่อน','error');return;}
  const dateStr=document.getElementById('rc_pullDate')?.value;
  if (!dateStr){U.toast('กรุณาเลือกวันที่','error');return;}
  const date=new Date(dateStr);

  const orders=(window._rcAllOrders||[]).filter(o=>{
    const d=new Date(o.createdAt);
    return o.customerId===custId &&
      d.getFullYear()===date.getFullYear() &&
      d.getMonth()===date.getMonth() &&
      d.getDate()===date.getDate();
  });

  if (!orders.length){
    U.toast(`ไม่พบออเดอร์ของลูกค้านี้ในวันที่ ${date.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}`, 'error');
    return;
  }

  // รวมรายการทั้งหมดจากทุกออเดอร์
  const merged = {};
  orders.forEach(o=>(o.items||[]).forEach(i=>{
    const key = i.productName+'|'+i.price+'|'+(i.color||'')+'|'+(i.trimColor||'')+'|'+(i.style||'')+'|'+(i.specialNote||'');
    if (merged[key]) { merged[key].qty+=i.qty; }
    else { merged[key]={name:itemLabel(i),qty:i.qty,price:i.price}; }
  }));

  const items=Object.values(merged);
  window._rcItemIdx=items.length;
  document.getElementById('rcItemsBody').innerHTML=items.map((item,i)=>rcItemRow(i,item)).join('');
  calcRcTotal();
  U.toast(`✓ ดึง ${items.length} รายการ จาก ${orders.length} ออเดอร์ของวันนี้`);
}

function itemLabel(i) {
  let label=i.productName||'';
  if (i.color && i.color!=='-') label+=' '+i.color;
  const isChrist = i.trimColor==='คริสต์' || i.style==='คริสต์';
  if (isChrist) label+=' ✝คริสต์';
  else if (i.trimColor) label+=' เส้น'+i.trimColor;
  if (i.extra)       label+=' '+i.extra;
  if (i.specialNote) label+=' ('+i.specialNote+')';
  return label;
}

async function onRcProdSelect(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const defaultPrice=parseFloat(opt.dataset.price||0);
  let price=defaultPrice;
  if (window._rcCustId) price=await DB.getEffectivePrice(window._rcCustId,prodId,defaultPrice);
  const nameEl=document.getElementById(`rcname_${i}`);
  const priceEl=document.getElementById(`rcprice_${i}`);
  if (nameEl) nameEl.value=opt.dataset.name||opt.text;
  if (priceEl) priceEl.value=price;
  sel.value=''; calcRcTotal();
}

function calcRcTotal() {
  let sub=0;
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`rctotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('rc_disc')?.value||0);
  const taxRate=parseFloat(document.getElementById('rc_tax')?.value||0);
  const base=sub-disc; const tax=base*taxRate/100;
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('rcs_sub',sub);s('rcs_disc',disc);s('rcs_tax',tax);s('rcs_total',base+tax);
}

async function saveReceipt(andPrint=false) {
  const custId=document.getElementById('rc_cust')?.value||'';
  if (!custId){U.toast('กรุณาเลือกลูกค้า','error');return;}
  const cust=(window._rcCustList||[]).find(c=>c.id===custId)||{};

  const items=[];
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const name=document.getElementById(`rcname_${i}`)?.value.trim();
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const price=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    if (name) items.push({name,qty,price});
  });
  if (!items.length){U.toast('กรุณาเพิ่มรายการสินค้า','error');return;}

  const editId=document.getElementById('rc_editId')?.value||'';
  const data={
    type:'receipt',
    customerId:custId, customerName:cust.name||'',
    customerAddress:document.getElementById('rc_addr')?.value.trim()||'',
    customerPhone:cust.phone||'', customerTaxId:cust.taxId||'',
    items,
    discount:parseFloat(document.getElementById('rc_disc')?.value||0),
    taxRate:parseFloat(document.getElementById('rc_tax')?.value||0),
    notes:document.getElementById('rc_notes')?.value.trim()||'',
  };

  let savedId;
  if (editId){const old=await DB.getInvoice(editId);await DB.putInvoice({...old,...data});savedId=editId;U.toast('แก้ไขใบเสร็จแล้ว ✓');}
  else{data.invoiceNo=await DB.nextReceiptNo();savedId=await DB.addInvoice(data);U.toast('ออกใบเสร็จแล้ว ✓');}
  closeModal('rcModal');
  if (andPrint){
    const inv=await DB.getInvoice(savedId);
    // รอ Bootstrap modal animation ปิดสนิท (~350ms) ก่อนสั่งปริ้น
    // เพื่อให้ backdrop หายออกไปก่อน จะได้ไม่มืด
    setTimeout(()=>printReceiptData(inv), 400);
  }
  navigate('invoices');
}

async function deleteInvoice(id) {
  if (!confirm('ลบใบเสร็จนี้?'))return;
  await DB.delInvoice(id);U.toast('ลบใบเสร็จแล้ว');navigate('invoices');
}

async function markInvoicePaid(id) {
  if (!confirm('บันทึกว่าได้รับชำระเงินใบเสร็จนี้แล้ว?')) return;
  const inv = await DB.getInvoice(id);
  if (!inv) return;
  await DB.putInvoice({...inv, isPaid: true, paidAt: Date.now()});
  U.toast('บันทึกชำระเงินแล้ว ✓');
  navigate('invoices');
}

async function exportExcel() {
  if (typeof XLSX === 'undefined') { U.toast('กำลังโหลด Excel library...','info'); return; }
  const invoices = (await DB.getInvoices()).sort((a,b)=>a.createdAt-b.createdAt);
  const customers = await DB.getCustomers();

  const invSheet = invoices.map(inv => {
    const t = U.invTotal(inv);
    return {
      'เลขที่ใบเสร็จ': inv.invoiceNo||'',
      'ลูกค้า': inv.customerName||'',
      'วันที่': U.date(inv.createdAt),
      'รายการสินค้า': (inv.items||[]).map(i=>i.name+' ×'+i.qty).join(', '),
      'ยอดก่อนส่วนลด': t.subtotal,
      'ส่วนลด': t.discount,
      'ยอดสุทธิ': t.total,
      'สถานะ': inv.isPaid ? 'ชำระแล้ว' : 'ค้างชำระ',
      'วันที่ชำระ': inv.paidAt ? U.date(inv.paidAt) : '',
    };
  });

  const outstanding = {};
  const outstandingCount = {};
  invoices.filter(i=>!i.isPaid).forEach(i=>{
    if(i.customerId){
      outstanding[i.customerId] = (outstanding[i.customerId]||0) + U.invTotal(i).total;
      outstandingCount[i.customerId] = (outstandingCount[i.customerId]||0) + 1;
    }
  });
  const custSheet = customers
    .filter(c => outstanding[c.id] > 0)
    .sort((a,b) => (outstanding[b.id]||0) - (outstanding[a.id]||0))
    .map(c => ({
      'ชื่อลูกค้า': c.name,
      'จำนวนบิลค้าง': outstandingCount[c.id]||0,
      'ยอดค้างชำระ (บาท)': outstanding[c.id]||0,
    }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invSheet), 'ใบเสร็จทั้งหมด');
  if (custSheet.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(custSheet), 'ยอดค้างชำระ');

  const d = new Date();
  const fname = 'kailoong_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx';
  XLSX.writeFile(wb, fname);
  U.toast('Export Excel สำเร็จ ✓');
}

async function saveSettings() {
  const name=document.getElementById('st_name')?.value.trim();
  if (!name){U.toast('กรุณากรอกชื่อร้าน','error');return;}
  CFG.businessName=name;
  CFG.sellerName=document.getElementById('st_seller')?.value.trim()||'';
  CFG.businessPhone=document.getElementById('st_phone')?.value.trim()||'';
  CFG.businessTaxId=document.getElementById('st_taxId')?.value.trim()||'';
  CFG.businessAddress=document.getElementById('st_addr')?.value.trim()||'';
  await Promise.all(['businessName','sellerName','businessPhone','businessTaxId','businessAddress'].map(k=>DB.setSetting(k,CFG[k])));
  document.getElementById('sidebarBizName').textContent=CFG.businessName;
  U.toast('บันทึกการตั้งค่าแล้ว ✓');
}

// ── BACKUP ──
async function backupData() {
  try {
    const [customers, products, orders, invoices, expenses] = await Promise.all([
      DB.getCustomers(), DB.getProducts(), DB.getOrders(), DB.getInvoices(), DB.getExpenses()
    ]);
    const backup = {
      version: 2,
      exportedAt: Date.now(),
      exportedBy: CFG.businessName,
      data: { customers, products, orders, invoices, expenses }
    };
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const now  = new Date();
    const pad  = n => String(n).padStart(2,'0');
    const fname= `backup_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.json`;
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    await DB.setSetting('lastBackup', Date.now());
    U.toast(`✅ สำรองข้อมูลแล้ว — ${fname}`);
    setTimeout(() => navigate('settings'), 800);
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: ' + e.message, 'error');
  }
}

// ── RESTORE ──
async function restoreData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup?.data) { U.toast('ไฟล์ไม่ถูกต้อง ไม่พบข้อมูล', 'error'); return; }

      const { customers=[], products=[], orders=[], invoices=[], expenses=[] } = backup.data;
      const exportDate = backup.exportedAt ? U.datetime(backup.exportedAt) : 'ไม่ทราบ';

      const body = `
        <div style="background:#fef3c7;border-radius:10px;padding:14px 18px;margin-bottom:16px;border-left:4px solid #f59e0b;">
          <strong style="color:#92400e;">⚠️ คำเตือน:</strong>
          <span style="color:#78350f;font-size:13px;"> ข้อมูลปัจจุบันในระบบจะถูกลบทั้งหมด และแทนที่ด้วยข้อมูลจากไฟล์นี้</span>
        </div>
        <div style="font-size:13px;color:#6b7280;margin-bottom:14px;">
          ไฟล์: <strong style="color:#374151;">${U.esc(file.name)}</strong><br>
          สำรองเมื่อ: <strong style="color:#374151;">${exportDate}</strong><br>
          โดย: <strong style="color:#374151;">${U.esc(backup.exportedBy||'-')}</strong>
        </div>
        <div style="background:#f8f9fa;border-radius:10px;padding:14px 18px;">
          <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:10px;">ข้อมูลในไฟล์ที่จะนำเข้า</div>
          <div class="row g-2 text-center">
            <div class="col"><div style="font-size:20px;font-weight:700;color:#2563eb;">${orders.length}</div><div style="font-size:11px;color:#6b7280;">ออเดอร์</div></div>
            <div class="col"><div style="font-size:20px;font-weight:700;color:#10b981;">${customers.length}</div><div style="font-size:11px;color:#6b7280;">ลูกค้า</div></div>
            <div class="col"><div style="font-size:20px;font-weight:700;color:#f59e0b;">${products.length}</div><div style="font-size:11px;color:#6b7280;">สินค้า</div></div>
            <div class="col"><div style="font-size:20px;font-weight:700;color:#8b5cf6;">${invoices.length}</div><div style="font-size:11px;color:#6b7280;">ใบเสร็จ</div></div>
            <div class="col"><div style="font-size:20px;font-weight:700;color:#dc2626;">${expenses.length}</div><div style="font-size:11px;color:#6b7280;">รายจ่าย</div></div>
          </div>
        </div>`;

      showModal('restoreConfirmModal', 'ยืนยันการกู้คืนข้อมูล', body,
        `<button class="btn btn-danger" onclick="confirmRestore()">
           <i class="fa-solid fa-rotate-left me-1"></i>ยืนยัน กู้คืนข้อมูล
         </button>
         <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);

      window._pendingRestore = backup.data;

    } catch(err) {
      U.toast('อ่านไฟล์ไม่ได้: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

async function confirmRestore() {
  const data = window._pendingRestore;
  if (!data) { U.toast('ไม่พบข้อมูลสำหรับกู้คืน', 'error'); return; }

  try {
    closeModal('restoreConfirmModal');
    U.toast('กำลังกู้คืนข้อมูล...');

    const stores = ['customers','products','orders','invoices','expenses'];
    for (const store of stores) {
      const all = await DB._all(store);
      for (const item of all) await DB._del(store, item.id);
    }

    for (const cust of (data.customers||[])) {
      const { id, ...rest } = cust;
      await DB._add('customers', { ...rest, id });
    }
    for (const prod of (data.products||[])) { await DB._put('products', prod); }
    for (const order of (data.orders||[])) { await DB._put('orders', order); }
    for (const inv of (data.invoices||[])) { await DB._put('invoices', inv); }
    for (const exp of (data.expenses||[])) { await DB._put('expenses', exp); }

    await DB.setSetting('lastBackup', Date.now());
    window._pendingRestore = null;
    U.toast('✅ กู้คืนข้อมูลสำเร็จแล้ว!');
    setTimeout(() => navigate('dashboard'), 800);
  } catch(err) {
    U.toast('เกิดข้อผิดพลาดระหว่างกู้คืน: ' + err.message, 'error');
  }
}

async function showExpenseModal(id) {
  const CATS = ['วัตถุดิบ','ค่าแรง','ค่าไฟ/น้ำ','ค่าเช่า','ขนส่ง','ซ่อมแซม','อื่นๆ'];
  const exp = id ? await DB.getExpense(id) : null;
  const today = new Date().toISOString().slice(0,10);

  const body = `
    <div class="row g-3">
      <div class="col-sm-6">
        <label class="form-label">วันที่ <span class="text-danger">*</span></label>
        <input type="date" class="form-control" id="exp_date" value="${exp ? new Date(exp.date).toISOString().slice(0,10) : today}">
      </div>
      <div class="col-sm-6">
        <label class="form-label">หมวดหมู่</label>
        <select class="form-select" id="exp_cat">
          ${CATS.map(c=>`<option value="${c}" ${exp?.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">รายละเอียด</label>
        <input type="text" class="form-control" id="exp_note" placeholder="เช่น ซื้อไม้สัก 100 แผ่น" value="${U.esc(exp?.note||'')}">
      </div>
      <div class="col-12">
        <label class="form-label">จำนวนเงิน (บาท) <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="exp_amount" placeholder="0" min="0" step="1" value="${exp?.amount||''}">
      </div>
    </div>`;

  window._editExpenseId = id || null;
  showModal('expenseModal', id ? 'แก้ไขรายจ่าย' : 'เพิ่มรายจ่าย', body,
    `<button class="btn btn-danger" onclick="saveExpense()"><i class="fa-solid fa-save me-1"></i>บันทึก</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
  setTimeout(()=>document.getElementById('exp_amount')?.focus(),300);
}

async function saveExpense() {
  const dateVal   = document.getElementById('exp_date')?.value;
  const amountStr = document.getElementById('exp_amount')?.value;
  const amount    = parseFloat(amountStr);
  if (!dateVal)                              { U.toast('กรุณาเลือกวันที่','error'); return; }
  if (!amountStr||amount<=0||isNaN(amount))  { U.toast('กรุณากรอกจำนวนเงินที่ถูกต้อง','error'); return; }

  const data = {
    date:     new Date(dateVal).getTime(),
    category: document.getElementById('exp_cat')?.value  || 'อื่นๆ',
    note:     document.getElementById('exp_note')?.value.trim() || '',
    amount
  };

  if (window._editExpenseId) {
    await DB.putExpense({ ...data, id: window._editExpenseId });
    U.toast('แก้ไขรายจ่ายแล้ว ✓');
  } else {
    await DB.addExpense(data);
    U.toast('เพิ่มรายจ่ายแล้ว ✓');
  }
  closeModal('expenseModal');
  navigate('expenses');
}

async function deleteExpense(id) {
  if (!confirm('ลบรายจ่ายนี้?')) return;
  await DB.delExpense(id);
  U.toast('ลบรายจ่ายแล้ว');
  navigate('expenses');
}
