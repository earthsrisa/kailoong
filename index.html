<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ไคลุง">
<meta name="theme-color" content="#1a2332">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>ระบบจัดการธุรกิจ — ขายส่งโลงศพ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { font-family: 'Sarabun', sans-serif; }
body { background: #f0f2f5; margin: 0; }

/* ── Sidebar ── */
#sidebar {
  width: 240px; min-height: 100vh; background: #1a2332;
  position: fixed; top: 0; left: 0; z-index: 100;
  display: flex; flex-direction: column; transition: width .25s;
}
#sidebar .brand { padding: 22px 20px 18px; border-bottom: 1px solid #2d3f57; color: #fff; }
#sidebar .brand .biz-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
#sidebar .brand .biz-sub  { font-size: 11px; color: #8fa3bf; margin-top: 2px; }
#sidebar nav { padding: 12px 0; flex: 1; }
#sidebar .nav-link {
  color: #8fa3bf; padding: 11px 20px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  border: none; background: none; text-decoration: none; width: 100%; transition: all .18s;
}
#sidebar .nav-link i { width: 18px; text-align: center; font-size: 15px; }
#sidebar .nav-link:hover { color: #fff; background: #243040; }
#sidebar .nav-link.active { color: #fff; background: #2563eb; }
#sidebar .nav-section { font-size: 10px; color: #506070; padding: 14px 20px 4px; text-transform: uppercase; letter-spacing: 1px; }

/* ── Main ── */
#main { margin-left: 240px; min-height: 100vh; max-width: calc(100vw - 240px); overflow-x: hidden; }
#topbar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
#topbar h1 { font-size: 20px; font-weight: 700; margin: 0; color: #1a2332; }
#page-content { padding: 28px; box-sizing: border-box; }

/* ── Cards ── */
.stat-card {
  background: #fff; border-radius: 12px; padding: 22px 24px;
  border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.stat-card .label { font-size: 13px; color: #6b7280; font-weight: 500; }
.stat-card .value { font-size: 28px; font-weight: 700; color: #1a2332; margin: 4px 0 0; line-height: 1.2; }
.stat-card .sub   { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.stat-card .icon-wrap {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.card-box { background: #fff; border-radius: 12px; border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.card-box .card-head {
  padding: 16px 20px; border-bottom: 1px solid #f1f3f5;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.card-box .card-head h2 { font-size: 16px; font-weight: 700; margin: 0; color: #1a2332; }

/* ── Table ── */
.table-clean { width: 100%; border-collapse: collapse; }
.table-clean th {
  font-size: 12px; color: #6b7280; font-weight: 600; padding: 10px 16px;
  background: #f8f9fa; text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid #e8ecf0; white-space: nowrap;
}
.table-clean td { padding: 13px 16px; font-size: 14px; color: #374151; border-bottom: 1px solid #f1f3f5; vertical-align: middle; }
.table-clean tr:last-child td { border-bottom: none; }
.table-clean tr:hover td { background: #fafbfc; }

/* ── Forms ── */
.form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
.form-control, .form-select {
  font-size: 14px; border-radius: 8px; border-color: #d1d5db;
  font-family: 'Sarabun', sans-serif;
}
.form-control:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

/* ── Modal ── */
.modal-header { border-bottom: 1px solid #f1f3f5; padding: 18px 24px; }
.modal-footer { border-top: 1px solid #f1f3f5; padding: 14px 24px; }
.modal-title  { font-size: 17px; font-weight: 700; }
.modal-body   { padding: 24px; overflow-x: hidden; }
.modal-content { border-radius: 14px; border: none; }

/* ── Buttons ── */
.btn-primary  { background: #2563eb; border-color: #2563eb; font-weight: 600; }
.btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
.btn-sm { font-size: 13px; padding: 5px 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }

/* ── Misc ── */
.empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
.empty-state i { font-size: 42px; margin-bottom: 12px; display: block; }
.empty-state p { margin: 0; font-size: 15px; }
.search-box { position: relative; }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 13px; }
.search-box input { padding-left: 34px; }
.ord-item { display: inline-block; }
.ord-item-d { display: inline; }
.ord-item-d + .ord-item-d::before { content: ' · '; color: #9ca3af; }

/* ── Order item rows ── */
.items-table { width: 100%; border-collapse: collapse; }
.items-table th { font-size: 12px; color: #6b7280; font-weight: 600; padding: 8px 10px; background: #f8f9fa; border: 1px solid #e8ecf0; }
.items-table td { padding: 7px 8px; border: 1px solid #e8ecf0; font-size: 14px; vertical-align: middle; }
.items-table td input, .items-table td select {
  border: none; background: transparent; font-family: 'Sarabun',sans-serif;
  font-size: 14px; width: 100%; padding: 2px 4px;
}
.items-table td input:focus, .items-table td select:focus { outline: 1px solid #2563eb; border-radius: 4px; background: #f0f7ff; }

/* ── Total box ── */
.total-box { background: #f8f9fa; border-radius: 10px; padding: 14px 18px; }
.total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; color: #374151; }
.total-row.grand { font-size: 18px; font-weight: 700; color: #1a2332; border-top: 1px solid #e8ecf0; margin-top: 8px; padding-top: 10px; }

/* ── Customer price badge ── */
.price-custom { background: #dbeafe; color: #1e40af; font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.badge-paid { background:#dcfce7; color:#166534; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
.badge-unpaid { background:#fef3c7; color:#92400e; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; white-space:nowrap; }
.badge-partial { background:#fff3cd; color:#856404; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; white-space:nowrap; }
.badge-outstanding { background:#fee2e2; color:#991b1b; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }

/* ── Today highlight ── */
.today-card { background: linear-gradient(135deg,#1e3a5f,#2563eb); color: #fff; border-radius: 14px; padding: 20px 24px; }
.cust-today-card { background: linear-gradient(135deg,#134e4a,#0d9488); color: #fff; border-radius: 14px; padding: 20px 24px; overflow-y:auto;max-height:420px; }
.btn-card-outline { background:transparent;border:1px solid rgba(255,255,255,.55);color:#fff;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer; }
.btn-card-outline:hover { background:rgba(255,255,255,.15); }
.btn-card-solid { background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:600; }
.btn-card-solid:hover { background:rgba(255,255,255,.35); }
.today-card h3 { font-size: 15px; font-weight: 700; margin: 0 0 14px; opacity: .85; }
.today-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.12); font-size: 14px; }
.today-item:last-child { border-bottom: none; }

/* ── Scrollable ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; display: block; width: 100%; }

/* ── Print ── */
@media print {
  #sidebar, #main, #topbar, #modal-container { display: none !important; }
  #print-area { display: block !important; }
  body { background: #fff; }
  @page { size: A5 portrait; margin: 8mm 10mm; }

  /* บังคับให้สีและ background พิมพ์ออกมาครบ ไม่ซีด */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* ซ่อน toast และ modal backdrop ตอนปริ้น */
  .toast-notif, .modal-backdrop, .modal { display: none !important; }
}
#print-area { display: none; }

/* ── Receipt design — clean black & white ── */
.inv-page { font-family: 'Sarabun', sans-serif; color: #000; background: #fff; max-width: 680px; margin: 0 auto; }
.inv-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 10px; border-bottom: 2px solid #000; margin-bottom: 12px; }
.inv-company h1 { font-size: 18px; font-weight: 800; color: #000; margin: 0 0 3px; }
.inv-company p  { font-size: 11px; color: #333; margin: 2px 0; }
.inv-doc-info { text-align: right; }
.inv-doc-info .doc-type { font-size: 20px; font-weight: 800; color: #000; margin-bottom: 4px; }
.inv-doc-info table { margin-left: auto; font-size: 11px; }
.inv-doc-info td { padding: 1px 4px; color: #000; }
.inv-doc-info td:first-child { color: #555; padding-right: 8px; }
.inv-doc-info td:last-child { font-weight: 700; }
.inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.inv-party { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 8px 12px; }
.inv-party h3 { font-size: 9px; text-transform: uppercase; color: #555; margin: 0 0 4px; letter-spacing: 1px; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
.inv-party p  { font-size: 12px; margin: 1px 0; color: #000; }
.inv-items table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.inv-items th { background: #fff; color: #000; font-size: 11px; font-weight: 700; padding: 6px 10px; border-top: 2px solid #000; border-bottom: 1px solid #000; }
.inv-items td { padding: 6px 10px; border-bottom: 1px solid #ddd; font-size: 12px; color: #000; background: #fff; }
.inv-totals { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.inv-totals table { font-size: 12px; min-width: 220px; border-top: 1px solid #ccc; }
.inv-totals td { padding: 3px 8px; color: #000; }
.inv-totals .grand-row td { font-size: 15px; font-weight: 800; border-top: 2px solid #000; padding-top: 6px; }
.inv-notes { font-size: 11px; color: #333; border: 1px solid #ccc; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; background: #fff; }
.inv-sig { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 24px; }
.inv-sig-box { text-align: center; }
.inv-sig-box .sig-line { border-top: 1px solid #000; margin-top: 36px; padding-top: 5px; font-size: 11px; color: #333; }

/* ── Bottom Nav (mobile) ── */
#bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: #1a2332;
  border-top: 1px solid #2d3f57;
  justify-content: space-around;
  align-items: stretch;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: none; border: none; color: #8fa3bf;
  font-size: 10px; gap: 3px; padding: 8px 4px; cursor: pointer;
  transition: color .15s; min-height: 56px;
}
.bnav-item i { font-size: 19px; }
.bnav-item span { font-family: 'Sarabun', sans-serif; }
.bnav-item.active { color: #60a5fa; }
.bnav-item:hover { color: #fff; }
/* ── Bottom nav "เพิ่มเติม" overlay ── */
#bnav-more-overlay {
  display: none; position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,.45);
}
#bnav-more-overlay.open { display: block; }
#bnav-more-menu {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 210;
  background: #1a2332; border-top: 1px solid #2d3f57;
  padding: 12px 16px calc(env(safe-area-inset-bottom,0px) + 64px);
  transform: translateY(100%); transition: transform .22s ease;
  display: none;
}
#bnav-more-menu.open { display: block; transform: translateY(0); }
#bnav-more-menu .bm-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 12px; color: #c9d9ec; font-size: 15px; font-weight: 500;
  border-radius: 10px; cursor: pointer; border: none; background: none; width: 100%;
  transition: background .15s;
}
#bnav-more-menu .bm-item:hover, #bnav-more-menu .bm-item.active { background: #243040; color: #fff; }
#bnav-more-menu .bm-item i { width: 24px; text-align: center; font-size: 17px; color: #60a5fa; }

/* ── Mobile ── */
@media (max-width: 768px) {
  #sidebar { display: none !important; }
  #bottom-nav { display: flex; }
  #main { margin-left: 0; max-width: 100vw; }
  #topbar { padding: 12px 14px; }
  #topbar h1 { font-size: 16px; }
  #page-content { padding: 10px 10px 80px; }
  .card-box { padding: 14px 12px; }
  .card-head { flex-wrap: wrap; gap: 8px; }
  .card-head h2 { font-size: 14px; }
  .table-clean th { padding: 9px 10px; font-size: 12px; }
  .table-clean td { padding: 10px 10px; font-size: 13px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .order-item-num { display:inline-block;background:#ede9fe;color:#5b21b6;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;margin-bottom:5px; }
  .btn { font-size: 13px; padding: 6px 10px; }
  .btn-sm { font-size: 12px; padding: 4px 8px; }
  .modal-dialog { margin: 0.4rem; max-width: calc(100vw - 0.8rem) !important; }
  .modal-body { padding: 14px 16px; overflow-x: hidden; }
  .modal-header, .modal-footer { padding: 12px 16px; }
  .today-card, .cust-today-card { padding: 16px 14px; }
  .stat-card { padding: 12px 14px; }
  .stat-card .value { font-size: 22px; }
  .topbar-actions-btn { font-size: 12px !important; padding: 5px 10px !important; }

  /* order form table บนมือถือ — ซ่อน col ราคา+รวม ดูยอดจากด้านล่างแทน */
  .order-items-table th:nth-child(3),
  .order-items-table td:nth-child(3),
  .order-items-table th:nth-child(4),
  .order-items-table td:nth-child(4) { display: none; }
  .order-items-table th, .order-items-table td { font-size: 12px; padding: 4px 4px; }
  .order-items-table th:nth-child(1), .order-items-table td:nth-child(1) { width: 75%; }
  .order-items-table th:nth-child(2), .order-items-table td:nth-child(2) { width: 15%; }
  .order-items-table th:nth-child(5), .order-items-table td:nth-child(5) { width: 10%; }

  /* รายการโลง — แสดง 1 บรรทัดต่อรายการบนมือถือ */
  .ord-item { display: block !important; margin: 2px 0 !important; }
  .ord-item-d { display: block; font-size: 12px; line-height: 1.6; }
  .ord-item-d + .ord-item-d::before { content: ''; }

  /* ประวัติออเดอร์ — ซ่อน เลขออเดอร์ + หมายเหตุ บนมือถือ */
  .orders-history-table th:nth-child(2),
  .orders-history-table td:nth-child(2),
  .orders-history-table th:nth-child(6),
  .orders-history-table td:nth-child(6) { display: none; }
  /* วันที่ column แคบลง */
  .orders-history-table td:nth-child(1) { font-size:11px; white-space:nowrap; }
  /* รายการรอส่ง — ขนาดตัวหนังสือใหญ่ขึ้น + ไม่จำกัดความสูง (ไม่ scroll ภายใน) */
  .pend-row { font-size: 16px !important; padding: 4px 8px !important; line-height:1.5; }
  .pend-row span:first-child { font-size: 16px; }
  .cust-today-card { max-height: none !important; overflow-y: visible !important; }
}

/* ── PWA Standalone (iPhone) safe-area ── */
/* ใช้ JS เพิ่ม class pwa-ios แทน @media display-mode เพราะ reliable กว่าบน iOS */
#pwa-safe-top { display: none; }
html.pwa-ios body { overscroll-behavior: none; -webkit-overflow-scrolling: auto; }
html.pwa-ios #pwa-safe-top {
  display: block;
  height: env(safe-area-inset-top, 44px);
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
}
html.pwa-ios #topbar {
  top: env(safe-area-inset-top, 44px) !important;
  padding-top: 14px !important;
  align-items: center !important;
}
html.pwa-ios #sidebar {
  top: 0;
  padding-top: env(safe-area-inset-top, 44px);
  height: 100vh;
}
html.pwa-ios .modal {
  padding-top: env(safe-area-inset-top, 44px) !important;
  z-index: 1060 !important;
}
html.pwa-ios .modal-backdrop { z-index: 1055 !important; }
html.pwa-ios body.modal-open { overflow: hidden !important; position: fixed !important; width: 100% !important; }
html.pwa-ios #page-content { padding-bottom: max(14px, env(safe-area-inset-bottom, 20px)); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="brand">
    <div class="d-flex align-items-center gap-2">
      <div style="width:32px;height:32px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🪦</div>
      <div>
        <div class="biz-name" id="sidebarBizName">ขายส่งโลงศพ</div>
        <div class="biz-sub">ระบบหลังบ้าน</div>
      </div>
    </div>
  </div>
  <nav>
    <div class="nav-section">เมนูหลัก</div>
    <button class="nav-link active" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-link" data-page="orders" onclick="navigate('orders')"><i class="fa-solid fa-clock-rotate-left"></i><span>ประวัติออเดอร์</span></button>
    <button class="nav-link" data-page="invoices" onclick="navigate('invoices')"><i class="fa-solid fa-file-invoice"></i><span>ใบเสร็จรับเงิน</span></button>
    <div class="nav-section">ข้อมูลหลัก</div>
    <button class="nav-link" data-page="customers" onclick="navigate('customers')"><i class="fa-solid fa-users"></i><span>ลูกค้า</span></button>
    <button class="nav-link" data-page="products" onclick="navigate('products')"><i class="fa-solid fa-box"></i><span>สินค้า</span></button>
    <div class="nav-section">วิเคราะห์</div>
    <button class="nav-link" data-page="reports" onclick="navigate('reports')"><i class="fa-solid fa-chart-bar"></i><span>รายงาน</span></button>
    <button class="nav-link" data-page="expenses" onclick="navigate('expenses')"><i class="fa-solid fa-money-bill-wave"></i><span>รายจ่ายโรงงาน</span></button>
    <div class="nav-section">ตั้งค่า</div>
    <button class="nav-link" data-page="settings" onclick="navigate('settings')"><i class="fa-solid fa-gear"></i><span>ตั้งค่าร้าน</span></button>
  </nav>
</div>

<!-- BOTTOM NAV (mobile only) -->
<!-- Bottom nav more-menu overlay -->
<div id="bnav-more-overlay" onclick="closeBnavMore()"></div>
<div id="bnav-more-menu">
  <button class="bm-item" data-page="products" onclick="closeBnavMore();navigate('products')"><i class="fa-solid fa-box"></i>สินค้า</button>

function todayLocal(){

const DB = {
  _fs: null,
  _cache: {},         // { col: { ts, data } }
  _CACHE_TTL: 90000,  // 90 วินาที

  async init() {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    this._fs = firebase.firestore();
  },

  // ── Generic CRUD ──
  async _all(col) {
    const now = Date.now();
    const c = this._cache[col];
    if (c && now - c.ts < this._CACHE_TTL) return c.data;
    const snap = await this._fs.collection(col).get();
    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    this._cache[col] = { ts: now, data };
    return data;
  },
  _bust(col) { delete this._cache[col]; },
  async _get(col, id) {
    // ดึงจาก cache ก่อน ไม่ต้องยิง Firestore แยก
    const c = this._cache[col];
    if (c) { const found = c.data.find(r => String(r.id) === String(id)); if (found) return found; }
    const snap = await this._fs.collection(col).doc(String(id)).get();
    return snap.exists ? { id: snap.id, ...snap.data() } : null;
  },
  async _add(col, d) {
    const { id: _id, ...rest } = d;
    const data = { ...rest, createdAt: rest.createdAt || Date.now() };
    let newId;
    if (_id) {
      // restore: preserve original ID
      await this._fs.collection(col).doc(String(_id)).set(data);
      newId = String(_id);
    } else {
      const ref = await this._fs.collection(col).add(data);
      newId = ref.id;
    }
    // อัพเดท cache ทันที แทนที่จะล้างทิ้ง
    const c = this._cache[col];
    if (c) c.data.push({ id: newId, ...data });
    return newId;
  },
  async _put(col, d) {
    const { id, ...rest } = d;
    await this._fs.collection(col).doc(String(id)).set(rest, { merge: true });
    // อัพเดท cache record ตรง ๆ
    const c = this._cache[col];
    if (c) { const i = c.data.findIndex(r => String(r.id) === String(id)); if (i >= 0) c.data[i] = { id, ...rest }; }
    return id;
  },
  async _del(col, id) {
    await this._fs.collection(col).doc(String(id)).delete();
    const c = this._cache[col];
    if (c) c.data = c.data.filter(r => String(r.id) !== String(id));
  },

  // ── Settings ──
  async getSetting(key) {
    const snap = await this._fs.collection('settings').doc(key).get();
    return snap.exists ? snap.data().value : null;
  },
  async setSetting(key, value) {

  },
  async loadSettings() {
    // ดึงทั้ง collection ครั้งเดียว แทน 4 queries แยก
    const snap = await this._fs.collection('settings').get();
    const map = {}; snap.docs.forEach(d => { map[d.id] = d.data().value; });
    for (const k of ['businessName','sellerName','businessAddress','businessPhone','businessTaxId','promptpayId']) {
      if (map[k] !== undefined) CFG[k] = map[k];
    }
  },

  // ── Sequence helpers ──
  async nextOrderNo() {
    const all = await this.getOrders();
    const yr  = new Date().getFullYear()+543;
    const prefix = `ORD-${yr}-`;
    const nums = all.filter(o=>o.orderNo?.startsWith(prefix)).map(o=>parseInt(o.orderNo.slice(prefix.length))||0);
    return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(4,'0')}`;
  },
  async nextReceiptNo() {
    const all = await this.getInvoices();
    const yr  = new Date().getFullYear()+543;
    const prefix = `RC-${yr}-`;
    const nums = all.filter(i=>i.invoiceNo?.startsWith(prefix)).map(i=>parseInt(i.invoiceNo.slice(prefix.length))||0);
    return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(4,'0')}`;
  },
  async getEffectivePrice(customerId, productId, defaultPrice, trimColor='') {
    const c = await this.getCustomer(customerId);
    const cp = c?.customPrices?.[productId];
    if (cp !== undefined) {
      if (typeof cp === 'object' && cp !== null) {
        if (trimColor && cp[trimColor] !== undefined) return cp[trimColor];
      } else { return cp; }
    }
    if (trimColor) {
      const p = await this.getProduct(productId);
      if (p?.priceMap?.[trimColor] != null) return p.priceMap[trimColor];
    }
    return defaultPrice;
  },

  // ── Per-store shortcuts ──
  getCustomers()   { return this._all('customers'); },

  addCustomer(d)   { return this._add('customers',d); },

  getProducts()    { return this._all('products'); },

const U = {
  money(n)  { return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); },
  date(ts)  { if(!ts)return'-'; return new Date(ts).toLocaleDateString('th-TH-u-ca-buddhist',{year:'numeric',month:'short',day:'numeric'}); },
  datetime(ts) { if(!ts)return'-'; return new Date(ts).toLocaleDateString('th-TH-u-ca-buddhist',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); },
  dateInput(ts) { if(!ts)return''; return new Date(ts).toISOString().split('T')[0]; },
  dateCompact(ts) {
    if(!ts)return'-';
    const d=new Date(ts);
    const dt=d.toLocaleDateString('th-TH-u-ca-buddhist',{day:'numeric',month:'short'});
    const yr=String(d.getFullYear()+543).slice(-2);
    const tm=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',hour12:false});
    return `<span style="white-space:nowrap;">${dt} ${yr}</span><br><span style="color:#9ca3af;font-size:10px;">${tm}</span>`;
  },
  esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
  orderTotal(o) {
    const sub=(o.items||[]).reduce((a,i)=>a+(i.qty*i.price),0);
    return sub-(o.discount||0);
  },
  invTotal(inv) {
    const sub=(inv.items||[]).reduce((a,i)=>a+(i.qty*i.price),0);
    const disc=inv.discount||0;
    const base=sub-disc;
    const tax=inv.taxRate?base*inv.taxRate/100:0;
    return {sub,disc,base,tax,total:base+tax};
  },
  isToday(ts) {
    const d=new Date(ts), n=new Date();
    return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
  },
  toast(msg,type='success') {
    const el=document.createElement('div');
    el.className='toast-notif';
    // บนมือถือ (bottom-nav แสดง) เลื่อน toast ขึ้น 72px ไม่ให้ทับ

    el.innerHTML=`<div class="alert alert-${type==='success'?'success':'danger'} shadow-sm d-flex align-items-center gap-2" style="border-radius:10px;font-size:14px;">
      <i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-xmark'}"></i>${msg}</div>`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  },
};

// ═══════════════════════════════════════
const _sortState={};
function sortTable(tbodyId, key, renderRow, dataKey) {
  const prev=_sortState[tbodyId]||{key:null,asc:true};
  const asc = prev.key===key ? !prev.asc : true;
  _sortState[tbodyId]={key,asc};
  const data=window[dataKey]||[];
  const sorted=[...data].sort((a,b)=>{
    let av=a[key], bv=b[key];
    if(typeof av==='string') return asc?av.localeCompare(bv,'th'):bv.localeCompare(av,'th');
    return asc?(av||0)-(bv||0):(bv||0)-(av||0);
  });
  document.getElementById(tbodyId).innerHTML=renderRow(sorted);
  // อัปเดต indicator ลูกศร
  document.querySelectorAll(`[data-sort-tbody="${tbodyId}"]`).forEach(th=>{
    const arr=th.querySelector('.sort-arr');
    if(arr) arr.textContent = th.dataset.sortKey===key ? (asc?'↑':'↓') : '↕';
  });
}
function sortTh(label, tbodyId, key, dataKey) {
  return `<span data-sort-tbody="${tbodyId}" data-sort-key="${key}" onclick="sortTable('${tbodyId}','${key}',${dataKey==='_allOrders'?'renderOrderRows':dataKey==='_custData'?'renderCustRows':'renderInvRows'},'${dataKey}')" style="cursor:pointer;user-select:none;">${label} <span class="sort-arr" style="font-size:10px;opacity:.5;">↕</span></span>`;
}

function showModal(id,title,body,footer,size='') {
  const old=document.getElementById(id); if(old)old.remove();
  const div=document.createElement('div');
  div.className='modal fade'; div.id=id; div.tabIndex=-1;
  div.innerHTML=`<div class="modal-dialog ${size} modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">${title}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-footer">${footer}</div>
  </div></div>`;
  document.getElementById('modal-container').appendChild(div);
  const m=new bootstrap.Modal(div);
  div.addEventListener('hidden.bs.modal',()=>{m.dispose();div.remove();});
  // Keyboard: Ctrl+Enter = กดปุ่มแรกใน footer, Escape จัดการโดย Bootstrap อยู่แล้ว
  div.addEventListener('keydown',(e)=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
      e.preventDefault();
      div.querySelector('.modal-footer button:not([data-bs-dismiss])')?.click();
    }
  });
  m.show(); return m;
}
function closeModal(id) { const el=document.getElementById(id); if(el){try{bootstrap.Modal.getInstance(el)?.hide();}catch(e){}el.remove();} }

function U_confirm(msg, onYes, {title='ยืนยันการดำเนินการ', yesLabel='ยืนยัน', yesCls='btn-danger', icon='fa-triangle-exclamation', iconColor='#dc2626'}={}) {
  // เก็บ callback ไว้ใน window แทนการ serialize เป็น string (ป้องกัน closure หาย)
  window._confirmCb = onYes;
  showModal('confirmDialog', title,
    `<div class="d-flex align-items-start gap-3">
       <i class="fa-solid ${icon}" style="font-size:28px;color:${iconColor};flex-shrink:0;margin-top:2px;"></i>
       <p style="margin:0;font-size:15px;line-height:1.6;">${msg}</p>
     </div>`,
    `<button class="btn ${yesCls}" onclick="closeModal('confirmDialog');window._confirmCb&&window._confirmCb()">
       <i class="fa-solid fa-check me-1"></i>${yesLabel}
     </button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
}

async function renderDashboard(el) {
  const now = new Date(); now.setHours(0,0,0,0);
  const todayTs    = now.getTime();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

  // ดึงเฉพาะที่ต้องการ: orders วันนี้ + invoices เดือนนี้ + customers (เล็ก)
  // orders/invoices ทั้งหมดยังต้องการสำหรับ "count" cards — ใช้ cache ทำให้ไม่ช้า
  const [orders, invoices, customers, products] = await Promise.all([DB.getOrders(), DB.getInvoices(), DB.getCustomers(), DB.getProducts()]);
  const todayOrders  = orders.filter(o=>o.createdAt >= todayTs);
  const monthIncome  = invoices.filter(i=>i.createdAt>=monthStart).reduce((a,i)=>a+U.invTotal(i).total,0);

  // รวมสินค้าวันนี้ทั้งหมด
  const todayItems = {};

    <!-- รายการรอส่ง -->

function renderOrderRows(list) {
  if (!list.length) return `<tr><td colspan="7"><div class="empty-state" style="padding:30px"><i class="fa-solid fa-inbox"></i><p>ไม่มีออเดอร์</p></div></td></tr>`;
  return list.map(o=>`
  <tr>
    <td style="font-size:12px;color:#6b7280;vertical-align:top;">${U.dateCompact(o.createdAt)}</td>
    <td><code style="background:#f3f4f6;padding:2px 7px;border-radius:4px;font-size:12px;">${U.esc(o.orderNo)}</code></td>
    <td><strong>${U.esc(o.customerName||'-')}</strong>${(Date.now()-o.createdAt)<7200000?'<span style="display:inline-block;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:middle;letter-spacing:.3px;">NEW</span>':''}</td>
    <td style="max-width:260px;">
      ${(o.items||[]).map(i=>{
        const trimBg=i.trimColor==='ทอง'?'#fef3c7':i.trimColor==='เงิน'?'#f1f5f9':'#f8fafc';
        const trimTx=i.trimColor==='ทอง'?'#92400e':i.trimColor==='เงิน'?'#475569':'#6b7280';
        const label=U.esc(i.productName)+(i.color?` <span style="background:${i.color==='แดง'?'#fee2e2':i.color==='ดำ'?'#374151':i.color==='น้ำตาล'?'#fef3c7':'#f1f5f9'};color:${i.color==='ดำ'?'#fff':'inherit'};border-radius:3px;padding:1px 5px;font-size:11px;">${U.esc(i.color)}</span>`:'')+(i.trimColor?` <span style="background:${trimBg};color:${trimTx};border-radius:3px;padding:1px 5px;font-size:11px;">${i.trimColor==='ทอง'?'🟡':'🔘'}เส้น${U.esc(i.trimColor)}</span>`:'')+(i.style&&i.style!=='ธรรมดา'?` <span style="background:#dbeafe;color:#1e40af;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:600;">✝ ${U.esc(i.style)}</span>`:' ')+(i.specialNote?` <em style="color:#9ca3af;font-size:11px;">${U.esc(i.specialNote)}</em>`:'');
        return `<span class="ord-item" style="background:#f1f5f9;border-radius:4px;padding:2px 8px;font-size:12px;margin:2px 2px 2px 0;">${label} ×${i.qty}</span>`;
      }).join('')||'-'}
    </td>
    <td style="font-weight:700;white-space:nowrap;">฿${U.money(U.orderTotal(o))}</td>
    <td style="max-width:140px;color:#6b7280;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${U.esc(o.notes||'-')}</td>
    <td class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-primary btn-icon" onclick="showEditOrderModal('${o.id}')" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-sm btn-outline-success btn-icon" onclick="showAddItemsModal('${o.id}')" title="เพิ่มรายการ"><i class="fa-solid fa-plus"></i></button>
      <button class="btn btn-sm btn-outline-danger btn-icon" onclick="deleteOrder('${o.id}')" title="ลบ"><i class="fa-solid fa-trash"></i></button>
    </td>
  </tr>`).join('');
}

function applyOrderFilter() {
  const custId  = document.getElementById('filterCust')?.value||'';
  const date    = document.getElementById('filterDate')?.value||'';
  const search  = (document.getElementById('filterSearch')?.value||'').toLowerCase();
  let list = window._allOrders||[];
  if (custId)  list = list.filter(o=>String(o.customerId)===custId);
  if (date)    list = list.filter(o=>new Date(o.createdAt).toLocaleDateString('sv-SE',{timeZone:'Asia/Bangkok'})===date);
  if (search)  list = list.filter(o=>o.orderNo?.toLowerCase().includes(search)||o.customerName?.toLowerCase().includes(search)||(o.items||[]).some(i=>i.productName?.toLowerCase().includes(search)));
  document.getElementById('ordersTbody').innerHTML = renderOrderRows(list);
}

    </div>

      <label class="form-label">หมายเหตุ (ถ้ามี)</label>

function addItemRow(i, custId, products) {
  const opts=(products||window._addItemsProducts||[]).map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${U.esc(p.name)}">${U.esc(p.name)}</option>`).join('');
  return `<tr id="airow_${i}">
    <td><select class="form-select form-select-sm" onchange="onAddItemProdChange(this,${i},${custId})" id="aiprod_${i}">
      <option value="">-- เลือกสินค้า --</option>${opts}</select></td>
    <td><input type="number" class="form-control form-control-sm" id="aiqty_${i}" value="1" min="1" oninput="updateAddItemTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="aiprice_${i}" value="0" min="0" oninput="updateAddItemTotal()"></td>
    <td><span id="aitotal_${i}" style="font-size:13px;font-weight:600;">฿0.00</span></td>
    <td><button type="button" class="btn btn-sm btn-outline-danger btn-icon" onclick="document.getElementById('airow_${i}').remove();updateAddItemTotal()"><i class="fa-solid fa-trash"></i></button></td>
  </tr>`;
}

function appendAddItemRow() {
  const i=window._addItemsIdx++;
  document.getElementById('addItemsBody').insertAdjacentHTML('beforeend',addItemRow(i,window._addItemsCustId,window._addItemsProducts));
}

async function onAddItemProdChange(sel,i,custId) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value;
  if (!prodId) return;
  const defaultPrice=parseFloat(opt.dataset.price||0);
  const price=await DB.getEffectivePrice(custId,prodId,defaultPrice);
  const priceEl=document.getElementById(`aiprice_${i}`);
  if (priceEl) priceEl.value=price;
  updateAddItemTotal();
}

function updateAddItemTotal() {
  let sum=0;
  document.querySelectorAll('#addItemsBody tr').forEach(row=>{
    const m=row.id?.match(/airow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`aiqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`aiprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`aitotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sum+=t;
  });
  const el=document.getElementById('addItemTotal'); if(el)el.textContent='฿'+U.money(sum);
}

async function saveAddItems(orderId) {
  if (window._saving){return;} window._saving=true;
  try {
    const order=await DB.getOrder(orderId); if(!order)return;
    const newItems=[];
    document.querySelectorAll('#addItemsBody tr').forEach(row=>{
      const m=row.id?.match(/airow_(\d+)/); if(!m)return;
      const i=m[1];
      const sel=document.getElementById(`aiprod_${i}`);
      const prodId=sel?.value; if(!prodId)return;
      const opt=sel.options[sel.selectedIndex];
      const qty=parseFloat(document.getElementById(`aiqty_${i}`)?.value||1);
      const price=parseFloat(document.getElementById(`aiprice_${i}`)?.value||0);
      const productName=opt.dataset.name||opt.text||'';
      const existingIdx=(order.items||[]).findIndex(x=>x.productId===prodId);
      if (existingIdx>=0) { order.items[existingIdx].qty+=qty; }
      else { newItems.push({productId:prodId,productName,qty,price}); }
    });
    if (!newItems.length && !document.querySelectorAll('#addItemsBody tr').length) {
      U.toast('กรุณาเพิ่มรายการสินค้า','error'); return;
    }
    const extraNotes=document.getElementById('addItemNotes')?.value.trim();
    order.items=[...(order.items||[]),...newItems];
    if (extraNotes) order.notes=(order.notes?order.notes+' | ':'')+extraNotes;
    await DB.putOrder(order);
    U.toast('เพิ่มรายการเข้าออเดอร์แล้ว ✓');
    closeModal('addItemsModal');
    navigate('orders');
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: '+e.message,'error');
  } finally {
    window._saving=false;
  }
}

function orderItemRow(i, products, item={}, custId) {
  const _TAIL=['เทพ','มุม','เส้น'];
  const _isTail=n=>_TAIL.some(k=>(n||'').includes(k));
  const sortedProds=[...(products||[])].sort((a,b)=>{
    const aT=_isTail(a.name), bT=_isTail(b.name);
    if(aT&&!bT) return 1;
    if(!aT&&bT) return -1;
    return (a.name||'').localeCompare(b.name||'','th');
  });
  const opts=sortedProds.map((p,idx)=>`<option value="${p.id}" data-price="${p.price}" data-name="${U.esc(p.name)}" ${item.productId==p.id?'selected':''}>${idx+1}. ${U.esc(p.name)}</option>`).join('');
  const SS='font-size:15px;font-weight:600;border:2px solid #d1d5db;border-radius:8px;padding:7px 10px;width:100%;background:#fff;cursor:pointer;';

  // หา spec จากชื่อสินค้า
  const pName = item.productName||'';
  const _rowProd = (products||[]).find(p=>p.name===pName);
  const _isAcc = _rowProd ? ((_rowProd.unit||'โลง').trim()!=='โลง') : ['เทพ','มุม','เส้น'].some(k=>pName.includes(k));
  const _baseSpec = COFFIN_SPEC[pName] || {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']};
  const spec  = _isAcc ? {colors:[], lines:_baseSpec.lines, extra:_baseSpec.extra} : _baseSpec;
  const hasColor = spec.colors.length > 0;

  // สีโลง options

  const colorOpts = hasColor
    ? spec.colors.map(c=>`<option value="${c}" ${colorVal===c?'selected':''}>${c==='ขาว'?'⬜':'🟥'} ${c}</option>`).join('')
    : '<option value="-">-</option>';

  // สีเส้น options
  const lineVal = item.trimColor || spec.lines[0] || 'ทอง';
  const lineIcons = {ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};

      </select>
    </div>` : `<div id="oiextra_wrap_${i}" style="display:none;"></div>`;

  const specialVal=U.esc(item.specialNote||'');
  return `<tr id="oirow_${i}" class="order-item-row" style="vertical-align:top;border-bottom:3px solid #e5e7eb;">
    <td style="min-width:220px;padding:8px 6px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
        <span class="order-item-num">รายการที่ ${i+1}</span>
      </div>
      <select style="${SS}border-color:#2563eb!important;" onchange="onOrderProdChange(this,${i})" id="oiprod_${i}">
        <option value="">🔍 -- เลือกสินค้า --</option>${opts}
      </select>
      <div id="oispec_${i}" style="${(!pName||_isAcc)?'display:none;':''}">
        <div style="display:grid;grid-template-columns:${hasColor?'1fr 1fr':'1fr'};gap:6px;margin-top:7px;">
          ${hasColor?`<div>
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">🎨 สีโลง</div>
            <select id="oicolor_${i}" style="${SS}font-size:14px;" onchange="updateItemPrice(${i})">${colorOpts}</select>
          </div>`:''}
          <div>
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">✨ สีเส้น</div>
            <select id="oitrim_${i}" style="${SS}font-size:14px;" onchange="updateItemPrice(${i})">${lineOpts}</select>
          </div>
        </div>
        ${extraHtml}

      <input type="text" class="form-control mt-1" id="oisp_${i}" value="${specialVal}" style="font-size:13px;border-radius:8px;border:2px solid #d1d5db;" placeholder="📝 หมายเหตุพิเศษ...">

    <td style="padding:8px 4px;"><button type="button" class="btn btn-outline-danger" style="width:36px;height:36px;padding:0;border-radius:8px;" onclick="document.getElementById('oirow_${i}').remove();calcOrderTotal();renumberOrderRows()"><i class="fa-solid fa-trash"></i></button></td>
  </tr>`;
}

function updateItemSpec(i, prodName) {
  const _uProd = (window._orderProds||[]).find(p=>p.name===prodName);
  const _uAcc = _uProd ? ((_uProd.unit||'โลง').trim()!=='โลง') : ['เทพ','มุม','เส้น'].some(k=>(prodName||'').includes(k));
  const _uBase = COFFIN_SPEC[prodName] || {colors:['ขาว','แดง'], lines:['ทอง','เงิน','ซีด','ขาว']};
  const spec = _uAcc ? {colors:[], lines:_uBase.lines, extra:_uBase.extra} : _uBase;
  const hasColor = spec.colors.length > 0;
  const SS='font-size:15px;font-weight:600;border:2px solid #d1d5db;border-radius:8px;padding:7px 10px;width:100%;background:#fff;cursor:pointer;';
  const lineIcons = {ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};
  const lineOpts = spec.lines.map(l=>`<option value="${l}">${lineIcons[l]||''} ${l}</option>`).join('');
  const colorOpts = hasColor
    ? spec.colors.map(c=>`<option value="${c}">${c==='ขาว'?'⬜':'🟥'} ${c}</option>`).join('')
    : '<option value="-">-</option>';
  const extraHtml = spec.extra ? `<div style="margin-top:6px;">
      <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">📐 ขนาด</div>
      <select id="oiextra_${i}" style="${SS}font-size:14px;">
        <option value="">-- ไม่ระบุ --</option>
        ${spec.extra.map(e=>`<option value="${e}">${e}</option>`).join('')}
      </select></div>` : '';
  const wrap = document.getElementById(`oispec_${i}`);
  if (!wrap) return;

  wrap.innerHTML = `<div style="display:grid;grid-template-columns:${hasColor?'1fr 1fr':'1fr'};gap:6px;margin-top:7px;">
    ${hasColor?`<div><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">🎨 สีโลง</div><select id="oicolor_${i}" style="${SS}font-size:14px;">${colorOpts}</select></div>`:''}
    <div><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">✨ สีเส้น</div><select id="oitrim_${i}" style="${SS}font-size:14px;" onchange="updateItemPrice(${i})">${lineOpts}</select></div>
  </div>${extraHtml}`;
}

async function updateItemPrice(i) {
  const prodSel = document.getElementById(`oiprod_${i}`);
  if (!prodSel?.value) return;
  const prodId = prodSel.value;
  const trimColor = document.getElementById(`oitrim_${i}`)?.value || '';
  // หาจาก window._orderProds ก่อน ถ้าไม่เจอดึงจาก DB โดยตรง
  let prod = (window._orderProds || []).find(p => p.id === prodId);
  if (!prod) prod = await DB.getProduct(prodId);
  if (!prod) return;
  // ราคาจาก priceMap[trimColor] → priceMap ค่าใดก็ได้ → prod.price
  let price = 0;
  if (trimColor && prod.priceMap?.[trimColor] != null) {
    price = prod.priceMap[trimColor];
  } else if (prod.priceMap && Object.keys(prod.priceMap).length > 0) {
    // ถ้า trim ที่เลือกไม่มีในแผน ใช้ค่าแรกที่มี
    const firstKey = Object.keys(prod.priceMap)[0];
    price = prod.priceMap[firstKey] || 0;
  } else {
    price = prod.price || 0;
  }
  if (window._orderCustId) price = await DB.getEffectivePrice(window._orderCustId, prodId, price, trimColor);
  const priceEl = document.getElementById(`oiprice_${i}`);
  if (priceEl) { priceEl.value = price; calcOrderTotal(); }
}

// ── filter pending by date ──
async function filterPendingByDate(dateStr) {
  const d = window._dashTodayData;
  if (!d) return;
  const allOrders = window._allOrdersCache || [];
  const selDate = new Date(dateStr); selDate.setHours(0,0,0,0);
  const selTs = selDate.getTime();
  const isToday = dateStr === new Date().toISOString().slice(0,10);

  const filtered = allOrders.filter(o => {
    const created = new Date(o.createdAt); created.setHours(0,0,0,0);
    const createdTs = created.getTime();
    const delivTs = o.deliveredAt ? (() => { const dd=new Date(o.deliveredAt);dd.setHours(0,0,0,0);return dd.getTime(); })() : null;
    if (isToday) {
      return !o.isDelivered || (delivTs !== null && delivTs >= selTs);
    } else {
      return createdTs === selTs;
    }
  }).sort((a,b)=>a.createdAt-b.createdAt);

  d.pendingOrders = filtered;
  const listEl = document.getElementById('pendingList');
  const countEl = document.getElementById('pendingCount');
  if (countEl) countEl.textContent = filtered.length + ' รายการ';
  if (!listEl) return;

  if (!filtered.length) {
    const label = isToday ? 'ส่งของครบแล้ว ไม่มีรายการค้างส่ง' : 'ไม่มีออเดอร์ในวันที่นี้';
    listEl.innerHTML = '<div style="opacity:.6;font-size:13px;text-align:center;padding:20px 0;"><i class="fa-solid fa-circle-check me-2"></i>' + label + '</div>';
    return;
  }
  listEl.innerHTML = buildPendingHtml(filtered);
}

// ── พิมพ์รายการออเดอร์วันนี้ ──
// ── helper: group pending orders by customer → HTML ──
function buildPendingHtml(orders) {
  if (!orders.length) return '<div style="opacity:.6;font-size:13px;text-align:center;padding:20px 0;"><i class="fa-solid fa-circle-check me-2"></i>ส่งของครบแล้ว ไม่มีรายการค้างส่ง</div>';
  // group by customerId (fallback customerName)
  const map = new Map();
  for (const o of orders) {
    const key = o.customerId || o.customerName;
    if (!map.has(key)) map.set(key, {customerName:o.customerName, custId:o.customerId, orders:[]});
    map.get(key).orders.push(o);
  }
  return [...map.values()].map(g => {
    const allDone   = g.orders.every(o => o.isDelivered && o.deliveredAt);
    const pendingIds= g.orders.filter(o => !o.isDelivered).map(o => o.id);
    const latestTs  = Math.max(...g.orders.map(o => o.createdAt));
    // merge items across all orders in group
    const merged = [];
    for (const o of g.orders) {
      for (const i of (o.items||[])) {
        const isChrist = i.trimColor==='คริสต์'||i.style==='คริสต์';
        const label = i.productName
          + (i.color&&i.color!=='-'?' ('+i.color+')':'')
          + (isChrist?' ✝คริสต์':(i.trimColor?' เส้น'+i.trimColor:''))
          + (i.extra?' '+i.extra:'');
        const ex = merged.find(m => m.key===label);
        if (ex) ex.qty += i.qty; else merged.push({key:label, qty:i.qty});
      }
    }
    const ordNos = g.orders.length > 1 ? ` <span style="font-size:10px;opacity:.55;">(${g.orders.length} ออเดอร์)</span>` : '';
    const doneTag = allDone ? '<span style="font-size:11px;background:rgba(134,239,172,.25);border-radius:10px;padding:1px 8px;margin-left:5px;">✅ ส่งแล้ว</span>' : '';
    const deliverBtn = !allDone
      ? `<button class="btn-card-solid" style="font-size:11px;padding:3px 10px;background:rgba(34,197,94,.25);border:1.5px solid rgba(134,239,172,.5);" onclick="markDeliveredGroup(${JSON.stringify(pendingIds)})"><i class="fa-solid fa-truck me-1"></i>จัดส่งแล้ว</button>`
      : '';
    const billBtn = `<button class="btn-card-outline" style="font-size:11px;padding:3px 10px;" onclick="showCreateReceiptModal(null,'${encodeURIComponent(g.customerName||'')}')"><i class="fa-solid fa-file-invoice me-1"></i>ออกบิล</button>`;
    const itemsHtml = merged.map(({key,qty}) =>
      `<div class="pend-row" style="display:flex;justify-content:space-between;opacity:.85;"><span>${U.esc(key)}</span><span style="font-weight:700;">${qty}</span></div>`
    ).join('');
    return `<div style="border-bottom:1px solid rgba(255,255,255,.12);padding:10px 0;${allDone?'opacity:.5;':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;">
        <div>
          <span style="font-size:15px;font-weight:700;">${U.esc(g.customerName||'-')}</span>${ordNos}
          <span style="font-size:11px;opacity:.65;margin-left:7px;">${U.date(latestTs)}</span>
          ${doneTag}
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;">${deliverBtn}${billBtn}</div>
      </div>${itemsHtml}</div>`;
  }).join('');
}

function printPendingOrders(ordersInput) {
  const d = window._dashTodayData;
  const ordersToUse = ordersInput || (d ? d.pendingOrders : null);
  if (!ordersToUse || !ordersToUse.length) {
    U.toast('ไม่มีรายการรอส่ง','error'); return;
  }
  // สร้าง list จาก pendingOrders — แยก โลง vs อุปกรณ์เสริม
  const prodCache = window._allProductsCache || {};
  function isCoffin(productName) {
    const p = prodCache[productName];
    if (p) return (p.unit||'โลง').trim() === 'โลง';
    return !!COFFIN_SPEC[productName]; // fallback ใช้ COFFIN_SPEC
  }
  const list = ordersToUse.map(o=>{
    const items={};     // โลง (นับจำนวน)
    const extras={};    // อุปกรณ์เสริม (แสดงแต่ไม่นับ)
    (o.items||[]).forEach(i=>{
      const isChrist=i.trimColor==='คริสต์'||i.style==='คริสต์';
      const key=i.productName+(i.color&&i.color!=='-'?' ('+i.color+')':'')+(isChrist?' ✝คริสต์':(i.trimColor?' เส้น'+i.trimColor:''))+(i.extra?' '+i.extra:'');
      if(isCoffin(i.productName)) items[key]=(items[key]||0)+i.qty;
      else extras[key]=(extras[key]||0)+i.qty;
    });
    return {name:o.customerName, date:U.date(o.createdAt), items, extras};
  });
  const totalPieces = list.reduce((a,c)=>a+Object.values(c.items).reduce((x,v)=>x+v,0),0);
  const totalCusts  = list.length;

  const rows = list.map(c=>{

function onOrderCustChange(sel) {
  window._orderCustId=sel.value||null;
  // re-apply prices for all selected products
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const prodSel=document.getElementById(`oiprod_${m[1]}`);
    if (prodSel?.value) onOrderProdChange(prodSel,m[1]);
  });
}

async function onOrderProdChange(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const prodName=opt.dataset.name||opt.text||'';
  updateItemSpec(i, prodName);
  // Use updateItemPrice to pick up priceMap + customer price
  await updateItemPrice(i);
}

function calcOrderTotal() {
  let sub=0;
  document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
    const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`oitotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('of_discount')?.value||0);
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('os_sub',sub); s('os_disc',disc); s('os_total',sub-disc);
}

async function saveOrder() {
  if (window._saving){return;} window._saving=true;
  try {
    const custId=document.getElementById('of_cust')?.value||'';
    if (!custId){U.toast('กรุณาเลือกลูกค้า','error');return;}
    const cust=await DB.getCustomer(custId);

    const items=[]; let anyItem=false;
    document.querySelectorAll('#orderItemsBody tr').forEach(row=>{
      const m=row.id?.match(/oirow_(\d+)/); if(!m)return;
      const i=m[1];
      const sel=document.getElementById(`oiprod_${i}`);
      const prodId=sel?.value; if(!prodId)return;
      const opt=sel.options[sel.selectedIndex];
      const qty=parseFloat(document.getElementById(`oiqty_${i}`)?.value||1);
      const price=parseFloat(document.getElementById(`oiprice_${i}`)?.value||0);
      const color      = document.getElementById(`oicolor_${i}`)?.value||'';
      const trimColor  = document.getElementById(`oitrim_${i}`)?.value||'';
      const extra      = document.getElementById(`oiextra_${i}`)?.value||'';
      const specialNote= document.getElementById(`oisp_${i}`)?.value.trim()||'';
      items.push({productId:prodId,productName:opt.dataset.name||opt.text,qty,price,color,trimColor,extra,specialNote});
      anyItem=true;
    });
    if (!anyItem){U.toast('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ','error');return;}

    const editId=document.getElementById('of_editId')?.value||'';
    const dateStr=document.getElementById('of_date')?.value;
    const createdAt=dateStr?new Date(dateStr).setHours(new Date().getHours(),new Date().getMinutes(),0,0):Date.now();

    const data={
      customerId:custId, customerName:cust?.name||'',
      items,
      discount:parseFloat(document.getElementById('of_discount')?.value||0),
      notes:document.getElementById('of_notes')?.value.trim()||'',
      createdAt,
    };
    if (editId) {
      const old=await DB.getOrder(editId);
      await DB.putOrder({...old,...data,id:editId});
      U.toast('แก้ไขออเดอร์แล้ว ✓');
    } else {
      data.orderNo=await DB.nextOrderNo();
      await DB.addOrder(data);
      U.toast('บันทึกออเดอร์แล้ว ✓');
      // แจ้งเตือน LINE กลุ่ม (fire-and-forget)
      const lineItems = data.items.map(it=>({
        name: it.productName,
        qty: it.qty,
        total: it.qty * it.price
      }));
      const lineTotal = lineItems.reduce((s,i)=>s+i.total,0) - (data.discount||0);
      fetch('/api/notify-line', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          orderNo: data.orderNo,
          customerName: data.customerName,
          items: lineItems,
          total: lineTotal,
          createdAt: data.createdAt
        })
      }).catch(()=>{}); // ไม่แสดง error ถ้าแจ้งเตือนล้มเหลว
    }
    closeModal('orderModal');
    navigate('orders');
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: '+e.message,'error');
  } finally {
    window._saving=false;
  }
}

// ── ราคาพิเศษต่อลูกค้า ──
async function showCustomerPriceModal(custId) {
  const [cust, products] = await Promise.all([DB.getCustomer(custId), DB.getProducts()]);
  if (!cust||!products.length){U.toast('กรุณาเพิ่มสินค้าก่อน','error');return;}
  const lineIcons={ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};
  const rows=products.map(p=>{
    const spec=COFFIN_SPEC[p.name];
    const lines=spec?.lines||Object.keys(p.priceMap||{});
    const cpObj=cust.customPrices?.[p.id];
    if(!lines.length){
      const val=(typeof cpObj==='number')?cpObj:'';
      return `<tr style="background:#f8fafc;"><td colspan="2"><strong>${U.esc(p.name)}</strong></td>
        <td><input type="number" class="form-control form-control-sm" id="cp_${p.id}__" min="0" value="${val}" placeholder="ราคาปกติ ${U.money(p.price)}"></td></tr>`;
    }
    const subRows=lines.map(l=>{
      const defPrice=p.priceMap?.[l]??p.price;
      const val=(typeof cpObj==='object'&&cpObj?.[l]!==undefined)?cpObj[l]:'';
      return `<tr><td style="padding-left:24px;font-size:13px;">${lineIcons[l]||''} เส้น${l}</td>
        <td style="text-align:center;font-size:13px;color:#6b7280;">฿${U.money(defPrice)}</td>
        <td><input type="number" class="form-control form-control-sm" id="cp_${p.id}_${l}" min="0" value="${val}" placeholder="ราคาปกติ ${U.money(defPrice)}"></td></tr>`;
    }).join('');
    return `<tr style="background:#eff6ff;"><td colspan="3" style="padding:7px 12px;font-weight:700;color:#1e3a8a;font-size:14px;">📦 ${U.esc(p.name)}</td></tr>${subRows}`;
  }).join('');
  const body=`<p style="font-size:13px;color:#6b7280;margin-bottom:12px;">ตั้งราคาพิเศษสำหรับ <strong>${U.esc(cust.name)}</strong><br>ปล่อยว่างไว้ = ใช้ราคาปกติของสินค้า</p>
    <table class="table-clean"><thead><tr><th>สีเส้น</th><th style="text-align:center;">ราคาปกติ</th><th>ราคาของร้านนี้</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
  showModal('custPriceModal',`ราคาพิเศษ — ${U.esc(cust.name)}`,body,
    `<button class="btn btn-primary" onclick="saveCustomerPrices('${custId}')"><i class="fa-solid fa-floppy-disk me-1"></i>บันทึกราคา</button>
     <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`,'modal-lg');
  window._custPriceProducts=products;
}

async function saveCustomerPrices(custId) {
  const cust=await DB.getCustomer(custId);
  const customPrices={};
  (window._custPriceProducts||[]).forEach(p=>{
    const spec=COFFIN_SPEC[p.name];
    const lines=spec?.lines||Object.keys(p.priceMap||{});
    if(!lines.length){
      const el=document.getElementById(`cp_${p.id}__`);
      const val=el?.value.trim();
      if(val!=='') customPrices[p.id]=parseFloat(val);
    } else {
      const pricePerLine={};
      lines.forEach(l=>{
        const el=document.getElementById(`cp_${p.id}_${l}`);
        const val=el?.value.trim();
        if(val!=='') pricePerLine[l]=parseFloat(val);
      });
      if(Object.keys(pricePerLine).length) customPrices[p.id]=pricePerLine;
    }
  });
  await DB.putCustomer({...cust,customPrices});
  U.toast('บันทึกราคาพิเศษแล้ว ✓');
  closeModal('custPriceModal');
  navigate('customers');
}

function prodRow(p,i) {
  const spec=COFFIN_SPEC[p.name];
  const lines=spec?.lines||Object.keys(p.priceMap||{});
  const lineIcons={ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};
  let priceCell;
  const pm=p.priceMap||{};
  const hasPm=lines.length&&Object.keys(pm).some(k=>pm[k]>0);
  if(hasPm){
    priceCell=lines.filter(l=>pm[l]!=null).map(l=>
      `<span style="font-size:11px;background:#eff6ff;color:#1e40af;border-radius:5px;padding:2px 7px;margin:1px 2px;display:inline-block;white-space:nowrap;">${lineIcons[l]||''}${l} <b>฿${U.money(pm[l])}</b></span>`
    ).join('');
  } else {
    priceCell=`<span style="font-weight:700;color:#2563eb;">฿${U.money(p.price)}</span>`;
  }
  return `<tr>
    <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px;">${U.esc(p.code||'-')}</code></td>
    <td><strong>${U.esc(p.name)}</strong></td>

function filterProdTable(val) {
  const q=val.toLowerCase();
  const data=(window._prodData||[]).filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  document.getElementById('prodTbody').innerHTML=data.map((p,i)=>prodRow(p,i)).join('')||emptyRow(6,'ไม่พบสินค้า');
}

function buildPriceFields(prodName, existingPm) {
  const spec=COFFIN_SPEC[prodName];
  // ถ้า COFFIN_SPEC ไม่มี ให้ดูจาก priceMap ที่มีอยู่แล้ว
  const pmKeys = Object.keys(existingPm||{}).filter(k=>k!=='__default'&&existingPm[k]>0);
  // default เสมอ: อย่างน้อยต้องมี ทอง + เงิน
  const DEFAULT_LINES = ['ทอง','เงิน'];
  const lines = spec?.lines?.length ? spec.lines : (pmKeys.length ? pmKeys : DEFAULT_LINES);
  const lineIcons={ทอง:'🟡',เงิน:'🔘',ซีด:'🥉',ขาว:'⬜',คริสต์:'✝',ผ้าจีบ:'🪷',ผ้าดอก:'🌸'};
  return `<div class="col-12"><label class="form-label fw-semibold">✨ ราคาตามสีเส้น (บาท)</label>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;">
      ${lines.map(l=>`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
        <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;">${lineIcons[l]||''} ${l}</div>
        <input type="number" class="form-control form-control-sm" id="pf_pm_${l}" min="0" placeholder="ราคา..." value="${existingPm?.[l]||''}">
      </div>`).join('')}
    </div></div>
  <input type="hidden" id="pf_price" value="0">`;
}

function refreshPriceFields(name) {
  const wrap=document.getElementById('pf_price_wrap');

async function saveProduct() {
  if (window._saving){return;} window._saving=true;
  try {
    const name=document.getElementById('pf_name')?.value.trim();
    if (!name){U.toast('กรุณากรอกชื่อสินค้า','error');return;}
    const id=document.getElementById('pf_id')?.value||'';
    const spec=COFFIN_SPEC[name];
    const DEFAULT_LINES=['ทอง','เงิน'];
    const pmKeys=id?(Object.keys((await DB.getProduct(id))?.priceMap||{}).filter(k=>k!=='__default')):[];
    const lines=spec?.lines?.length?spec.lines:(pmKeys.length?pmKeys:DEFAULT_LINES);
    const priceMap={};
    document.querySelectorAll('[id^="pf_pm_"]').forEach(el=>{
      const l=el.id.replace('pf_pm_','');
      const v=parseFloat(el.value||'');
      if(!isNaN(v)&&v>0) priceMap[l]=v;
    });
    const defaultPrice=parseFloat(document.getElementById('pf_price')?.value||0)||0;
    const data={code:document.getElementById('pf_code')?.value.trim()||'',name,
      category:document.getElementById('pf_cat')?.value.trim()||'',
      unit:document.getElementById('pf_unit')?.value.trim()||'โลง',
      price:defaultPrice, priceMap};
    if (id){const old=await DB.getProduct(id);await DB.putProduct({...old,...data});U.toast('แก้ไขสินค้าแล้ว ✓');}
    else{await DB.addProduct(data);U.toast('เพิ่มสินค้าแล้ว ✓');}
    closeModal('prodModal');navigate('products');
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: '+e.message,'error');
  } finally {
    window._saving=false;
  }
}

function deleteProduct(id) {
  U_confirm('ต้องการลบสินค้านี้ใช่ไหม? ข้อมูลจะหายไปถาวร', async()=>{
    await DB.delProduct(id);U.toast('ลบสินค้าแล้ว');navigate('products');
  });
}

function applyInvFilter() {
  const q = (document.getElementById('invSearch')?.value||'').toLowerCase();
  const custId = document.getElementById('invFilterCust')?.value||'';
  const status = document.getElementById('invFilterStatus')?.value||'';
  const from = document.getElementById('invFilterFrom')?.value||'';
  const to   = document.getElementById('invFilterTo')?.value||'';
  let data = window._invData||[];
  if (q)      data = data.filter(i=>i.invoiceNo?.toLowerCase().includes(q)||i.customerName?.toLowerCase().includes(q));
  if (custId) data = data.filter(i=>String(i.customerId)===custId);
  if (status==='paid')   data = data.filter(i=>i.isPaid);
  if (status==='unpaid') data = data.filter(i=>!i.isPaid);
  if (from)   data = data.filter(i=>new Date(i.createdAt).toISOString().slice(0,10)>=from);
  if (to)     data = data.filter(i=>new Date(i.createdAt).toISOString().slice(0,10)<=to);
  document.getElementById('invTbody').innerHTML=data.map(invRow).join('')||emptyRow(7,'ไม่พบใบเสร็จ');
}

async function showCreateReceiptModal(editId, prefillCustName) {
  const [customers,products,allOrders]=await Promise.all([DB.getCustomers(),DB.getProducts(),DB.getOrders()]);
  const edit=editId?await DB.getInvoice(editId):null;
  window._rcCustList=customers; window._rcProdList=products; window._rcAllOrders=allOrders;
  window._rcCustId=edit?.customerId||null; window._rcItemIdx=edit?(edit.items||[]).length:1;

  // Pre-select customer from dashboard button + ตรวจใบซ้ำวันนี้
  let prefillCustId = null;
  const skipDup = !!window._skipDupCheck; window._skipDupCheck = false;
  if (prefillCustName && !editId) {
    const decoded = decodeURIComponent(prefillCustName);
    const found   = customers.find(c => c.name === decoded);
    if (found) {
      prefillCustId = found.id;
      window._rcCustId = found.id;

      if (!skipDup) {
        const allInvoices = await DB.getInvoices();
        const todayStart  = new Date(); todayStart.setHours(0,0,0,0);
        const existing    = allInvoices.find(inv =>
          inv.customerId === found.id && inv.createdAt >= todayStart.getTime()
        );
        if (existing) {
          const enc = encodeURIComponent(decoded);
          showModal('dupInvModal', 'พบใบเสร็จซ้ำ',
            `<div style="background:#fef3c7;border-radius:10px;padding:14px 18px;border-left:4px solid #f59e0b;margin-bottom:12px;">
               <strong style="color:#92400e;">⚠️ พบใบเสร็จวันนี้แล้ว</strong><br>
               <span style="font-size:13px;color:#78350f;">ลูกค้า <strong>${U.esc(found.name)}</strong>

function rcItemRow(i, item={}) {
  const opts=(window._rcProdList||[]).map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${U.esc(p.name)}">${U.esc(p.name)}</option>`).join('');
  return `<tr id="rcrow_${i}">
    <td><input type="text" class="form-control form-control-sm" id="rcname_${i}" value="${U.esc(item.name||'')}" placeholder="ชื่อสินค้า" oninput="calcRcTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="rcqty_${i}" value="${item.qty||1}" min="1" oninput="calcRcTotal()"></td>
    <td><input type="number" class="form-control form-control-sm" id="rcprice_${i}" value="${item.price||0}" min="0" oninput="calcRcTotal()"></td>
    <td><span id="rctotal_${i}" style="font-size:13px;font-weight:600;">฿${U.money((item.qty||1)*(item.price||0))}</span></td>
    <td>
      <select class="form-select form-select-sm" onchange="onRcProdSelect(this,${i})" style="font-size:12px;">
        <option value="">เลือกสินค้า...</option>${opts}
      </select>
    </td>
  </tr>`;
}

function addRcItemRow() {
  const i=window._rcItemIdx++;
  document.getElementById('rcItemsBody').insertAdjacentHTML('beforeend',rcItemRow(i));
}

function onRcCustChange(sel) {
  window._rcCustId=sel.value||null;
  const cust=(window._rcCustList||[]).find(c=>c.id===window._rcCustId);
  const addrEl=document.getElementById('rc_addr');
  if (addrEl&&cust?.address) addrEl.value=cust.address;
}

// ดึงออเดอร์ของลูกค้าในวันที่เลือกมาใส่บิลอัตโนมัติ
// เปิด receipt modal ใหม่โดยข้ามการตรวจสอบใบซ้ำ (กรณีผู้ใช้ยืนยันสร้างใหม่)
function _forceNewInvoice(encodedName) {
  window._skipDupCheck = true;
  showCreateReceiptModal(null, encodedName);
}

function pullOrdersToReceipt() {
  const custId=window._rcCustId;
  if (!custId){U.toast('กรุณาเลือกลูกค้าก่อน','error');return;}
  const dateStr=document.getElementById('rc_pullDate')?.value;
  if (!dateStr){U.toast('กรุณาเลือกวันที่','error');return;}
  const date=new Date(dateStr);

  const orders=(window._rcAllOrders||[]).filter(o=>{
    const d=new Date(o.createdAt);
    return o.customerId===custId &&
      d.getFullYear()===date.getFullYear() &&
      d.getMonth()===date.getMonth() &&
      d.getDate()===date.getDate();
  });

  if (!orders.length){
    U.toast(`ไม่พบออเดอร์ของลูกค้านี้ในวันที่ ${date.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}`, 'error');
    return;
  }

  // รวมรายการทั้งหมดจากทุกออเดอร์
  const merged = {};
  orders.forEach(o=>(o.items||[]).forEach(i=>{
    const key = i.productName+'|'+i.price+'|'+(i.color||'')+'|'+(i.trimColor||'')+'|'+(i.style||'')+'|'+(i.specialNote||'');
    if (merged[key]) { merged[key].qty+=i.qty; }
    else { merged[key]={name:itemLabel(i),qty:i.qty,price:i.price}; }
  }));

  const items=Object.values(merged);
  window._rcItemIdx=items.length;
  document.getElementById('rcItemsBody').innerHTML=items.map((item,i)=>rcItemRow(i,item)).join('');
  calcRcTotal();
  U.toast(`✓ ดึง ${items.length} รายการ จาก ${orders.length} ออเดอร์ของวันนี้`);
}

function itemLabel(i) {
  let label=i.productName||'';
  if (i.color && i.color!=='-') label+=' '+i.color;
  const isChrist = i.trimColor==='คริสต์' || i.style==='คริสต์';
  if (isChrist) label+=' ✝คริสต์';
  else if (i.trimColor) label+=' เส้น'+i.trimColor;
  if (i.extra)       label+=' '+i.extra;
  if (i.specialNote) label+=' ('+i.specialNote+')';
  return label;
}

async function onRcProdSelect(sel,i) {
  const opt=sel.options[sel.selectedIndex];
  const prodId=sel.value; if(!prodId)return;
  const defaultPrice=parseFloat(opt.dataset.price||0);
  let price=defaultPrice;
  if (window._rcCustId) price=await DB.getEffectivePrice(window._rcCustId,prodId,defaultPrice);
  const nameEl=document.getElementById(`rcname_${i}`);
  const priceEl=document.getElementById(`rcprice_${i}`);
  if (nameEl) nameEl.value=opt.dataset.name||opt.text;
  if (priceEl) priceEl.value=price;
  sel.value=''; calcRcTotal();
}

function calcRcTotal() {
  let sub=0;
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const pr=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    const t=qty*pr;
    const tel=document.getElementById(`rctotal_${i}`); if(tel)tel.textContent='฿'+U.money(t);
    sub+=t;
  });
  const disc=parseFloat(document.getElementById('rc_disc')?.value||0);
  const taxRate=parseFloat(document.getElementById('rc_tax')?.value||0);
  const base=sub-disc; const tax=base*taxRate/100;
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='฿'+U.money(v);};
  s('rcs_sub',sub);s('rcs_disc',disc);s('rcs_tax',tax);s('rcs_total',base+tax);
}

async function saveReceipt(andPrint=false) {
  if (window._saving){return;} window._saving=true;
  const custId=document.getElementById('rc_cust')?.value||'';
  if (!custId){window._saving=false;U.toast('กรุณาเลือกลูกค้า','error');return;}
  const cust=(window._rcCustList||[]).find(c=>c.id===custId)||{};

  const items=[];
  document.querySelectorAll('#rcItemsBody tr').forEach(row=>{
    const m=row.id?.match(/rcrow_(\d+)/); if(!m)return;
    const i=m[1];
    const name=document.getElementById(`rcname_${i}`)?.value.trim();
    const qty=parseFloat(document.getElementById(`rcqty_${i}`)?.value||0);
    const price=parseFloat(document.getElementById(`rcprice_${i}`)?.value||0);
    if (name) items.push({name,qty,price});
  });
  if (!items.length){U.toast('กรุณาเพิ่มรายการสินค้า','error');return;}

  const editId=document.getElementById('rc_editId')?.value||'';
  const data={
    type:'receipt',
    customerId:custId, customerName:cust.name||'',
    customerAddress:document.getElementById('rc_addr')?.value.trim()||'',
    customerPhone:cust.phone||'', customerTaxId:cust.taxId||'',
    items,
    discount:parseFloat(document.getElementById('rc_disc')?.value||0),
    taxRate:parseFloat(document.getElementById('rc_tax')?.value||0),
    notes:document.getElementById('rc_notes')?.value.trim()||'',
  };

  // ── ป้องกันออกบิลซ้ำวันเดียวกัน (เฉพาะบิลใหม่) ──────────────────────
  if (!editId && !window._rcConfirmedDup) {
    const allInv=await DB.getInvoices();
    const todayStart=new Date(); todayStart.setHours(0,0,0,0);
    const existing=allInv.find(inv=>inv.customerId===custId&&inv.createdAt>=todayStart.getTime());
    if (existing) {
      const ap=andPrint;
      showModal('dupInvModal','พบใบเสร็จซ้ำ',
        `<div style="background:#fef3c7;border-radius:10px;padding:14px 18px;border-left:4px solid #f59e0b;margin-bottom:12px;">
           <strong style="color:#92400e;">⚠️ พบใบเสร็จวันนี้แล้ว</strong><br>
           <span style="font-size:13px;color:#78350f;">ลูกค้า <strong>${U.esc(cust.name)}</strong>
           มีใบเสร็จวันนี้แล้ว เลขที่ <strong>${U.esc(existing.invoiceNo)}</strong> (฿${U.money(U.invTotal(existing).total)})</span>
         </div>
         <p style="font-size:13px;color:#374151;margin:0;">ต้องการทำอะไร?</p>`,
        `<button class="btn btn-warning" onclick="closeModal('dupInvModal');showCreateReceiptModal('${existing.id}');">
           <i class="fa-solid fa-pen-to-square me-1"></i>แก้ไขใบเดิม (${U.esc(existing.invoiceNo)})
         </button>
         <button class="btn btn-primary" onclick="closeModal('dupInvModal');window._rcConfirmedDup=true;saveReceipt(${ap});">
           <i class="fa-solid fa-plus me-1"></i>ออกใบใหม่เพิ่ม
         </button>
         <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>`);
      return;
    }
  }
  window._rcConfirmedDup=false;
  // ─────────────────────────────────────────────────────────────────────────

  try {
    let savedId;
    if (editId){const old=await DB.getInvoice(editId);await DB.putInvoice({...old,...data});savedId=editId;U.toast('แก้ไขใบเสร็จแล้ว ✓');}
    else{data.invoiceNo=await DB.nextReceiptNo();savedId=await DB.addInvoice(data);U.toast('ออกใบเสร็จแล้ว ✓');}
    closeModal('rcModal');
    if (andPrint){
      const inv=await DB.getInvoice(savedId);
      setTimeout(()=>printReceiptData(inv), 400);
    }
    navigate('invoices');
  } catch(e) {
    U.toast('เกิดข้อผิดพลาด: '+e.message,'error');
  } finally {
    window._saving=false;
  }
}


function _promptpayPayload(rawId, amount) {
  function crc16(s){
    let c=0xFFFF;
    for(let i=0;i<s.length;i++){c^=s.charCodeAt(i)<<8;for(let j=0;j<8;j++)c=(c&0x8000)?((c<<1)^0x1021):(c<<1);}
    return(c&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
  }
  function f(tag,val){return tag+String(val.length).padStart(2,'0')+val;}
  const id=rawId.replace(/[^0-9]/g,'');
  let ptype,pval;
  if(id.length===10){ptype='01';pval='0066'+id.slice(1);}
  else if(id.length===13){ptype='02';pval=id;}
  else return null;
  const acct=f('00','A000000677010111')+f(ptype,pval);
  let p=f('00','01')+f('01','11')+f('29',acct)+f('52','0000')+f('53','764');
  if(amount>0) p+=f('54',amount.toFixed(2));
  p+=f('58','TH')+f('59','PromptPay')+f('60','Bangkok')+'6304';
  return p+crc16(p);
}

async function toggleInvPaid(id, paid) {
  const inv=await DB.getInvoice(id); if(!inv)return;
  await DB.putInvoice({...inv, isPaid:paid, paidAt:paid?Date.now():null, paidAmount:null});
  U.toast(paid?'บันทึกชำระแล้ว ✓':'ยกเลิกสถานะชำระแล้ว');
  navigate('invoices');
}

async function exportExcel() {
  if (typeof XLSX==='undefined'){U.toast('กำลังโหลด Excel library...','info');return;}
  const [invoices,customers]=await Promise.all([DB.getInvoices(),DB.getCustomers()]);
  invoices.sort((a,b)=>a.createdAt-b.createdAt);
  const invSheet=invoices.map(inv=>{
    const t=U.invTotal(inv);
    return {'เลขที่ใบเสร็จ':inv.invoiceNo||'','ลูกค้า':inv.customerName||'','วันที่':U.date(inv.createdAt),
      'รายการสินค้า':(inv.items||[]).map(i=>i.name+' x'+i.qty).join(', '),
      'ยอดก่อนส่วนลด':t.subtotal,'ส่วนลด':t.discount,'ยอดสุทธิ':t.total,
      'ชำระแล้ว (บาท)':invPaid(inv),'ยังค้าง (บาท)':Math.max(0,t.total-invPaid(inv)),
      'สถานะ':invPaid(inv)>=t.total&&t.total>0?'ชำระแล้ว':invPaid(inv)>0?'ชำระบางส่วน':'ค้างชำระ','วันที่ชำระ':inv.paidAt?U.date(inv.paidAt):''};
  });
  const outstanding={},outCount={};
  invoices.forEach(i=>{
    const rem=Math.max(0,U.invTotal(i).total-invPaid(i));
    if(rem>0&&i.customerId){outstanding[i.customerId]=(outstanding[i.customerId]||0)+rem;
      outCount[i.customerId]=(outCount[i.customerId]||0)+1;}
  });
  const custSheet=customers.filter(c=>outstanding[c.id]>0)
    .sort((a,b)=>(outstanding[b.id]||0)-(outstanding[a.id]||0))
    .map(c=>({'ชื่อลูกค้า':c.name,'จำนวนบิลค้าง':outCount[c.id]||0,'ยอดค้างชำระ (บาท)':outstanding[c.id]||0}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(invSheet),'ใบเสร็จทั้งหมด');
  if(custSheet.length) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(custSheet),'ยอดค้างชำระ');
  const d=new Date();
  XLSX.writeFile(wb,'kailoong_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  U.toast('Export Excel สำเร็จ ✓');
}

function setReportRange(r) {
  window._reportRange = r;

async function renderReports(el) {
  // ── ดึง filter ที่บันทึกไว้ (default: เดือนนี้) ──
  const rng = window._reportRange || 'month';
  const now = new Date();
  function getRangeTs(r) {
    const y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
    if (r==='today')  return new Date(y,m,d).getTime();
    if (r==='week')   return new Date(y,m,d-now.getDay()).getTime();
    if (r==='month')  return new Date(y,m,1).getTime();
    if (r==='year')   return new Date(y,0,1).getTime();
    if (r==='custom') {
      const v=document.getElementById('rpt_from')?.value||window._reportFrom||'';
      return v ? new Date(v).getTime() : 0;
    }
    return 0; // all
  }
  function getRangeEnd(r) {
    if (r==='custom') {
      const v=document.getElementById('rpt_to')?.value||window._reportTo||'';
      return v ? new Date(v).setHours(23,59,59,999) : Date.now();
    }
    return Date.now();
  }
  const rangeStart = getRangeTs(rng);
  const rangeEnd   = getRangeEnd(rng);

  const rangeLabels={today:'วันนี้',week:'สัปดาห์นี้',month:'เดือนนี้',year:'ปีนี้',all:'ทั้งหมด',custom:'กำหนดเอง'};

  const [orders,invoices,customers,expenses]=await Promise.all([DB.getOrders(),DB.getInvoices(),DB.getCustomers(),DB.getExpenses()]);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();

  // ── วันนี้ (fixed — ไม่เปลี่ยนตาม filter) ──
  const todayOrders=orders.filter(o=>U.isToday(o.createdAt));
  const todayItemsMap={};
  todayOrders.forEach(o=>(o.items||[]).forEach(i=>{
    if(!todayItemsMap[i.productName])todayItemsMap[i.productName]={qty:0,total:0};
    todayItemsMap[i.productName].qty+=i.qty;
    todayItemsMap[i.productName].total+=i.qty*i.price;
  }));
  const todayTotal=todayOrders.reduce((a,o)=>a+U.orderTotal(o),0);

  // ── ช่วงที่เลือก ──
  const rangeInvoices=invoices.filter(i=>i.createdAt>=rangeStart&&i.createdAt<=rangeEnd);
  const rangeOrders=orders.filter(o=>o.createdAt>=rangeStart&&o.createdAt<=rangeEnd);
  const rangeExpenses=expenses.filter(e=>e.date>=rangeStart&&e.date<=rangeEnd);
  const monthIncome=rangeInvoices.reduce((a,i)=>a+U.invTotal(i).total,0);

  // ── 6 เดือน ──
  const months=Array.from({length:6},(_,k)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+k,1);
    return {year:d.getFullYear(),month:d.getMonth(),label:d.toLocaleDateString('th-TH-u-ca-buddhist',{month:'short',year:'2-digit'})};
  });
  const monthRevenue=months.map(m=>invoices.filter(r=>{const d=new Date(r.createdAt);return d.getFullYear()===m.year&&d.getMonth()===m.month;}).reduce((a,r)=>a+U.invTotal(r).total,0));
  const monthOrderCt=months.map(m=>orders.filter(o=>{const d=new Date(o.createdAt);return d.getFullYear()===m.year&&d.getMonth()===m.month;}).length);

  // ── สินค้าขายดี (ตามช่วงที่เลือก) ──
  const prodCount={};
  rangeOrders.forEach(o=>(o.items||[]).forEach(i=>{prodCount[i.productName]=(prodCount[i.productName]||0)+i.qty;}));
  const topProds=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const avgOrder=rangeOrders.length?rangeOrders.reduce((a,o)=>a+U.orderTotal(o),0)/rangeOrders.length:0;

  // ── กำไร/ขาดทุน (ตามช่วงที่เลือก) ──
  const monthExpenseTotal = rangeExpenses.reduce((a,e)=>a+(e.amount||0),0);
  const allExpenseTotal   = expenses.reduce((a,e)=>a+(e.amount||0),0);
  const allIncomeTotal    = invoices.reduce((a,i)=>a+U.invTotal(i).total,0);
  const monthProfit       = monthIncome - monthExpenseTotal;
  const allProfit         = allIncomeTotal - allExpenseTotal;

  // expense breakdown 6 months
  const monthExpenses6 = months.map(m=>expenses.filter(e=>{const d=new Date(e.date);return d.getFullYear()===m.year&&d.getMonth()===m.month;}).reduce((a,e)=>a+(e.amount||0),0));

  // ── Top ลูกค้า (ตามช่วงที่เลือก) ──
  const custMap={};

    if(!custMap[o.customerId]) custMap[o.customerId]={name:o.customerName,orderCount:0,total:0,items:0};

    custMap[o.customerId].total+=U.orderTotal(o);
    custMap[o.customerId].items+=(o.items||[]).reduce((a,i)=>a+i.qty,0);

  CFG.businessName=name;

  CFG.businessTaxId=document.getElementById('st_taxId')?.value.trim()||'';
  CFG.businessAddress=document.getElementById('st_addr')?.value.trim()||'';
  CFG.promptpayId=document.getElementById('st_promptpay')?.value.trim()||'';
